body:
  text: 讀易詳説易類提要臣等謹案讀易詳説十卷宋李光撰光字泰發上虞人崇寧五年進士官至參知政事諡莊簡事迹具宋史本傳光為劉安世門人學有師法紹興庚申以論和議忤秦檜謫嶺南自號讀易老人因攄其所得以作是書故于當世之治亂一身之進退觀象玩詞恆三致意如解坤之六四云大臣以道事君茍君有失德而不能諫朝有闕政而不能言則是冒寵竊位豈聖人垂訓之義哉故文言以括囊為賢人隱之時而大臣不可引此以自解又解否之初六云小人退黜之時往往疾視其上君子則窮通皆樂未嘗一日忘其君解蠱之初六云天下蠱壞非得善繼之子堪任大事曷足以振起之宣王承幽之亂修車馬備器械復會諸侯于東都卒成中興之功可為有子矣故考可以無咎然則中興之業難以盡付之大臣蠱卦特稱父子者以此其因事抒忠依經立義大旨往往類此史載其紹興中奏疏云淮甸咫尺了不經營長江千里不為限制晉元帝區區草創猶能立宗社修宫闕保江浙未聞專主避敵如今日也其退而著書蓋猶此志矣光嘗作胡銓易解序曰易之為書凡以明人事學者泥于象數易幾為無用之書邦衡説易真可與論天人之際又曰自昔遷貶之士率多怨懟感憤邦衡流落瘴鄉而玩意三畫可謂困而不失其所亨非聞道者能之乎其序雖為銓作實則自明其著述之旨也書中于卦爻之詞皆即君臣立言證以史事或不免間有牽合然聖人作易以垂訓將使天下萬世無不知所從違非徒使上智數人矜談妙悟如佛家之傳心印道家之授丹訣自好異者推闡性命鈎稽竒偶其言愈精愈妙而于聖人立教牖民之旨愈南轅而北轍轉不若光作是書切實近理為有益于學者矣自明以來久無傳本朱彞尊經義考亦云未見兹從永樂大典薈萃成編原缺豫隨無妄睽蹇中孚七卦及晉卦六三以下其復與大畜二卦永樂大典本不缺而所載光解復卦缺後四爻大畜則一字不存繫辭傳以下亦無解其為原本如是或傳寫佚脫均不可知姑仍其舊其書宋史作易傳諸家書目或作讀易老人解説或作讀易詳説殊不畫一而十卷之數則並同殆一書而異名也今從永樂大典題為讀易詳説仍析為十卷存其舊焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ef74ab2c3bd27b3fb4a3b55a2459dd1f3fdf98e021d420847353654cb1640276
