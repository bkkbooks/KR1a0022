body:
  text: 讀易詳説卷一宋李光撰上經乾至蒙乾下乾上乾元亨利貞乾天也以廣大無所不包謂之天以剛健運行不息謂之乾乾純陽之卦人君之象也夫以區域之大非有以主宰之則強弱相陵衆寡相并髙下相傾紛紛者何時而巳邪聖人作易之意首立乾坤兩卦以明君臣之大分孔子繫之曰天尊地卑乾坤定矣卑髙以陳貴賤位矣言君臣之位如天地之不可易也有一言以盡乾之功用者健而巳執大象以御神器非天下之至健孰克勝任故以象人君之德賞罰威福之柄利害生殺之權皆自我出而不移于臣下則乾綱立矣元亨利貞乾之四德猶四時之運施之于人則仁義禮智而信行乎其中矣天之道一噓為春夏而物以生長一吸為秋冬而物以肅殺文言曰元者善之長也故體乾之元足以長人亨者嘉之會也故體乾之亨足以合禮利者義之和也故體乾之利足以和義貞者事之幹也故體乾之貞足以幹事乾元者始而亨者也利貞者性情也乾之德析而為四則元也亨也利也貞也各主一時之事也合而為二則元亨者始而亨者也利貞者性情也乾始萬物而亨之利者情也貞者靜而正靜而正則性也六爻發揮旁通為情則情者性之動也以發揮為情則剛健中正純粹精為性可知矣彖言大哉乾元終之以萬國咸寧文言稱大哉乾乎終之以天下平文王之言本之乾元孔子之言本之聖人聖人體天以立德帝王之道以剛健中正純粹精為體以變化隨時施澤利物為用言各有所主乾始能以美利利天下不言所利大矣哉者餘卦皆指名所利如坤利牝馬之貞屯利建侯之類是也乾道無所不利故不言所利以見乾道之大也時乘六龍以御天者乘此六爻之時則可以御造物之大權而出乎造物之外矣雲行雨施天下平者德澤旁流如雲行雨施物各適其平天下孰有泮渙者乎此反復以盡乾德之妙也乾道至此孰知乾之為聖人聖人之為乾乎彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧乾道大矣惟元亨利貞四者足以盡之乾以一元之氣生飬萬物物莫不稟氣於元天何為哉故曰大哉乾元萬物資始乃統天也鼓之以雷霆潤之以風雨雲行雨施然後蟄者以奮甲者以坼草木鳥獸流動分形形質呈露矣此釋乾之所謂元亨也大明終始六位時成時乘六龍以御天者聖人體元亨之德運用造化以成位乎其中也天之道有終有始四時之代謝六子之運動循環無窮聖人大明乎終始之運故卦之六爻以時而成潛見飛躍不失其幾然後可以乘天地之正御六氣之辨也乾道變化各正性命保合太和此釋乾之所謂利貞也天地絪緼萬物化醇物有因形而移易者亦有自有而入無自無而入有者此乾道變化之妙故物各得正其性命以保合太和也與生俱生者性也命則所稟受于天者保謂存之而不亡合謂聚之而不散保之合之不失其太和故能利且貞也乾備此四德以統御羣形而為萬物之宗聖王體乾之四德以臨制海內而為庶邦之長乾與聖人各盡其剛健之德同功而異用所以俱為域中之大歟象曰天行健君子以自強不息易無非象乾坤至大之物不可形容故但言其用而巳至健者乾之用也自強不息者君子取法于乾也天所以歷萬古而無敝者以息息不停運而無迹也君子體之以進德修業如成湯之昧爽丕顯坐以待旦文王日昃不暇食固足以繼天道矣蓋處尊崇富貴之地內有淫聲美色之蠧外有臺池苑囿之觀自非以道制欲未有不荒怠者中庸曰至誠無息不息則久非體本剛健安能無作輟者乎夫子于彖辭之外别以八卦錯綜取義謂之大象惟乾坤坎離震兑艮巽八純卦無互體合體卦變之異故坎曰洊至離曰明兩震曰洊雷兌曰麗澤艮曰兼山巽曰隨風各取一物以為象而乾坤至大之物又異乎六子故但云天行健地勢坤而巳此無象之象衆象之所宗也初九潛龍勿用象曰潛龍勿用陽在下也龍之為物變化不測因時而飛潛故龍全其神聖人涉世消息盈虛觀時而進退故能合于道乾體純陽方羣隂在上則退遁而潛伏乾之初九一陽之氣方伏而未動于卦為復乃神龍蟄藏之時猶聖賢君子當小人道長則以儉德避難消聲滅迹惟恐入林之不深况可求用于世而榮以祿哉象言陽在下者陽伏而在下是隂方為主之時文言曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也蓋有龍德而潛隱則當不易乎世者不為時世所易也不成乎名者不為名髙之所纍也遁世無悶者身否而心亨也不見是而無悶者舉世非之而不見沮也樂則行之憂則違之確乎其不可拔者能順乎消息之理而不為萬物之所移也又曰潛龍勿用下也龍之潛隱非得巳也時尚未可而不強行故伏而在下也又曰潛龍勿用陽氣潛藏一陽之氣方潛藏于九淵之下是其時之未可有為也又曰君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也聖人觀時為隱顯雖有成德形于可見之行方時屯否故隱而未見非終不見也君子以成德為行行而未成非卒不成也聖人豈真無意于世哉時未可用故也聖人用時而不用于時故不先時而動亦不後時而縮也其潛而勿用也待時而巳弗用者非為時之所棄也聖人當斯時而弗之用也則用在我矣九二見龍在田利見大人象曰見龍在田德施普也乾之六爻無人臣之位聖人乘六爻以御天升降上下因時而飛潛當初九隂長之時不得不潛九五陽盛之時不得不飛豈冇二哉九二羣隂退聼出潛離隱居中漸大是聖人將有為有行之時利澤可以及物矣象曰見龍在田德施普也田者農所興作以飬利萬物者也聖人居及物之地可以施恩澤于天下如田畤之利其施普矣文言曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也餘卦皆以二為臣位乾之六龍皆君德也故九二以龍德而處正中之位與五雖非相應而或飛或見各因其時庸者中之用也孔子曰中庸之為德也其至矣乎庸言之信庸行之謹間邪存其誠所以修胸中之誠發而為言行者無非中庸也此聖人居正中之地而能履正中之德者有此功德足以善世未嘗自伐故其德溥博而能化治至于能化則雖頑獷者無不服從矣又曰君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田君德也九二一爻稱龍德者一稱君德者二聖人深著其非人臣之位能進德修業則可漸躋乎大君之道也聚者儲蓄其見聞也辨者辨析其義理也寬者不狹其所居也行者非獨善其身也利見大人者非獨利見九五之大人能以利澤及物則天下皆利見之矣豈特二五自相求哉九三君子終日乾乾夕惕若厲無咎象曰終日乾乾反復道也乾之六爻皆龍也三獨稱君子以得人位之正不待象而明當二卦之際處重剛之中上下皆乾故曰乾乾以九居三至健也稍進則登乎君位矣禍福存亡之幾間不容髮聖人處此時也則憂勞畏慎不敢自暇自逸故象曰終日乾乾反復道也三居下卦之極上卦之下終始之際終則有始天行也反復皆不離乎道君子體此剛健之德自強不息雖宴息休暇安身之時惕然有臨深履薄之危敬慎如此故得無咎也文言曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣聖人處危疑之時非孔子反復其辭安知終日乾乾夕惕若厲為進德修業乎忠信者進德之階也修辭立誠者居業之具也至與終皆謂三也知至而能至之則居下卦之上而不失其幾知終而能終之則處上卦之下而不廢其義故居上位而不驕在下位而不憂因時而惕雖危無咎也又曰終日乾乾行事者乾以剛健之道進而行事非潛隱之時也又曰終日乾乾與時偕行者乾生于子統三男而長子用事雖欲退遁不可得也故知終曰乾乾者與時而偕行也又曰重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎三處重剛不中之位又以陽居陽髙亢之甚巳過九二之中庸故下不在田未登九五之大位故上不在天當斯時也欲進則有逼上之嫌欲退則有失位之懼故乾乾因其時而惕雖危無咎矣聖人慮患之意纎悉周盡如此九四或躍在淵無咎象曰或躍在淵進無咎也九四雖以陽剛處隂爻然巳在下卦之上有進而巳淵者神龍所居物所不能害也在淵而能躍則升降變化舉皆在我孰能制之故不如九三之危直曰無咎也四為隂位有淵之象與五同體有躍之象勢既至此雖欲退就安全之地不可得也故象曰進無咎也湯伐桀升自陑武王師逾孟津斯其時乎文言曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎九四位升于外履重剛之險居不中之地一上一下疑于為邪一進一退疑于離羣聖人方進德修業欲乘可為之時時不可失故上下進退使人莫得而測也又曰自試者此舜之歷試諸艱也曰乾道乃革者四近九五之位與上同體此湯武革命應乎天而順乎人也又曰九四重剛而不中上不在天下不在田中不在人此正聖人危疑之時故曰或躍或者疑之也居危疑之地能以道消息而卒不為人所疑故得無咎也乾至九四舜禹居攝之時也孔子于此反覆周慎如此不然其能免乎九五飛龍在天利見大人象曰飛龍在天大人造也九五以剛健履正中之位變化不測故曰飛龍在天者位乎天德升乎天位也當草昧雲擾之時則天地閉而賢人隱有聖人出豪傑智謀翕然響應天下莫不利見之也有堯舜之君則有臯夔稷契之臣有湯武之師則有伊尹太公之佐故二五兩爻皆曰利見大人以見上下之相須也故象曰飛龍在天大人造也造者至也聲氣之同不約而會故曰造也張良韓信之從漢王耿弇鄧禹之從光武房玄齡杜如晦之輔唐太宗皆心德之同如水火之就燥濕風雲之從龍虎故文言曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物睹本乎天者親上本乎地者親下則各從其類也蓋君子則有君子之類小人則有小人之類資適相逄故邪臣不能事明君暗主不能容正士上有九五中正之君則下有九二剛直之臣君臣相遇古人謂之千載一時詎不然哉又曰飛龍在天上治者在上而可以致治勢足以有行也又曰飛龍在天乃位乎天德者九五之君如飛龍在天則造乎神聖之域合散消息與天同德矣故終之曰夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况于人乎况于鬼神乎此皆仲尼盛贊九五之德而正名曰大人宜天下之所利見也上九亢龍有悔象曰亢龍有悔盈不可久也乾剛至上九則位已極矣隂陽之理未有極而不反者揚雄曰聖人之道猶日中日之既中無不昃者處天位之尊據崇髙富貴之極茍不知消息盈虛之理雖以聖人居之未有無悔吝者蓋四時之運功成者去老氏曰功成名遂身退天之道也泰之上六城復于隍剝之上九碩果不食以見窮上者未有不反下者也故文言曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也上九亢陽之地六爻雖統謂之六位初上者事之終始而非位也繫辭但稱二四三五同功而異位不及初上可識矣故曰貴而無位也乾純陽之卦下皆無應無民之象也無位無民賢人在下而不為之用此可退之時也又曰亢龍有悔窮之災也蓋陽數窮于九六位窮于上茍不知變則災禍隨之又曰亢龍有悔與時偕極偕極者不能消息盈虛與時偕行昧乎變通之機窮而不知變也故堯老不得不傳之舜舜老而不得不傳之禹觀其命舜禹之辭曰天之厯數在爾躬允執其中四海困窮天祿永終若堯舜者可謂知此矣故曰知進退存亡而不失其正者其唯聖人乎雖然悔吝者言乎其小疵也亢之為言謂力足以抗彼也以乾德之剛健若久居大位威福自我孰能傾之自禹湯而下皆傳諸子孫歷年數百豈必盡逃禍敗也哉故曰亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎仲尼之意以為非夫聖人不能升降變化握其機權使合散消息常在我而不在彼也豈非天下至剛至健之德哉如使後世之君懼亢龍之有悔必求賢人而授以天下則是啓攘奪之風開覬覦之門天下紛紛何時而定乎善乎韓愈之言曰堯舜之傳賢也欲天下之得其所也禹之傳子也憂天下後世爭之之亂也其知此乎用九見羣龍無首吉象曰用九天德不可為首也乾體純剛六爻皆以九為用聖人能用此純剛以御天下故羣剛莫不為我用乾之六爻莫相統一非如餘卦可舉一而明立主以定也方羣雄角逐之時善用陽剛者必不為稱首不善用者則為世所指名為世指名必將合而攻我矣漢祖卒滅項氏光武卒降劉盆子皆不為之首也陳勝首事則禍不旋踵矣故象曰天德不可為首也天之道虛而不屈應而不藏未嘗先物而動也能體乎天德故不為之首也文言曰乾元用九天下治也乾元者萬物之始衆善之長也能體乾元而用此剛直之德則天下治也又曰乾元用九乃見天則天之法象莫大于用九聖人能盡其道則不違乎天則而與乾同功矣坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉乾坤二物異體而同用異位而同功故乾元資始而坤元資生有君臣之象焉故四德者乾坤之所同也然乾以不言所利為大自坤以下各指一事以為利坤雖與乾合體亦指言利牝馬之貞坤之致用尤以柔順而貞為所利之大人臣之道也君子有攸往者臣道固以柔順為主然不以正濟則枉道偷合為鄙夫妾婦之道者多矣有攸往者如伊尹之就桀孟子見齊梁之君是也有辭受可否之義焉故道合則從不合則去小人枉道干祿一于求合而巳故惟君子為可蓋君子能敬以直內義以方外如六二之動則不疑其所行也君子有攸往繼之以先迷後得主人臣之道雖志在得君又惡不由其道如伊尹耕有莘之野必待三聘而後行諸葛亮卧草廬之中必待三顧而後見蓋先則迷惑而失道後則順而得常此人臣進退去就之大節也利西南得朋東北喪朋何也坤純隂之卦也西南隂位朋者其同類也東北陽位隂非陽不能獨成其功臣非君不能獨成其道故喪其同類之隂以從剛德之陽然後可與有為無躁求失守之嫌而獲安貞之吉也王弼云行之不以牝利之不以永貞方而又剛柔而又圓求安難矣蓋坤雖以順為主而有貞焉雖以柔為體而有剛焉則不入于邪矣先儒皆以先迷後得主利西南得朋利字屬下文程氏欲以利字屬上文云先迷後得主利至文言先迷後得主則云主字下脫利字不若從其舊之為愈觀蹇解二卦皆曰利西南得朋何獨于此而疑之哉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終冇慶安貞之吉應地無疆坤元雖不若乾之大然其資生萬物亦不可有加矣故曰至哉坤元也蓋天以氣始而地以形生天道日運而不窮一噓一吸而歲功成地隤然而處乎下豈能違之哉天之覆燾萬物四維上下不可測度古往今來無有窮盡可謂無疆矣地能以厚德持載之則與天合矣天地合德故能含𢎞光大品物咸亨也地以柔順為正故有牝馬之象然行天莫如龍行地莫如馬行地無疆非有剛健之材不能也牝馬雖柔順而利于貞固是柔而能剛弱而能強若一于柔順則妾婦之道爾非君子之所行也蓋坤之道専以象人臣雖以柔順為體而有貞焉則剛健矣如此乃能與坤德相應故安貞之吉應地無疆也此三無疆所以各不同也象曰地勢坤君子以厚德載物乾大象曰天行健君子以自強不息坤大象曰地勢坤君子以厚德載物乾坤之道皆聖賢所取法也天地者乾坤之體也乾健而坤順地勢非止于順而大體則順也人臣非體坤之厚德曷足以任重致逺以當國之大事哉初六履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也履霜者寒之始也堅冰者寒之極也方履霜而有堅冰之象蓋柔順者坤之道人臣之象也臣道固貴乎柔順然順而不巳則阿諛迎合其始甚微比其終也禍有不可勝言者唐髙宗欲立武氏大臣皆力爭長孫無忌褚遂良相繼以死李績獨曰此陛下家事何須問外人武氏立而唐之社稷幾殱焉秦二世專任趙髙卒有望夷之禍故孔子曰臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也夫始于順其極至于窮凶極惡而不可制故易之初六首以為戒也雖然乾坤合體一剛一柔本以相濟以剛健之主而御柔順之臣天下之常理也聖人之意蓋為後世之慮如此六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也易以五為君位二為臣位以六居二人臣而處隂位位之正中者也故無初六馴致之漸六四逼上之嫌可以守道而行志矣夫盡道事主既直且方鮮有不蹈禍悔者惟六二以隂柔處下故得任其直方引其黨類而朝無忌惡之者唐虞之際臯夔稷契之徒咸聚之朝廷此臣道之大也以此事上往無不利矣何疑之有哉故曰敬義立而德不孤直方大不習無不利則不疑其所行也六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也人臣積善在巳瞭然使家喻户曉必有忌惡之者惟深自晦匿然後可以守正而行志故竭力以從王事有功而不敢成亦不敢貽患于後而卒能終之但歸美以報其上爾如此庶免于咎悔周公之事成王是也蓋六三處下卦之上以隂居陽人臣之極位也又坤無正主其道微弱此正大臣嫌疑危懼之時故致其曲折如此使君臣道合無所疑間任之專而付之重有功而見知則臣豈當藏其智謀不以時發哉孟子曰人有所不為然後可以有為人臣內有積美之德當可行之時則動而不括矣外有能為之才盡恭順之道則功業見乎時矣故象曰含章可貞以時發也或從王事知光大也六四括囊無咎無譽象曰括囊無咎慎不害也坤臣道也六五得人臣正位而四為未得位得時者否泰之分繫乎四之用否其責任甚大進而至五則發為事業有不可掩者矣括囊蓋內充其德靜以待時之義漢儒乃以括囊不言為訓豈不陋哉坤在內為括囊孔子釋之曰蓋言謹也謹于養德謹于正巳也六四一爻最近君位乃人臣居髙履危處嫌疑之地當閉藏知謀如囊之括結其口不復出納以為明哲保身之謀聖人發此爻為萬世人臣之戒則善矣雖然大臣以道事君不可則止若君有失德而不敢諌朝有闕政而不敢言則是冒寵竊位持祿養交豈聖人垂訓萬世之意哉蓋坤之六五非女君則攝主也斯正屯否隔絶賢人隱遁避禍之時故文言曰天地變化草木蕃天地閉賢人隱若巳在髙位如遁之初六危至而後求行是速其禍故遁尾之厲不往何災也方其時也雖循默可也不然則是凡為大臣皆當坐視國之顛覆孰任其咎學易者不觀其時不悟其幾曷足以究聖人之微言哉六五黃裳元吉象曰黃裳元吉文在中也乾無臣位故九二稱見龍在田坤雖無君位然五實君位曰黃裳元吉者凡以為戒云黃中央之色裳下體之飾是人臣據南向之位秉大君之權而能居中守正不失臣節吉莫大焉文孰甚焉伊尹周公是也故文言曰君子黃中通理正位居體美在其中而暢于四支發于事業美之至也上六龍戰于野其血玄黃象曰龍戰于野其道窮也人臣久據大位操生殺之權內有震主之威下有非覬之望自非伊尹周公一旦欲釋位而去則禍不旋踵矣以霍光之忠身死之後猶不免滅族之禍故其勢必至于戰戰則冇勝冇負君臣兩傷坤之上六其微見于初爻臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也小人事主其初但阿順而巳人主利其順適之快任之必專至于威柄潛移而不悟隂盛傷陽而卒不可制雖欲就臣位不可得也故象曰龍戰于野其道窮也戰必寬間之鄉故云野湯伐桀戰于鳴條之野武王伐紂戰于牧野湯武之師雖應乎天而順乎人然以臣伐君亦由威權不立積習以致之也坤卦專主人臣其防微杜漸之戒豈不深且逺哉天玄而地黃其血玄黃者非君傷臣則臣必傷君也用六利永貞象曰用六永貞以大終也用六之道用此衆爻之六而長守以正固是能以大終也人臣立朝非失之邪佞則失之剛強坤以柔順為體終守以正固上能尊君下不失臣節功成名遂則奉身而退是能以大終也震下坎上屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧屯異于否否則小人在內君子在外上下不交而天下無邦屯則隂陽始交而難生賢人君子經綸事業之時經綸事業非備此元亨利貞之四德曷足以戡難解紛致康濟之效與乾同其功用哉屯難之世英豪競逐靜以觀變徐起而應之可也故勿用有攸往自唐虞三代莫不建侯樹屛內以蕃王室外以寧萬民况屯難之世干戈日尋斯民離散泮渙強弱相陵衆寡相暴非立主以定之孰與保其生業哉故利建侯也象曰雲雷屯君子以經綸諸卦多以坎為水為雨為澤為泉其功用皆足以及物以坎為雲獨需屯二卦耳屯未行需有所待故以象雲雲上于天未必成雨惟地氣上騰天氣下降畜而成雨若隂陽始交雲雷方作此正聖賢經綸馳騖之秋也經謂有定制綸謂有端緒經綸天下事業必先定其規模然後緝理之如治絲棼詎可遽為之哉初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也九五本一卦之主今民心所歸乃在初九何也屯難之世居大位者非昏庸即幼主也昏幼之主多劫于強臣身陷險難非能濟難者也君子之遇斯時也宜覩其機會徐起而應之與天下同其利故磐桓利居貞利建侯也守節居貞非為邪也列爵分土非為利也故象曰雖磐桓志行正也以貴下賤大得民也蓋得乎丘民而為天子得乎民者得其心也初九以剛陽之才處羣隂之下屈巳禮賢卑以自牧方民思真主而為人望所歸孰能違之哉武王觀政于商之時也六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也六二上應九五乃人臣居中守正者也然初九陽剛在下為羣隂所歸方天下板蕩國勢微弱下有一撥亂之主天下將靡然從之二獨憑陵而不肯為之下志欲逺應九五而逼近于初不敢遽進此大臣之居正守節者也故屯如邅如乘馬班如也然初之難二非有侵害之意以二守正欲使歸巳故幣聘雖行而志不從如女子之不踐二庭也字生育也女子得所歸則能遂其生育賢人君子有所從則能行其志願十者數之終君子厄窮禍患至于十年亦巳極矣故曰女子貞不字十年乃字也士當亂世退處寬間之鄉寂寞之濵消聲滅迹所以遺寵榮而避世患也何危難之有蓋六二嘗為大臣者如管寧之流是巳夫守節固志十年之久天下之勢必定于一上無可為之君下有厭亂之民理必反常君子則必能觀會通以行其道此聖人之微意也故象曰六二之難乘剛也十年乃字反常也六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也屯之時固聖賢馳騖有為之時然外內無應當磐桓居貞以待幾會如獵者之即鹿非得虞人熟于山林知鹿之所在而徒往入于林中何所得乎知幾之士不如舍之若急于有獲弗慮而妄動往則愈屯耳故象曰即鹿無虞以從禽也君子舍之往吝窮也六四乘馬班如求婚媾往吉無不利象曰求而往明也六四逼近九五輔弼之臣也當屯之時九五之君無大有為之志四雖與初為正應志欲求初不敢遽進必待求而後往往必合矣班者遲回不進之貌蓋屯難之世勿用有攸往雖以正應理無不從猶當遲回顧望察其誠心相與可以同濟時難然後往則吉無不利也九五屯其膏小貞吉大貞凶象曰屯其膏施未光也當屯之時居九五之位處乎險中漢獻帝魏髙貴鄉公唐昭宗之流是也威福賞罰巳不自巳出又羣隂下歸于初人主擁虛器而巳方是時從容以求濟可也若輕意肆志不能以道消息而欲大有所為是速其禍耳故曰屯其膏小貞吉大貞凶也屯其膏者非吝之也人不以為榮也故象曰屯其膏施未光也上六乘馬班如泣血漣如象曰泣血漣如何可長也屯難之世人有濟難之志上六以隂柔在上乘險而下無應援又才非剛健道巳上窮雖欲有為孰肯從之處屯之極窮厄巳甚故乘馬班如泣血漣如也夫君道屯厄危而必亡非可以逃難而茍免也故象曰泣血漣如何可長也何可長則非特凶悔吝而巳坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞乾為剛健創業之主蒙為繼體幼沖之君人主之尊雖在童幼與臣下之分固懸絶矣非求師臣以自輔則聰明不開古今治亂成敗之迹無自而知惟尊德樂道屈巳以求剛明之賢以啓迪其性則蒙固有亨之道若嚴上下之分峻亷陛之等不能遜志務學則有過而不能改見善而不能從驕奢淫佚為狂為愚矣筮所以決疑童蒙之求師亦以決疑善學者得師之一言雖終身行之可也若再三叩之則有自疑不信之心若復改其初意以他辭告之則問者將輕吾言而莫知適從故再三瀆瀆則不告也蓋師道貴乎剛嚴簡重也如此利貞者所利在正蒙以養正聖功也童蒙之主樂軟熟而惡剛正師臣之道一正君而國定矣故所聞所行與左右近習之臣無適而非正則放僻邪侈無自而入矣彖曰蒙山下有險險而止蒙蒙言以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也水者天下至潔之物濬其源則日流而常清畜而止之則滓穢而不食山者泉之所自出今遇險而止所以為蒙人之性猶水之性其源未嘗不清蒙者有物以蔽覆之也故蒙有亨道行之不失其時則可以作聖矣夫以人主之尊雖在童孺若以勢位自居則師道廢矣今六五之君下求九二之臣是能屈體以尊賢上下相應君得發其蒙師得行其道理無不順故曰匪我求童蒙童蒙求我志應也師道貴乎剛嚴舉一隅不以三隅反則不復也有疑而問問而應得一善則拳拳服膺而不失如此則疑者必釋應者不煩若不能專精致志退而深思問而復問至再至三則不復告矣告之適以瀆之也洪範休徴曰聖時風若咎徴曰蒙恆風若蒙者聖之反也蒙之與聖特在學與不學之間耳傅説告髙宗曰惟狂克念作聖惟聖罔念作狂狂之與聖特在克念罔念之間耳周公相成王動以沖人孺子稱之其告戒之嚴教督之至居父師之位而能盡父師之道卒使成王為守成之賢主享國四十餘年豈非蒙以養正以成作聖之功乎象曰山下出泉蒙君子以果行育德山澤之氣升而為雲雨畜而為泉源泉之出乎山非疏瀹而利導之則失其至潔之性若有物以蔽之如童蒙未知所適從也故山下出泉有蒙之象君子當法此象因其性而利導之使知其所向則果決而行之涵容渟蓄以豐其源源既深而流長矣故曰君子以果行育德初六發蒙利用刑人用説桎梏以往吝象曰利用刑人以正法也初六以柔弱之質屈體以承剛明之師則蒙蔽之性得以啓發蒙既發去則燭理無障用以刑人則有罪者必誅而寃枉者獲伸矣是道也特有司之職非人主所獨任也蓋發蒙之初姑以試其明決爾童幼之君或不足于威權則衆得而陵犯之周公戒成王云亦敢殄戮用乂民若有功故蒙之初爻以刑人為先則強梗者肅然而有所畏憚矣雖然人主當純任德教而輔以刑名可也若純任刑名則商君之術耳故利用刑人用説桎梏以往則吝道也九二包蒙吉納婦吉子克家象曰子克家剛柔接也九二以陽剛之才處臣位之中與六五為正應五反居隂是能屈巳以尊師傅之象也五既屈巳二當循循善誘包涵容納以成其聖質周公于成王雖告戒之甚嚴然所以訓迪之者雍容而不迫雖居父師之尊弗敢專也若童之未有所知婦人之柔暗一切容納之則無不利矣子克家者勤勞王家是也觀鴟梟之詩其自敘如此故居東三年而罪人斯得內則制作禮樂外以攘却冦讎外剛明而內忠順未有若周公者也然所以得行其志遂其功者亦在成王悔悟之後君臣之分洞然無疑也故象曰子克家剛柔接也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也童蒙之從師猶女子之從夫也六三以柔暗而處剛陽之位非能遜志以受教者正應在上而下比于二兩者皆剛將安從乎將捨其貞固之道近從所乘此女之醜行也金夫謂九二九二體剛故曰金夫童蒙之主委任不專捨正應而從非應則賢者將望望然去之矣故曰勿用取女見金夫不有躬無攸利也六五之君能近捨上九而逺求九二故二五皆吉六三反此將下比九二輕身以從之何所利哉六三體本隂柔性復趨下故象曰勿用取女行不順也六四困蒙吝象曰困蒙之吝獨逺實也困固有亨之理六四之困陷於羣隂之中艮之初爻下乘于坎險而止困而不能亨者吝道也陽竒隂偶竒實而偶虛四欲上求上九則礙于六五欲下求九二則礙于六三昏蒙之性無自而發故象曰困蒙之吝獨逺實也實謂九二之陽也六五童蒙吉象曰童蒙之吉順以巽也六五居尊極之位而能以童幼自處與二為正應是能虛巳求賢師以自輔而不為羣隂所移吉孰大焉故曰童蒙吉象曰童蒙之吉順以巽順為先順則恱而從之心不逆也巽則優而柔之能順乎剛也既順且巽則孰不告以善道乎上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也九二以剛明而居臣位之正君臣之分不敢失也故貴乎包容上九以剛明而居人臣之極位握威福之柄擅廢置之權昏蒙之幼主卒不開悟則當擊去其蒙蔽俟其思庸如太甲悔悟如成王然後復子明辟此伊尹周公之任也若乘時微弱掩神器而有之如王莽董卓則天下英豪將共起而圖之鮮有不敗者故曰不利為寇若能衛護宗社勤勞王家如周公之伐三監誅管蔡霍光之誅燕王上官桀等孰敢不聼命者故人心向背特在逆順之間耳以曹操之勢雖漢祚已盡終身不敢失臣節蓋知內外人心未順故也桓楷勸操正位而夏侯惇欲俟吳蜀既定然後遵舜禹之軌操卒從其言蓋亦畏二方有辭將合而攻我則曲在我矣以荀彧之賢操所信任謀無不從欲稍遲回九錫之命且不免死不然豈惇單辭所能沮之哉讀易詳説卷一
