body:
  text: 讀易詳説卷三宋李光撰上經泰至蠱乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也夫泰之為卦乾下而坤上言天地之氣交也乾君道也君能下下以成其政臣能歸美以報其上君臣之情通上下之勢接此泰之道也一氣不頓進寒暑往來然後嵗功成焉豈一朝一夕之故哉治亂存亡屈伸消長之理所以致之莫不有漸小者往而大者來然後吉且亨也小為隂柔大為陽剛隂柔為小人陽剛為君子小人退聽而君子連彚而來故為泰天地交者隂陽之氣通而相感也上下交者君臣之道合而無間也君子小人相為消長退小人之術豈在迫逐之哉陽剛在內勢足以有為則隂柔知其不勝而聽命矣在外者特不使之在君側握朝權耳故一陽在下其卦為復二陽在下其卦為臨陽雖未盛而浸以長矣故曰內君子而外小人君子道長小人道消也象曰天地交泰后以財成天地之道輔相天地之宜以左右民天地交泰以象太平盛極之時聖王于此時不敢忽也財成其道則有節制輔相其宜則無過差故安而不忘危存而不忘亡治而不忘亂然後亂亡無自而至焉此其幾微不可不戒者以左右民者民至愚而無知非聖人有以利導扶持而安全之則其居太平之時也驕奢淫泆無所不至而卒蹈于刑辟者多矣周家之業至成王周公始陳后稷先公致王業之艱難今觀七月之詩所以財成輔相天地以左右斯民者可謂至矣民為邦本則太平之基也天心不可見考之民而已初九拔茅茹以其彚征吉象曰拔茅征吉志在外也初九最處乾下為健之始陽雖長而未盛隂方退而未逺聖賢君子欲有所為非一人之力能獨濟也必當拔用賢才引其朋類同心同德萃于朝廷然後太平之功可得而成也孔子曰茅之為物薄而用可重也可羞于王公可薦于神明以象賢者有潔白之質也茹者根也茅之生也根相牽連彚者類也征者進也進必以正故曰征也君子小人各有其類拔其一則皆相連而起有茹之象君子進則所引拔者皆君子君子衆多則生民必被其利宗社必蒙其福故曰以其彚征吉也象曰拔茅征吉志在外者小人得路志于得君而已君子得路必搜訪于外以盡天下之賢才使野無遺賢故曰志在外也抑君子之進常出于不得已彼其于世未數數然也故雖享厚祿握重權而其志未嘗不惕然以顛覆為懼而思退身之樂也豈與貪得患失者同日語哉九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也九二以陽剛之才有應乎五而處人臣之正當泰之時能包含荒穢雖狂狷之士不顧險患如不假舟楫而馮河者無不容納此真大臣之任當海內交泰之時人材衆多若遴選太精則豪傑之士或不得其職則聚而為冦盜者多矣秦隋之末是也當廓其度量包含荒穢逺者無所棄遺則山林之士莫不皆至近者無所阿比故朋黨之禍無自而興如此乃能配乎九五中行之主而無偏黨之私也人臣之道至此則光明盛大不可有加矣九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也治亂存亡安危之相因如隂陽寒暑之必至有不可易者惟聖人為能因其盈虛而消息之使常治而不亂常存而不亡常安而不危也消息之道豈有他哉兢業以圗之危懼以處之當治安而不忘亂亡之戒則可以保其治安而無咎矣勿恤其孚于食有福者聖人處泰之時常思艱難而履夫中正則在我者無愧矣人之信不信何所恤哉食者人之所享也福者天之所降也處泰之世當乾道將復之時獨以艱難守正而享其福祿非徼幸也象曰無往不復天地際也九三處乾坤之間當天地之際平者當陂往者當復惟艱難守正庶可保其常安耳聖人知世路之將阻陽氣之必復故于此爻特為之戒云六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也地之形頺然而處乎下今氣雖上行終必趨下翩翩然如飛鳥之疾其勢順也方泰之時上下相承隂陽相應三隂三陽各安其所然天地之氣往無不復者今三陽欲上行而三隂下之上與五無不從者是不富而能用其鄰也夫富而能用其鄰怵于利也不富而能用其鄰者利害同也四以五上為鄰利害既同固不待告戒而孚矣陽為實隂為虛隂雖在上其性本下今三隂在上皆為失實其相率而趨下乃其所欲也故曰中心願也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也六五以隂柔而居中正之位帝女之象天地交泰之時隂雖上進然樂于趨下能降尊就卑順以承夫其受祉福而獲元吉也宜矣九二以剛中之賢上應六五五能降其尊位下交九二天地隂陽君臣夫婦其道一也六五為泰之主故其象如此女以嫁為歸堯之二女釐降于溈汭周之王姬亦下嫁于諸侯其得所歸乃其中心之所願也人君能屈已求賢則天下之士皆願立于其朝矣天地交泰其在兹乎小人得路則朋淫下比壞主心術蔽君聰明上下之勢隔絶而不通馴致禍亂可勝諱哉上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也坤土也城者土之所積纍也不能增髙倍薄致其兢業之意則城將頽圮而復于隍矣治安之極人君不能持盈守成而湛于燕安狃于侈泰馴致土崩之勢而不自悟自古奢淫荒怠之主享國長久而亟致禍敗以至滅亡者皆因用兵開邉外讐強敵內動豪傑窺覬之心耳隋煬帝唐明皇是也海內升平之久民不識兵革一旦又欲興師動衆雖近郡邑其孰肯聽命故雖貞而猶吝也象曰城復于隍其命亂也城既復于隍則尊者必降上者必下小人得志而執國命禮樂征伐皆不自天子出故曰其命亂也坤下乾上否之匪人不利君子貞大往小來否之卦天地不交各復其位乃無平不陂無往不復之時乎夫消息盈虛之理蓋有不能使之常治而不亂常安而不危者聖人能使禍不至于深耳否泰相因有非人力所能勝故曰否之匪人先儒或以匪人為匪人道蓋慮後世庸暗之主以一治一亂皆歸之于天故紂曰我生不有命在天此最害教之大者然聖人方論否泰之理不得不然抑使後世常兢業畏慎知治亂無常而不敢忽也漢光武唐太宗皆信圖讖李淳風言唐中弱有女武代王其兆既成天之所命不可去也學者固難言之要之一治一亂豈人事哉君子當天下否閉小人道長之時則有奉身而退茍必欲以正道有為于其間遇禍決矣故昔之君子有詭辭以免禍如叔孫通是也一君子遇禍則衆君子必相牽連而去大者往則小者乘時而來矣彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也萬物盈天地之間莫不負隂而抱陽雖根莖之微未有不假天地之氣而生長成遂者若天地不交則隂陽不和雨㿩寒燠風皆不以時應萬物何由而通乎君所以尊安以臣民愛戴之也臣所以強固以君能封殖之也故君能下下以成其政臣能歸美以報其上則治道成矣否之時上下之情隔絶而不通如天之自髙地之自下強弱相陵大小相并而上不恤也朝廷之勢日以微弱政化日以陵遲朝覲會同之禮廢屏衛勤王之義絶是天下無邦也三隂來居于內而三陽退處于外君子往而小人來小人之道浸以長君子之道浸以消此否之時也象曰天地不交否君子以儉德辟難不可榮以祿君子居否之時當奉身而退漢管寧之徒是已寧見天下大亂遂渡海至遼東環堵篳門偃息窮巷晏然若將終焉雖三公之位有所不顧豈以世之榮辱纍其心哉初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也否卦以全體言之則三隂在內三陽在外內小人而外君子也以六爻之義言之當否之時賢人在下以上應九四之君子欲使其類牽連而退故泰之初九其道利于上行則以其彚征吉征者動而進也否之初六其道利于下止則以其彚貞吉貞者靜而止也方時大否君子卷藏其道退而窮處身雖否而道不窮故不失其吉且亨也小人當退黜之時則怨望訕讟或為戎首未嘗不疾視其上君子則能以道義自處窮通皆樂雖引類而去其心曷嘗一日而忘君哉孔子三月無君則皇皇如也故象曰拔茅貞吉志在君也六二包承小人吉大人否亨象曰大人否亨不亂羣也六二當否之時處人臣之正位此暗君姦臣相濟而得路者也小人方執其權綱上復有應勢未能敵為君子者當包容而承順之故小人吉而大人身雖否而心亨也曰大人者包容小人而承順之非大人不能孔子恐後世疑于同小人者故曰大人否亨不亂羣也包承小人而不亂小人之羣尢見其大蓋從容渾迹于羣小之間未嘗悻悻然懷忿躁不平之氣故小人莫得指目而忌惡之非獨明哲全身之道當然亦所以傾否而開泰也漢之陳太丘足以當之若李膺杜喬之流徒激禍亂耳六三包羞象曰包羞位不當也六三以隂柔而據陽位此小人得路之時肆其凶險上以逢迎其君下以傾害善類天下切齒而能包羞忍恥以保寵固位者也向使不乘時危亂以竊顯位雖有隂險之才亦不能窮凶極惡如此之甚也孔子追論所以致此者故曰包羞位不當也言髙位非小人所宜處故曰不當也九四有命無咎疇離祉象曰有命無咎志行也否之時三隂雖握權居中然三陽在外四復居近君之位以陽剛而能柔巽以濟危難九五休否之主與之切近而同心凡朝廷之命一以付之又能承命不違故得無咎如此非獨一人受福凡同類而進者皆麗于福矣象曰有命無咎志行也三陽同心以濟難小人雖居中用事然國命在我勢難久安故吾志得行否將傾而為泰矣九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也否道既成小人方握國命以久其權未易廢也天下禍患未易息也惟九五之大人以剛健之才居得政之位勢足以有臨力足以有制故能休否而逢吉也休廢也息也廢小人而息禍患非大人其孰能之九五雖有休否之勢然小人尚處于內君子尚處于外非兢業以圗之則治亂存亡猶未定也故聖人為之戒曰其亡其亡繫于苞桑否泰將分之際聖人常以必亡為心桑者其植根深其生叢委其材堅韌而不可拔生民之本國家基業之象也以危亡為戒而繫于不拔之基故能長存而不亡也象曰大人之吉位正當也所以能休否而獲吉者以陽剛履中正之位以制羣隂也小人非能制其死命孰肯退聽哉上九傾否先否後喜象曰否終則傾何可長也甚哉治道之難成小人之難去也當否之世隂邪當路以害治道雖三陽同心不能一朝而頓除也九五以中正得位特能休之而已至上九然後能力傾而顯排之猶先否而後喜也其用力多矣自昔未有常亂而不治者秦之亂而漢祖取之王莽之亂而光武興之茍非聖賢馳騖而經營則亂之日必長亂之日長則君子之受禍必深生民之被害必酷故象曰否終則傾何可長也離下乾上同人于野亨利涉大川利君子貞否泰者君子小人相為消長君子處內則為泰小人處內則為否君子欲去小人小人必欲害君子故泰之九三已有否之象至上六則城復于隍矣否之九四已有泰之理至上九然後否終則傾矣凡如此者皆以黨類相傾邪正相勝不能大同乎物使君子小人各得其所而不競也同人于野亨則廣大矣利涉大川則可以涉險矣利君子貞則無有嫉忌之者矣古者聖賢相遇措斯世于三代之隆而不見其治之之迹用一賢則不肖者自退用一能則不能者自逺未嘗挈挈然求異于衆人如此故包容廣大無往而不通也彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也惟君子為能通天下之志同人以一柔為衆剛之主以六處二隂柔而寓隂位人臣得位者也二處離中中也二五正應以離中之柔而應乎乾剛卦之所以為同人也同人以無所不同為亨有所不同為吝同人于野以象乾之覆燾利涉大川以象乾之剛健故曰乾行也文明者常失之柔弱而能濟以健中正者常失之無助而能應乎五故處羣陽之間介然獨立而不懼也繫辭曰夫易聖人所以極深而研幾也惟深也故能通天下之志聖人非能物物而通之好惡榮辱是非利害衆人之所同也能通乎一則千萬人之情可見矣非極乎至深者能如是乎象曰天與火同人君子以類族辨物天體在上火性炎上性體若同而實異也聖人處大同之世于君子小人之間蓋有甚不同者但處得其道無阿比之迹小人自退聽故人見其同耳君子觀乾離二象以類族辨物若黑白之不可亂也初九同人于門無咎象曰出門同人又誰咎也門者人所由以出入非奧室也同人于門則行乎大公至正之道無所阿比賞罰豫奪進退黜陟一付之公議我無容私焉何咎之有諸葛亮之亡能使廖立垂泣李平致死以至公而無私也故習鑿齒稱之曰法行于不可不用刑加乎自犯之罪爵之而無私誅之而不怒天下有不服者乎象曰出門同人又誰咎也九居同人之初而無所偏應能盡同人之至公者惟初爻為然蓋無所係應則無親疏之間孰得而議之故曰又誰咎也六二同人于宗吝象曰同人于宗吝道也六二為一卦之主以一隂而統五陽非盡至公何以服天下今乃係應在五雖位中正所應偏也他卦以有應為善同人之世當以天下為公豈得有所偏應哉咸之為義當以無心感物無逺近親疏之間而九四憧憧往來朋從爾思孔子曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮蓋朋從爾思則往來于心者未離乎黨與之間故象以憧憧往來為未光大同人于宗則吝道其揆一也九三伏戎于莽升其髙陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也同人之世不能以大公同物而各以私意顯立黨援則強梁者必起而相圗矣九三以陽剛而據陽位則小人之強梁者五與二為應而三介乎其間勢雖不敵而欲隂害之故伏戎草莽之中然二以中正得位而應乎乾剛三雖有害之之意而不敢輕發也故升其髙陵以窺伺之至三嵗之久而卒不敢發蓋二與五能同心雖剛者莫能間之象曰伏戎于莽敵剛也三嵗不興安行也九五有剛健之德難以顯攻三非五敵也故遲回至于三嵗不敢輕發既能量敵慮患則可安行而不蹈乎危難三雖小人然九五據崇髙之勢心所黨比者止在六二三雖不遜五亦有以致之聖人于此不言凶悔吝者亦所以恕之以見五之未光大也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也墉墻垣也四與五為鄰三四俱強各懷異圗以窺伺于五然四雖陽剛而處隂位故乘三而承五非若三之純乎剛暴能知難而退故弗克攻而獲吉也夫同人之時君子小人處之宜各當其理九五無君道二方為羣陽之主亦不能由公心直道而係應在五而五又係應在二故羣小紛然爭為戎首或伏于草莽俟時而竊發或顧望形勢乘間而相傾非二五以中正剛健內外協濟則處乎二強敵之間豈不危哉以四之強又逼近尊位然卒不克攻者君臣之分上下之勢非順也知其非順困而反就臣位則免乎凶咎矣故象曰乘其墉義弗克也其吉則困而反則也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也君道患不廣大九五履尊位而握重權當如天之無不覆燾地之無不持載生殺子奪一付之無心可也五既不能為羣陽之主而三得擅之此衆之所必爭也衆既不與欲下應乎二而介乎兩強敵之間孤立而無援憂憤之切卒至用大師以摧二冦然後方得與二相遇故先號咷而後笑大師克相遇也克而後相遇亦已危矣克如鄭伯克段之克以見敵之強大取之之難也人君能以大公至正之道治天下則逺近俱應同異咸服何至竊竊然置號笑于黨與親疏之間哉象言同人之先以中直也大師相遇言相克也九五師得中而理直則非理犯已者若不足慮然卒至用兵然後僅能克之亦可恥矣何足喜也以深見三四之強五無君道而失同人于野之義也上九同人于郊無悔象曰同人于郊志未得也上九處衆陽之上而獨無所爭亦知其不可爭而悠然逺去自樂于坰非無有為之志但知其紛紛而脫身事物之外以逺害而已雖可以無悔而志未得也九處乾剛之上其志豈止求免于悔吝哉吾知其不得已也故象曰同人于郊志未得也乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨繫辭曰富有之謂大業聖人能通天下之志以大同乎物則四海雖廣萬物雖衆無不為我有矣然非得尊位大中而上下應之則不能奄海內而有之非其德剛健而文明應天而時行則不能大亨也五以隂柔而得尊位生殺之柄既自我出五陽雖強不敢違也體文明而履剛健應天而時行造化之權皆自我制五陽雖衆不能困也象曰火在天上大有君子以遏惡揚善順天休命人君以柔順之德居極尊之位體文明而履剛健則物無不照燭者故有火在天上之象大有之世海內治安天下極盛之時物繁事夥非用刑賞以勸沮之不能齊也聖人于此當遏惡揚善使惡者有所憚而不敢為善者有所恃而日加勸書曰天命有德五服五章哉天討有罪五刑五用哉又曰作善降之百祥作不善降之百殃此天之休命也聖人代天理物則刑賞之行豈能違乎天道逆乎天心也哉初九無交害匪咎艱則無咎象曰大有初九無交害也大有以一隂而主五陽而四陽各以其才致用于下故能處治安之時享全盛之業陽雖剛健而處卦下當大有之初責望者衆獨離羣退處不出而交物則有害之者然非其罪也惟以艱難節儉自處以防驕逸之過則可免乎咎悔矣雖然士君子窮居隱約退處寂寞之濱可也大有之世當出而交物如豐之勿憂宜日中宜照天下也若乃豐其屋蔀其家窺其户閴其無人則有致凶之道故象曰大有初九無交害也以言無交則有害之者非潔身獨往之時也九二大車以載有攸往無咎象曰大車以載積中不敗也六五當大有之時而以柔德處尊位非責任羣臣安能斡旋天下運量萬物以成無為之功乎九二以剛健處人臣之正位而有應于上如大車之載物雖負重致逺轍環天下而無傾覆之患是足以勝其任矣象曰大車以載積中不敗也物積于中而不敗則其材可知矣鼎之九四至于折足覆餗其刑渥凶言不勝其任也孔子曰德薄而位尊知小而謀大力小而任重鮮不及矣蓋非有剛健之材處得其正使當重任未有不敗者觀鼎象大有二卦聖人垂戒之意深矣人主任用大臣曷可過其分量乎九三公用亨于天子小人弗克象曰公用亨于天子小人害也九三以陽居陽在他卦則為強臣當大有之世能自亨于天子則處諸侯上公之位而能效臣節以事其上者也小人當盛大之時據富有之地則勢必跋扈而有唐室方鎮之患其肯以貢賦亨上而自通于王庭乎亨與享意義略同先儒多作享書曰敬識百辟享亦識其有不享亨者能自達于上也享者朝覲會同以時而享于天子之庭也九三剛健而處下卦之上此貴而不敢驕者小人非獨不知尊朝廷其或懷忠以奉上者反以為害已而交惡之也田𢎞正以魏地六州版籍歸朝廷比鎮皆惡之禍亂卒不可解是亨于天子者小人之所不利也故曰小人害也李德裕草鎮魏詔書曰勿為子孫之謀欲存輔車之勢所以誅其意而伐其謀也故一方作難而諸鎮無敢坐鎮者卒成會昌中興之功可謂能誅小人之情矣九四匪其彭無咎象曰匪其彭無咎明辨晳也九四逼近君位三居其旁以乾剛而據陽位強臣之象也四以忠順與三為敵上承柔中之主而為所倚信下乘強暴之臣而不敢加害故得無咎也象曰匪其彭無咎明辨晳也蓋言明智之士辨邪正之分明逆順之理然後內足以保身外可以衛上旁足以抑強也匪其彭自子夏作旁字先儒皆從其説蓋子夏親授學于孔子自有易傳而後世無得其真者今王弼注易諸儒皆宗之則其所從來亦逺矣六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也六五正應在九二當大有之世君臣以至誠交孚而無間者五以柔而履尊位二能濟以剛嚴則仁不至于優柔剛不至于強暴諸葛亮所謂法行而知恩者吉孰如之象曰厥孚交如信以發志者言上下交孚君臣道合也且人君豈無有為之志人臣豈無能為之才然非心德之同則孰與發之威如之吉易而無備者大有之世風俗恬熙人主能肅以威嚴使姦宄之心無自而萌則可簡易而無備矣故議治道者謂當備禦于太平無事之時未有易而無備而可以保長存者是大不然人主當使威加四海先以信義結百姓之心則足以消患于冥冥之中此乃備之大者秦築長城未畢而劉項之兵已入關矣是豈無備者哉上九自天祐之吉無不利象曰大有上吉自天祐也大有火在天上之象火之性固以至明又處天上如豐之宜照天下明之盛也上九處大有之終在六五之上功業成而不居富貴極而能退宜乎為上天之所祐也大臣至于無位容有怏怏而不順者進退出處之際容有詭譎而不情者蔽賢嫉能惴惴然懼人之壓已以薦進所私者多矣上九之臣以陽剛而居羣臣之上履柔中之主勢逼而愈順失位而愈恭下之衆陽咸得安其職任而盡其才能孔子所謂又以尚賢也宜乎自天祐之亨上吉而無不利也艮下坤上謙亨君子有終謙之為卦艮下而坤上艮止也坤順也止者為剛順者為柔柔反處乎上剛反處乎下是柔而能剛外順而中止也外順若卑而能上行以不失已內剛若亢而能降體以不失物謙德如是故能亨通而有始有卒也世之小人固有擎跽曲拳脅肩諂笑卑佞媚悅若妾婦者自謂富貴可以長保而不知幽顯之間舉將害之則禍不旋踵矣故惟君子為能保其終而無悔吝也彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也謙有天地之義焉天體髙明而下濟于物地形卑順而上行于天此所以能亨也天能降其髙明而其德愈尊地能效其柔順而其道愈大二者固足以盡謙德矣天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也天地鬼神無不以謙為貴老子曰天之道其猶張弓乎髙者抑之下者舉之有餘者損之不足者與之又曰江海所以能為百谷王者以其善下也又曰夫惟不爭故天下莫能與之爭天地且然況于人乎況于鬼神乎天地無心也能禍福人者鬼神也有好有惡者人也謙尊而光以能下濟也卑而不可踰以能上行也盡此二者則剛止乎內屹然如山之不可動搖柔順乎外頽然如地之無不持載此君子所以能克終也象曰地中有山謙君子以裒多益寡稱物平施莫卑乎地莫髙乎山山處地中則地在山上此髙者下之卑者舉之也君子觀此象欲以謙之道行乎天下故多者裒之寡者益之如地失之太卑則使在山上山失之太峻則處于地中豈奪彼而與此哉稱物平施無過不及適中而已觀謙之大象夫豈一于卑弱失已而趨媚于人哉聖人深惡夫専務柔佞依阿如孔光馮道之流而剛方忠讜之士正色立朝如汲黯者小人或更相譛讟指以為非而卒排去之也故仲尼于此反覆詳密而致意焉初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也謙謙者謙而又謙謙之至也世之小人多能行之而入于卑佞故特曰君子惟君子能謙乃可貴也蓋初六最處卦下勢雖卑而體則剛峻也以此涉難非獨人不忍害亦不能害也非獨不能害亦深知其為君子而不敢加害也涉難且吉況安處卑陋不以辭氣加乎人其誰敢害之故象曰謙謙君子卑以自牧也以卑巽自養其德義德義之盛乃可進而上行以極乎髙明也六二鳴謙貞吉象曰鳴謙貞吉中心得也謙者君子處已接物之道當然豈欲聲聞于人哉六二在下而得中位非謬為恭順以媚于上下者中心誠實而安行之發乎聲音笑貌而不可掩也謙近卑佞故雜卦曰謙輕者不自重大也體輕而不自重大非由正道則入于佞諛矣謙而非邪乃獲吉也象曰鳴謙貞吉中心得者處不得中而以謙聞內不失已外不失物中無所愧乃為得也九三勞謙君子有終吉象曰勞謙君子萬民服也舜戒禹曰汝惟不伐天下莫與汝爭功有勞而能謙則上不疑而衆不忌也故可保終吉三以陽剛而處陽位羣隂之所主也五雖居尊位亦以柔道行之非九三之剛健孰任吾事哉繫辭曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也孔子于此一爻特發明精微使後學推類而求之思過半矣夫大臣有功則氣陵于人鮮有能自全者能以其功下人者幾希矣非盛德而知禮者能如是乎謙也者致恭以存其位者也存位者姑存其所有之位不失舊物而已蓋身安則社稷可保非固位也周公是巳方成王未知其志公乃作詩貽王以明已之勤勞豈顧戀寵祿者哉其意特在救亂而已象曰勞謙君子萬民服者人臣能使百姓心悅而誠服之則至矣盡矣謙卦于繇辭初六九三皆稱君子聖人之意深以小人為戒蓋小人之卑佞或似乎謙此聖主所宜加察而逺之也六四無不利撝謙象曰無不利撝謙不違則也六四處功臣之上居近主之地奉上接下一以柔順能發撝謙德者也故無往而不利也雖然以謙持已故無所不利也而已為大臣當存體貌上下之分不可踰也象曰無不利撝謙不違則者朝廷典禮上下名分不可違也故曰不違則也六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也人主操賞罰威福之柄能降尊位而謙故上下無不悅應雖不以利動而衆無不從者猶不富而能用其鄰也鄰臣鄰君視臣如比鄰則相親相比患難相恤疾病相扶持矣有鐘鼓曰伐無鐘鼓曰侵侵小而伐大也六五之君以柔道化服天下彼蠻夷猾夏冦賊姦宄獨負固不服故衆所不與人自奮勵則興師動衆驅之萬死一生之地而人樂為之用也故曰利用侵伐而象曰征不服也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也上六雖處無用之地而勢尊位極能謙巽逺下則聲聞廣逺矣又下有九三為之正應鳴躍而從之故曰鳴謙也然人臣以謙而得名固無忌惡之者但上六已居無位之地雖地望隆重而衆或不為之用雖利用行師但使之征邑國可也夫姦宄竊發所據不過邑國上六之臣足以當之使擁百萬之衆以當夷狄之強盛則上有震主之威下無腹心之助故象言鳴謙志未得也可用行師征邑國也非以謙居之則危疑之禍其可逃乎坤下震上豫利建侯行師象曰豫剛應而志行順以動豫豫順以動故天地如之而況建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考初六鳴豫凶象曰初六鳴豫志窮凶也六二介于石不終日貞吉象曰不終日貞吉以中正也六三盱豫悔遲有悔象曰盱豫有悔位不當也九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也上六冥豫成有渝無咎象曰冥豫在上何可長也震下兑上隨元亨利貞無咎彖曰隨剛來而下柔動而説隨大亨貞無咎而天下隨時隨時之義大矣哉象曰澤中有雷隨君子以嚮晦入宴息初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也六二係小子失丈夫象曰係小子弗兼與也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也九五孚于嘉吉象曰孚于嘉吉位正中也上六拘係之乃從維之王用亨于西山象曰拘係之上窮也巽下艮上蠱元亨利涉大川先甲三日後甲三日蠱惑也壞也有惑必有壞蠱繼豫宴安悅豫之後沒溺于宴安習染于奢靡湛玩于聲色天下事至此未有不敗壞者非有陽剛之才出乎衆隂之上振起而一新之則事之頽敝者未易革也治蠱豈一人之力能獨任之哉能大通乎天下使羣才皆為我用然後可涉難而有濟也彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也以卦體言之則震剛而巽柔以爻言之則艮以一陽在上而二隂在下巽以二陽在上而一隂在下陽在上而為主隂在下而為用治柔者剛也蠱之時必有所矯革能巽而止彼巽而我止之治蠱之道盡矣蠱至大通則能革故鼎新而天下治矣利涉大川往有事者當蠱之時世必多事非冒涉險難不能濟也陽剛在上隂柔處下上下理順雖未能安靜固無悔咎之可慮先甲三日後甲三日終則有始天行者順乎人情則因而循之違于人情則革而化之一治一亂若環之無端法令既久無不敝者聖人救敝之道因革損益與時宜之此何異四時之運寒暑之推遷乎蓋立春日出于甲故乾成于甲立秋日入于庚故坤成于庚隂陽天地之終始故經舉甲庚于蠱巽二卦以極乎變化之道也先甲三日後甲三日聖人欲大有為以救濫扶衰一新天下非創法制令大有所更革則不能也然民愚無知非先期而揭示則聽命者或不能達其情非後令而申審則從命者或不能通其意夫改更舊法創制新令非天下大壞王道板蕩之時豈敢易而為之哉唐虞三代損益更革皆不得已如天地四時之運隂陽之極勢不得不革故彖辭釋之曰終則有始天行也以言聖人創法制令亦如六甲之運勢不得不有所革蓋隂不極則陽不生亂不極則德不形豫蓋因彖辭而悟其理非臆説也諸儒之論惟陸氏近之陸氏以謂居其始以創其制要其終以慮其敝敝則復新終則復始猶天道之行四時之運也鄭氏以謂甲者造作新令之日甲前三日取改過自新故用辛甲後三日取丁寧之義故用丁也此説固善不知先庚三日為丁後庚三日為癸其義安在程子曰甲數之首事之始也如辰之甲乙甲第甲令皆謂首也治蠱之道當思慮其先後三日蓋推原先後為救敝可久之道先甲謂先于此究其所以然也後甲謂後于此慮其將然也其説固美然義則未明獨蘇氏以六甲為説先甲謂子戌申也後甲寅辰午也大槩言君子小人相為進退而治亂因之陽生于子盡于已隂生于午盡于亥陽為君子隂為小人故蠱巽二卦皆以甲庚為言則蘇氏之説獨異諸儒而非二卦大意然皆不可廢也子因備存其意以俟後之人發明而去取焉象曰山下有風蠱君子以振民育德風行山下物無不擾亂者故有蠱之象君子體此象以外振窮民內育已德振者拯救之也育者涵養之也振民所以育吾德也當海內離散敗壞之時能發倉廪蠲逋負則田野之間父子相保其為育德孰大于此初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也人君狃于宴安湛于逸樂天下蠱壞非得善繼之子堪任大事曷足以振起之宣王承幽王之後修車馬備器械復會諸侯於東都卒成中興之功祿山之亂明皇幸蜀肅宗即位靈武以復兩京可謂有子矣故考可以無咎然亂自我致非吾君之子孰與興之然則中興之業難以盡付之大臣故蠱卦特稱父子者以此然幹父之事其間亦有不可盡循者使為子者能每事加危懼內常恐傷父之志外不失責望者之心意常承順而不見背違之迹如此乃可終獲其吉也豈若異姓相代如湯武應天順人聲其惡過而無所忌畏者乎或稱父或稱考蓋兼存沒而言九二幹母之蠱不可貞象曰幹母之蠱得中道也臣事君與子事父母其義一也母為女君之象亦隂柔之主也九二以陽剛中正上應六五幹母之蠱也婦人之性雖曰隂柔然亦有鷙忍強戾果于為惡者非能一旦使之翻然以從善也當從容柔順以輔導之陳平之事吕后狄仁傑之事武后可謂得其道矣吕后王諸吕武后廢廬陵王二人未嘗面折廷爭然卒安劉氏者平也卒返廬陵王者仁傑也若王陵褚遂良輩徒至于殺身而巳何補于治亂哉易道所貴貴乎無咎悔不以殺身為善蘇氏解五十而學易可以無大過以謂非老于憂患之君子未易學也孔子之意蓋慮後世學易者有如馮道之流則比干伯夷不足貴矣爻言不可貞象言得中道蓋九二以陽剛履臣位之中陽剛則慮其守正而不知變故其戒如此九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也子事父臣事君雖負剛明之才足以幹正家國之事然失之太専則子近于不順臣失之太強固不能無小悔也但不至大咎而巳蓋九居三位重剛而不中以此事上本有大咎悔而巽能順之艮能止之故不至于已甚也人臣事君如子事父父有爭子君有爭臣其始未嘗無咎悔也然以剛且正故得終無咎也六四裕父之蠱往見吝象曰裕父之蠱往未得也天下蠱壞之時非強濟之才不能幹也幹者實能扶持其傾危若寬裕優容無所矯正而釐革之日復一日以茍延朝夕可也若有所往以濟時艱必不勝其任徒見鄙吝耳蓋六四隂柔無應處乎艮下寬裕自守可也蓋事有幾會非適當其時不可強行故象言往未得也六五幹父之蠱用譽象曰幹父用譽承以德也五為君位六五為繼體之君以隂柔而幹父之蠱是能從容柔順彌縫蠱壞以濟大業而無矯拂之過材雖不足而德可尚也以此得譽而天下歸之象言承以德者九二有中正之德奉承以德不失子道而已唐太宗肅宗非不才之子也即位之後使其父惴惴然常有意外之患有德者固如是乎上九不事王侯髙尚其事象曰不事王侯志可則也以陽剛有為之才當蠱之終處六五之上若不能遐舉逺引奉身而退則禍不旋踵矣伊尹既復政厥辟將告歸漢留侯佐漢得天下然後從赤松子遊其知此矣老子曰功成名遂身退天之道也象言志可則者聖賢君子能知進退存亡之幾固可為法于後世也讀易詳説卷三
