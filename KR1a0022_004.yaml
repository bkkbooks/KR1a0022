body:
  text: 讀易詳說卷四宋李光撰上經臨至剝兑下坤上臨元亨利貞至于八月有凶彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也凡以上臨下皆謂之臨人主君臨天下諸侯君臨一國皆臨也書言豫臨兆民凛乎若朽索之馭六馬孔子曰居敬而行簡以臨其民聖人臨下其致慎如此臨所以為大也况四隂在上以臨二剛剛非柔之所能制也故臨當剛長之初已有陽消之理聖人欲使後世為人上者常兢業以圖之也隂陽消長君子小人更為進退之象浸猶浸潤也一氣不頓進如草木之長日加益而人不知也兌說而坤順臨民之道以說順為本九二剛而得中六五以柔應之既說而順非濟以剛則强梗者或不可制故孔子曰臨之以莊則敬也如此則能大亨以正具乎元亨利貞之德其大與乾同功故能斡旋運量以臨制天下也然陽剛主進進而不已則治極必亂安極必危故戒以八月有凶也陽生于十一月為復十二月為臨此二陽方長之時至五月夏至而陽消六月為遁自子至未凡歷八月故云八月有凶也有凶者有凶之理未必皆凶也象曰澤上有地臨君子以教思無窮容保民無疆水之性汪洋放肆無以隄防之則有奔衝決溢之患澤上有地所以為臨民之象也臨民之道固當有以防範之豈徒厲以威嚴驅以刑戮哉君子體此象教民以禮義而思其所疾苦無有窮已容之則民有以措其手足保之則不相陵犯皆臨民之道也無疆者如此則其道廣大無此疆爾界之殊也初九咸臨貞吉象曰咸臨貞吉志行正也咸感也臨人必以無心而感格之蓋一陽在下與四為應四近君而位尊不可枉已以干進也志在行其正道而已如此乃可免乎咎悔而趨吉也九二咸臨吉無不利象曰咸臨吉無不利未順命也初九九二二陽在下六四六五以為正應蓋二為剛中之臣以應柔中之主君臣之間以無心相感以成君臨之大故吉而無不利也然九二雖不失臣道之正而才剛任專以事優柔之主事固有不可盡從者或逆其所順或强其所劣故象言未順命乃所以為吉而無不利聖人致其規戒之意深矣六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也三以隂柔而居陽位又二剛在下而三直出其上以勢位臨之非二陽所能堪也要之三為小人乘剛而不中有負乘致寇之象不能引身退避而徒甘言以媚悅于人其孰肯信之故無適而可也若能以憂危自處日虞禍患之至而克已下賢庶幾其免乎然則臨人之道生殺利害之權咸自已出六以隂柔之質而據顯位衆所不與况二與初皆陽剛君子方處內而將進其肯為之下乎儻不能深自悔悟惕然有淵氷之懼而日復一日禍可既乎故象言甘臨位不當也既憂之咎不長也能憂其所當憂雖有咎悔其能久乎六四至臨無咎象曰至臨無咎位當也坤體至順而四位尊居正與初為應上比于主而下臨于民臨之至善者也餘爻地逺而多懼四近君而情通以此臨民何咎之有故象言至臨無咎位當也六五知臨大君之宜吉象曰大君之宜行中之謂也臨之道貴乎廣大兼收並用不忌不嫉而已得無為用天下之道此君臨之大者六五以柔弱之資而履尊位能知此道則大君之所宜而無不吉也五以坤體順而應二二以剛中之賢悅而應五然人君駕御羣臣當以剛斷而専以柔順則强臣或有擅命之漸人臣事主當有從違可否而専以媚悅則姦佞者或得肆其欺故象言大君之宜行中之謂者謂順說之道貴得中而無過不及之患則君臣各盡其任矣上六敦臨吉無咎象曰敦臨之吉志在內也上六居坤之終處上卦之極順之至也在上而能以敦厚臨物不以尊貴驕人二陽在下而以順受之雖無應于陽而不妨其進厚之至也二陽在內而志常欲佽助之與夫居上位而蔽賢嫉能者有間矣故雖居臨之終宜凶而獲吉宜有咎而卒無咎也坤下巽上觀盥而不薦有孚顒若聖人化天下之道非諄諄然以言語感說之也以行與事示之使民得法象焉故其從也輕孔子曰正其衣冠尊其瞻視儼然人望而畏之孰有不敬憚而瞻仰者哉凡祭必先涗手而後酌獻盥涗手也宗廟之禮莫盛于始盥之時蓋精誠藴于內而威儀肅于外孔子于既灌之後不欲觀者蓋繁文縟節容有僞焉有不足觀者矣惟齊莊恭敬之貌顒然端委于上而天下化服之其道豈不簡且易哉彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也聖人感人心之道莫大乎誠敬故孔子言使民如承大祭然則欲民之化服豈勢力所能驅迫之哉九五以㢲順之德履中正之位為一卦之主以此觀天下猶日之方中赫然在上有目者咸覩此觀之所以為大也能齊莊誠敬儼然以臨其下則民皆觀感而化也若既盥之後則精意散漫假物然後見其誠則所感者末矣觀天之神道而四時不忒聖人以神道設教而天下服矣神也者妙萬物以為言者也四時行焉百物生焉莫之為而為者天何言哉此天之神道也聖人以此設教則不見其治之之迹故心既悅而誠服之後世蓋有假天之神道以誑惑百姓遂謂河圖洛書疑亦神道設教者若然則上世帝王亦有時而欺天下耶其說陋矣象曰風行地上觀先王以省方觀民設教風行天上則庸有不及物者風行地上則物無不鼓動者聖人體此象以制巡狩之禮省觀萬方以察民俗因其土風而設為教化一遊一豫為諸侯度則事無不順乎民心者此堯舜三代之禮至秦皇漢武巡游無度縱其侈心適所以擾天下而啓英雄窺覬之端失先王所以省方觀民之意由上之人事繁文而不務簡易之過也初六童觀小人無咎君子吝象曰初六童觀小人道也初六以隂柔最處卦下有童子之象所見鄙淺不出卑陋之間小人亦如之所見如此固難抗之使髙明也故無咎君子當大觀于天下如七十二子之觀仲尼見宗廟之美百官之富若以隂柔自守則吝道也聖人每以輕約望小人故待之不可不恕以逺大期君子故責之不可不嚴象言初六童觀小人道者固守淺陋此小人之道耳六二窺觀利女貞象曰窺觀女貞亦可醜也女子處房奧之中以窺于外𨼆屏幽閒所見雖小其貞足道故窺觀于女貞為利而非君子達觀之道也二以隂柔上應陽剛之君不能觀其大者當大觀之時而體隂處內非丈夫之事為可醜也六三觀我生進退象曰觀我生進退未失道也聖人既以身觀天下又當反身而自觀以為進退去就之義焉觀天下者觀乎萬物也反身而觀者內觀乎道也六三以隂柔而據陽位且有應乎上若可進之時而量能審已度時之宜以為進退焉如此雖未合道亦庶幾乎未為甚失矣六四觀國之光利用賓于王象曰觀國之光尚賓也六四得人臣之正居近君之位大臣之有道者可進之時也故觀國之光利用賓于王孟子曰故將大有為之君必有所不召之臣其尊德樂道不如是不足與有為也九五為大觀之主而四以大臣來觀國之光豈遽得而臣之哉乾之九二九五皆曰利見大人蓋在下之大人如太公伯夷則利見在上之大人在上之大人如文王則利見在下之大人也君臣相遇必能大有為于天下生民被惠宗社蒙福一見一用交相為利豈不難哉尚賓者賓之而不敢臣也九五觀我生君子無咎象曰觀我生觀民也聖人以身觀天下萬方有罪在豫一人豫一人有罪無以爾萬方能常作是觀則可以無咎蓋民生治亂係于上之舉措則吾之動作起居可不慎乎反求諸已而不可見則考之民俗之善否而已然則觀民俗者乃所以觀吾生也上九觀其生君子無咎象曰觀其生志未平也上九雖不在其位而以陽剛處九五之上有應于下非能恝然出于事任之外也則民之生理實任其責伊尹自任以天下之重有一夫不被其澤者若已推而納之溝中能于此作觀固可免咎象曰觀其生志未平者上九在事任之外非有職守者特以位髙望重未能兼善天下憂世之心志尚未平也震下離上噬嗑亨利用獄君臣相遇非道同德合則不能大有為於天下然自古迄今每多不合者有物間于其間也欲除去其間非威明剛斷不能也離震二卦合而成噬嗑九四為頤中有物之象蓋君側之强臣厄羣賢之進而間隔之者噬者齧也嗑者合也頤中有物非齧去之則終不能合能齧去之則上下內外亨通而無礙矣噬嗑非止用獄但既明且威則于用獄為利又小人强梗非加以刑辟斧鉞之誅不能除去之故云利用獄也周之管蔡漢之上官桀此二間也非成王昭帝明斷而卒除去之則周公霍光豈能成輔翼之功哉彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也人所以養其氣體必資于飲食故頤者養也頤中有物妨于飲食語言必齧去之然後乃得亨通卦體上下二剛剛主决斷與柔異體而相須噬嗑自否卦而來九五之剛分而之初初六之柔分而之五剛柔分而成離震震動而離明也雷必有電雷動電耀異體相合而章著也六五以柔而履尊位得中而上行不失離明之照雖九九五為不當位而有剛明之賢上為之贊助强梗者卒伏其辜故利用獄也象曰雷電噬嗑先王以明罰敕法雷以震驚之電以照耀之則其威明之行無能遁其情者噬嗑之象也聖人觀此象以明其刑罰謹其法令使天下曉然易避而難犯也初九屨校滅趾無咎象曰屨校滅趾不行也初上以卦材言之則為二剛利于斷獄者也以六爻言之則初上二爻無位為受刑之人易之取義廣大隨時言豈一端哉初最處下用刑之初為惡未大故屨校滅趾無咎屨履也校桎梏也趾有止之義屨校滅趾校之使沒其趾但拘囚之刑之至輕者也孔子于此二爻特發明其義曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大戒此小人之福也故屨校滅趾無咎上九亦小人之居尊位者也故以小善為無益而不為以小惡為無傷而弗去至惡積而不可掩罪太而不可解故何校滅耳凶此二者皆為受刑之人自二至五皆取噬為義則用刑之人也六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也六二雖處人臣中正之位而材實柔弱動而乘剛强之小人非深文峻法以治之未易勝也故噬膚不足以之滅鼻蓋不如是不足以服强梗也古之斷獄者當以矜恤為先六二雖失先王欽慎明恕之意以治小人未為過也故無咎象噬膚滅鼻乘剛者下乘初九其勢不得不齧去之用刑者小必傷人之肌膚故皆以噬為言六三噬臘肉遇毒小吝無咎象曰遇毒位不當也臘肉全體之物至難齧者也以喻强梗小人為間之大未易遽去之去之不以漸必遭其怨毒而反受其害然奉法以制小人有司之事雖失威斷之大何咎之有但小有悔吝耳三陽位而隂柔據之其遭怨毒蓋處不當其位故也使明足以照姦慝威足以服强梗片言可以折其辭則小人必聽矣九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也九四用剛直之道而處柔順之位位尊而任重人君恃以擊强梗除間隙也脯有骨曰胏最難齧者非剛直之材知難而守正者未易勝之也暴戾凶愎小人之剛也君子欲驅除小人必操公心由直道挾利器待時而動動不括乘間而發發必中矣若行不以艱難守不以正固恃其剛直輕易妄動則反為所齧矣故利艱貞乃獲吉也象曰利艱貞吉未光者去小人之術當使之退聽潛消于𡨕冥之中今道德之威不足以勝至于用刑獄以除去雖免凶咎未足為光大也六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也六五體雖柔弱而居得政之位操生殺之權其去小人若無甚難者然猶有乾肉之象以見小人難去如此五為去間之主而四以剛正輔贊而彌縫之用力小而見功多矣得黃金者得剛中之賢足以勝小人人君駕御大臣得其道則為腹心股肱之用不得其道則既任而疑之跋扈難制反為害者多矣五既以柔弱而乘九四之剛固賴以濟難然亦不可不怵惕常以危懼自處也如此固可免咎象言貞厲無咎得當者能貞且厲而免咎以見處之當其理也上九何校滅耳凶象曰何校滅耳聰不明也先王用刑無貴賤之間上九强臣也强臣而無位雖嘗為大臣而積稔罪惡至于不可掩覆解免固可以刑戮加之歡兜誣人功罪唐堯戮之管蔡挾武庚以叛周公誅之豈以位尊職重而不敢加以刑辟哉初九屨校滅趾趾止也欲使為惡者不復行戒之使入于善也上九何校滅耳凶以聰不明故以校滅耳而懲之惡積罪大無自新之理矣離下艮上賁亨小利有攸往賁飾之事固非聖賢之所尚也然質勝文則野交物之際文亦不可已有其質而加賁飾焉所以能亨通也譬之車服器械適用而已加以雕鏤文采徒為觀美雖不可巳亦不可過也故小利而已若涉險難非文飾所能濟也彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下乾坤純隂純陽之卦有父母之象乾施一陽于坤而成震坎艮故謂之男坤施一隂于乾而成巽離兑故謂之女六十四卦皆因乾坤而成非獨六子而巳離下艮上為賁離體本乾坤以一柔來居其中以文二剛故剛不至于暴而物無不通也艮體本坤乾以一剛分處于上以文二柔剛柔相雜而相濟隂陽異位而相成此卦所以為賁也二在下卦之中故言來來者來居于內也來居于內變而為離則文明矣九處上卦之極故言分分處于外也分處于外變而為艮則止靜矣隂柔無忤柔來居中而文剛則可以通物矣故亨陽剛至健剛上而文柔則可以涉難矣故小利有攸往也日月之往來星辰之布列剛柔錯綜隂陽相交自然而成理者天文也隂麗于下而文明其上陽止乎上而節制其下禮樂政刑必假于人為者人文也觀乎天文則四時之代謝可察矣觀乎人文則天下之風俗可變矣聖人推廣賁飾之意豈徒為觀美而已仰觀天文俯察人理必歸于有用所以成孝敬而厚人倫美教化而移風俗者用此道也此賁飾之大者也象曰山下有火賁君子以明庶政無敢折獄山者鳥獸草木之所由出也山下有火則火景所燭物無不照故有賁之象君子體此以明庶政則凡見于政事者無不加賁焉獨獄訟之間當用其誠實而以法令為師學未及于古人其敢以片言折之乎獄者性命所係聖人于此有畏懼之心焉故曰無敢折獄也初九賁其趾舍車而徒象曰舍車而徒義弗乘也九居于初此陽剛君子𨼆而未見者也發跡之初尤當自重原憲之貧捉襟肘見納屨踵決及歌商頌之詩聲若出金石髙車駟馬者蓋有愧焉車固君子之器小人而乘君子之器盜斯奪之君子于辭受進退之際惟義之從耳顔斶緩行以當車君子不以為辱所治愈下得車愈多者君子不以為榮賁之初九能自貴重寧徒行而舍軒車之盛其為光華賁飾之道莫大焉初比于二而正應在四不比于近而逺從正應故有舍車徒行之象伊尹耕有莘之野非其義也非其道也祿之以天下弗顧也繫馬千駟弗視也君子居窮𨼆約能自重如此豈以徒行為辱乘軒車為榮哉六二賁其須象曰賁其須與上興也須附于頤頰一身之中為最顯此賁飾之出于自然者二比于三同體者賁雖不能自立隨質而動得所麗則相待而成蓋文質之相須非能有所加損也其動作皆因其所附之質耳故象曰賁其須與上興也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也賁飾之道常失之華侈而無其實若有德以潤其身而飾以粲然之文如玉之藴于石珠之媚于川其潤澤光彩有不可掩者故曰賁如濡如也永貞吉者九三以陽剛而居陽位處離分之極賁之極者賁飾之盛則流而為奢淫故戒以永貞則吉也永貞者長守正道不為羣隂之所誘則小人終莫陵之也六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終無尤也四與初為正應初以陽剛在下守節義而輕富貴者也四欲往從亦當以潔白之操應之故賁如皤如也皤潔白也白馬翰如者聘賢必以車馬馬取其色白者詩人以皎皎白駒在彼空谷生芻一束其人如玉亦取潔白之義翰如飛翔而往也聘既以其道則幡然而來矣匪寇婚媾者古之聘賢猶嫁娶之用媒聘故以婚媾為喻四之應初初之從四乃正應也而九三以陽剛間乎其間四又乘之故與三為仇所以遲疑而不敢遽進也非三為難則四與初合久矣夫隂陽之相求剛柔之相賁乃理之常六四下應初九位固當矣又乘九三之剛此當位適所以致疑也初與四既以正道相應小人為間者終莫能害之故終無尤也六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也六五當全盛之時為賁之主固可以崇臺榭廣苑囿之觀六五居中正之位雖賁于丘園而束帛戔戔不為侈也故雖吝而終獲其吉象言六五之吉有喜者吝道宜有憂虞當賁之時能以儉約自處後必獲福故有喜也又丘園𨼆者所寓如初九之賢舍車而徒守其節義而安于貧約者人君所當聘用也三𤣥二纁謂之束帛物薄而禮厚當賁飾全盛之世菲薄乃如此以禮為主而非吝也故終獲其吉以卦體言之六五一爻聖人示奢淫之戒其意深矣然以丘園為隱者所寓其從來亦逺矣姑存二說不敢决也上九白賁無咎象曰白賁無咎上得志也賁之道雖尚乎賁飾然舜用漆器羣臣諫焉蓋漆器不已必用犀象犀象不已必用金玉觀賁之六爻雖本于賁飾而常以質素為先上九賢人處尊位而衆所視效者故以質素為飾則其所自奉者無華侈之過奢靡之失也故曰白賁無咎象曰白賁無咎上得志也所志在于儉約今已處顯位而能行其所願則平昔之志遂矣故曰上得志也坤下艮上剝不利有攸往剝復否泰之循環固出于君子小人之用舍然隂陽消長若非偶然者當否剝之時能用君子則扶持安全不至于亡耳故否卦繇辭言否之匪人蓋有非人力所能為者聖人蓋難言之要當歸之人事使人主常兢業以圖之遇災而懼側身修行宣王所以致中興也曰我生不有命在天此紂之所以亡也小人道長君子道消故曰剝聖賢君子遐舉逺引不可榮以祿之時故利于退遁不利有攸往也彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也剝如剝棗之剝剝落必至于盡也小人之害君子非至于盡則必有所忌憚而不得恣其所為故剝勢必至于盡也柔變剛者剛方者君子也柔佞者小人也小人得志則能竊人主威柄盡去君子而呼吸羣小聚之朝廷則據要路者皆小人矣小人道長則知幾之士當引身而去不然必遭傾陷故不利有攸往也然君子之事無可為則順適吾意全身而去卦有順止之意順適吾意小人之凶熖或可止也坤順而艮止聖人于剝之時能默觀此象以為進退行藏之决豈復有禍悔哉消息盈虛天道運行之常理陽既消則有息隂既盈則有虛君子能尚此則危行言遜靜觀其復可也若强亢激拂如李膺袁安之流身膺刑戮不失忠義之節而非聖人之所尚也雖然事固有可以死而不敢茍免者孟子曰可以無死死傷勇若王子比干雖知紂不可諫寧諌而就死顏真卿知盧杞之得君李希烈之强暴然卒以此而蹈大禍則義重于死故也使世之學易者専以明哲保身之術求無咎悔以全其身亦非聖人之所貴也象曰山附于地剝上以厚下安宅山當峻極于天今反附地有剝之象君子宜處大位以制羣小今反伏而在下為小人所制則其時可知矣人君觀此象雖未能有所進退且當培其根本使基業堅固有不拔之勢小人一旦退聽則易于興復也上能厚下安宅則敦本務農不失其時雖當亂世而百姓免離散失業之患古之聖王每于此加意焉七月之詩是也百姓不失本業各安其田里養生送死而無憾雖驅之使為亂不可也秦之苛暴一夫作難而社稷傾隕矣剝之六爻皆有剝下之象聖人垂戒後世之意豈不深逺哉初六剝牀以足蔑貞凶象曰剝牀以足以滅下也自昔媒蘖禍亂未有不自人主致之蓋上有奢淫之主則下必有刻剝之臣其致禍亂之術如循一軌剝者剝下以媚上也剝下媚上其勢必至于大亂牀者人所安處小人竭民之力斂民之財以奉其上使斯民離散泮渙失其所常處而莫之恤也如剝牀以足正道將傾又輕視而不恤也蔑無也視正道若無有也蓋小人得路則蔑視君子其蹈凶禍必矣象曰剝牀以足以滅下者滅盡也小人于正道則蔑視而不恤于細民則竭其膏血至盡而不顧知固寵保位而已卒至天下土崩首領莫保雖悔何及哉故易以損上益下謂之益損下益上謂之損然則滅下者乃所以自滅也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也先儒以辨當第足之間近于牀身故曰辨剝道漸進蔑視正道若無足畏者而卒蹈凶禍如裴延齡皇甫鎛之流是已象曰剝牀以辨未有與者六二上無應援天下莫與之象梁襄王問孟子曰天下烏乎定曰定于一曰孰能一之曰不嗜殺人者能一之曰孰能與之曰天下莫不與也刻剝之臣其殺人也甚于寇盜豈有與之者哉小人得路雖不為天下公論所與然方操生殺利害之權好爵重祿足以誘之豈能使其類盡不與之哉特不為君子所與耳六三剝之無咎象曰剝之無咎失上下也剝之時羣隂用事獨一陽在上又處無位之地三亦處陽位而正應在上此小人隂交乎君子者故得無咎處剝之時居羣隂之間不能遐舉逺引但能隂通乎在上陽剛之君子特免乎凶禍而已孔子曰中人以上可與語上中人以下不可以語上蓋正道勝則小人亦有悔過從善之心正道不勝介乎隂邪之間能知君子而失其黨類之心聖人亦恕之免誅殛之禍此待小人之術容其悔過不為己甚者也處羣隂之間上下皆隂故曰失上下也六四剝牀以膚凶象曰剝牀以膚切近災也剝牀以足剝牀以辨此皆身外之物失其本業之象至于剝牀以膚則鬻妻賣子身填溝壑矣正道剝盡直凶而已六四近君之大臣小人之處乎顯位者勢足以有行故剝之為甚象曰剝牀以膚切近災也禍切于身不可避免蓋民為邦本剝民及膚則君臣皆受滅身之禍故曰切近災也六五貫魚以宫人寵無不利象曰以宫人寵終無尤也六五隂柔為剝之主小人恣為姦欺以剝正道而致亂亡者皆五為之剝道至此雖處尊位勢已不能制若一旦悔悟欲盡去之則反受其禍矣為六五之計者莫若姑順適其意而稍奪其大權如此則于人主無不利宫人者婢妾宦寺之象也小人既久用事不無憂危之心人主不能以道消息顯排而亟治之則計生無聊禍有不可勝言者能以婢妾宦寺待之使之駢頭而進不見嫌惡之迹則可終無尤悔以俟君子之進正道之復也聖人為後世之慮如此漢之獻帝蓋粗知此者至魏髙貴鄉公唐昭宗欲于剝盡之時稍立權綱遂不免于禍此足以為後世鑒矣上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也隂陽二氣不能頓進猶君子小人不能頓長隂之剝陽自足至膚為害加甚則小人道長亦極矣上九處羣隂之上雖不任事然卒消小人變剝為復也果至于碩大不食則能反于土而為生出之漸此一陽之在下者也君子能以百姓為心故民所愛戴卦以五隂而乘一陽君子得衆而民戴之有車輿之象小人但知刻剝百姓以為進身之計耳故象言君子得輿民所載也小人剝廬終不可用也聖人之意蓋謂剝之極君子之道幾絶而僅存賴有一君子以扶持之耳若于斯時尚或參用小人小人浸長復消君子則斯民受弊必致流散失業之禍故云終不可用以為萬世之大戒也讀易詳說卷四
