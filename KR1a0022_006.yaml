body:
  text: 讀易詳説卷六宋李光撰下經咸至蹇艮下兊上咸亨利貞取女吉無心感物曰咸卦以艮兊為象言少男少女之相感以見所感之深蓋天理之自然而非人為也聖人感人心以此何往而不通哉夫男女相感常失于不正不正則有不待媒妁之言者能相感以正則夫夫婦婦而家道正矣故利貞然後取女吉也利貞者止乎禮義也彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣咸之為義蓋言無所不感男女交感而志通本乎情性非有心也非有言也易以艮兊為象故有男女之義柔上而剛下所以能感也若柔巽隱伏而剛陽居上二氣各行豈能相感故坤上而乾下為泰坎上而離下為既濟皆有交感之義此感而彼應蓋有感而不應者惟二氣感應然後相與而無間也止而説男止而女説也夫女子處乎幽間之中非有求焉則不應也如士以道義自重非幣聘先焉則不往也故男止乎下而女説乎上然後通亨又惡不由其道利貞者相感不可不出于正親迎之禮男常下女所以為正取女以此則家道之吉可知矣天地以氣相感而成化育之功聖人以道感人而致和平之治聖人極論咸之感物其大如此達觀之士閲造化之變默觀其所感則天地萬物之情舉一物足以盡之矣聖人欲窺造化之妙則自其至近且易見者觀之故咸之辭以男女為象豈非衆情之所同近而易見者乎象曰山上有澤咸君子以虛受人易言山澤通氣山之與澤氣自相感澤本居下今反在山上尤見相感之深蓋山氣上騰澤性下潤上騰者受澤之潤蒸而為雲雨下潤者資山之氣畜而為淵泉君子體此象故能以虛受人如山藪之廣大無所不容無所不納也我能以虛受人人之資于我者必衆矣故智者獻其謀勇者效其力翕受敷施如山澤之相資也初六咸其拇象曰咸其拇志在外也物之相感以精誠為主不精不誠不能動人咸之為卦本以無心感物而六爻所感各以所遇之時為深淺一人之身拇最居下體咸其拇所感至末也象言志在外者艮下為內兊上為外初應在四故心之所係者専于四而已六二咸其腓凶居吉象曰雖凶居吉順不害也腓雖拇上猶在下體之中體既躁動豈能趨安貞之吉哉咸其腓本蹈凶禍而能退以靜處則可轉凶而獲吉也二得中正之位故能變凶為吉餘爻欲免悔吝難矣象言雖凶居吉順不害也二正應在五五履尊位臣子之道順以相感于義無害也順而害于義則妾婦之道耳九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也九三以剛陽之才不能特立獨行而係應在上雖所進愈上而所執每下隨人而已往則為所鄙賤是吝道也三雖處下卦之上而未離下體當斯時也能安貧守道退而窮處非其招不往往無不利矣故象曰咸其股亦不處也志在隨人所執下也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也九四兊體居下為説之始女説而有應非貞則入于邪矣故貞然後獲吉而悔亡悔至于亡非獨無悔而已餘爻皆近取諸身故以拇腓股脢輔頰舌見所感之深淺四獨不言所感者四居股之上拇之下則所感者心也心居中虛以貞感物則無所不通故九四一爻專以貞為主大哉貞乎天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也咸之感物以貞則無適莫偏係之私精神心術默而運之神而化之豈有心哉孔子釋此爻特盡其精微以見所感之大日月寒暑之往來以成嵗也尺蠖之屈以求伸也龍蛇之蟄以存身也屈而未信者如蠖之初行必屈以求在後之伸也龍蛇遇冬必蟄以待春夏之奮也聖人觀萬化之源精義入神以致用則退藏于密者非獨善其身也利用安身以崇德則出而應物者非危其身也咸之感物至此則盡矣又曰窮神知化何也蓋窮神則知神之所為矣知化則造物之權在我矣豈非德之盛耶故以此終之也象曰貞吉悔亡未感害也憧憧往來未光大也蓋能貞則吉而悔亡未能有所感則悔吝隨之故曰貞吉悔亡未感害也咸之感物何容心哉今乃憧憧往來于心者特其平昔之儔類耳非能出乎思慮之表則所感者狹矣故曰憧憧往來未光大也若文王之不識不知順帝之則豈有此疆爾界之殊哉九五咸其脢無悔象曰咸其脢志末也五履尊位當為咸主可以感人心而致和平之功今反一趨於靜默無所作為故得無悔而已先儒以脢為脊肉子夏易傳曰在脊曰脢皆居無用之地雖無競躁之纍而志應在二所感者末矣故象曰咸其脢志末也上六咸其輔頰舌象曰咸其輔頰舌滕口説也上六處説之終不能以誠意感格天下而區區口舌之間曷足以感人心乎輔也類也舌也皆語言之所自出夫以身教者從以言教者訟其身正不令而行其身不正雖令不從上六感人心以此衆所鄙賤特以處尊位能以柔説待物故不著凶咎之應然小人之態亦可見矣聖人之所棄凶咎不足以言之象言滕口説者騰播其言語以媚説上下冀以感人聖人所深惡而鄙賤之矣巽下震上恆亨無咎利貞利有攸往常固君子之所貴也常而不通則執中而暗於權遭變而失其機合散屈伸與體相乖故恆亨然後無咎無咎然後利貞既通而正則涉險犯難而無不利也彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久于其道也天地之道恆久而不已也利有攸往終則有始也天尊而地卑陽尊而隂卑君尊而臣卑夫尊而婦卑此天下之常理而不可易若尊者守其常尊卑者守其常卑天地不交上下情隔非常久之道也故剛上而柔下者貞也雷以動之風以散之雷風相與巽順而震動剛柔相濟而皆應雷風相與而不相悖如此異乎執一而不知變者是乃所謂貞常而能久者也彖辭以此數者釋一恆字固足以盡之恆固可以致亨亨則無復過咎矣亨而不已則或失其所守故又欲其趨于正亨通而能不失其正其道可久固守其常而不知變與夫通物而不已則入于邪皆非可久之道也天地所以能長且久者其位不易變化無窮也使天地固守其卑髙之位而無相感相應之道則天地之道或幾乎息矣四時之變終而復始息息不停故生殺代謝若環之無端而不可窮聖人惡夫執滯不通若膠柱而調瑟者故于恆卦特曰利有攸往言利有所往則可以濟物而其道無方乃不失其所謂常也故釋之曰利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恆而天地萬物之情可見矣恆久也天以運轉不窮為恆故日月麗乎天而能久照地以安靜不變為恆故百穀草木麗乎土而能久成天假日月以為晝夜故日月有往來天之體穹然乎其上者未嘗變也地假四時以成寒暑故四時有代謝而地之形隤然乎其下者未嘗變也觀乎天地則恆之義可見矣聖人默觀天地造化之變如日月四時往來變化而得貞恆之理故能達乎天地萬物之情位乎兩間而成三才之功也周室之興本乎后稷十五王而文基之十六王而武居之其積德纍仁可謂久矣故成周之治獨冠百王功德之被海隅者廣仁恩之浹生靈者深故曰聖人久于其道而天下化成也象曰雷風恆君子以立不易方雷風所以為恆者以異體而相成也大象統言二卦恆久之道故以雷風為喻蓋天之有雷風猶朝廷之號令其震動萬物必以其時君子體夫雷風相與有恆之理故能特立獨行而不為窮達禍福所移古人有行之者伯夷叔齊至餓死不食周粟雖斧鉞在前而不顧此能恆其德行而立不易方者若夫達權適變則有六爻之義存焉故初六以浚恆而凶六五以恆其德貞婦人吉而夫子凶上六又以振恆而凶也初六浚恆貞凶無攸利象曰浚恆之凶始求深也人之相與皆自淺而馴致于深故可久也君臣之分朋友之義夫婦之情莫不皆然六以隂柔居恆之始雖與四為應遽求深交故雖貞而猶凶也以此為恆何所利哉浚者始而深之也恆久也久于其道日以浸深故恆久而不變也六處巽初巽性深入不俟情義之合凶其宜矣以此為恆何往而利哉古人應上之求必待三聘而後往三顧而後見者慎其始也始而求深未有不蹈凶禍者彭寵初見光武自負其功意望甚髙謂當迎閣握手交歡並坐而帝接之不能滿意至反叛以取滅亡故象傳曰浚恆之凶始求深也九二悔亡象曰九二悔亡能久中也九二以陽居隂固當有悔然二處巽之中順而得中則悔可亡也夫以陽剛之才正應乎六五柔弱之主能久于中道得人臣之正而無犯上之嫌何悔之有哉九三不恆其德或承之羞貞吝象曰不恆其德無所容也巽以柔順為體巽入為用而九三以剛而處陽位正應在上而下牽于初進退無常無常而剛柔失位可謂不恆其德矣故有以隱逸自名而志在要祿以廉儉飭身而終于貪競者謂可以欺愚惑衆而世固有不可欺者若察知其姦適足為辱故曰或承之羞以此為恆雖正而吝况以不正處之乎象曰不恆其德無所容者不恆之人善人固惡其矯妄不善之人亦疑其反覆衆所不與殆將無所容于天地之間也九四田無禽象曰久非其位安得禽也人臣居近君之位必有以效其職勝其任故雖久而無竊位之譏也九四以陽居隂雖才足有為而處非其地欲以久安其位為恆豈能有所獲乎夫禽獸之害稼穡則當獵取而除去之今既不能為國攘却冦患乃偃然據非其位無功受祿如田獵而無獲也故象曰久非其位安得禽也既據非其位雖久而徒勞禽何可得也六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也聖人所謂恆者以能變為常若固守而不知變但趨于靜貞而已豈能通其變極其數以成天下之務哉婦人以貞順為恆故孟子曰無違夫子以順為正者妾婦之道也故婦人則吉也丈夫則當從權制變操縱在我若委曲循物而為婦人之行則失其剛陽之才反蹈于凶禍矣象曰婦人貞吉從一而終也夫子制義從婦凶也六五以柔弱而履中位其象以婦人則吉夫子則凶蓋婦人以幽間柔靜為德守志厲操不踐二庭故貞而獲吉丈夫制義有權有變適于義而已義苟不可雖君父之命有不得而從者若反從婦人之行則凶矣抑婦人當以從夫為正夫而從婦則牝雞司晨家道亂矣唐之髙宗是已上六振恆凶象曰振恆在上大無功也震動也上六處震之終理宜靜復而反振動之以振為恆其動無節失時而凶矣象曰振恆在上大無功也夫處恆之極當震之終不能安靜以復其恆尚欲有所作為以振動天下其誰肯從之故大無功也豫竊考恆之一卦聖人于六爻反覆詳論以深明其義蓋慮後世昧乎真恆之禮而以妄為恆者多矣自初至上多凶而少吉雖九二一爻處乎中正之位僅能免乎凶禍六爻雖居尊位恆其德貞獨婦人吉而夫子猶不免乎凶也周公作立政以用常人為先孔子曰人而無恆不可作巫醫大哉恆乎初之浚恆上之振恆九四之久非其位為恆是有心于為恆者皆不免凶悔吝也況乎不恆其德若九三者乎嗚呼非通其變窮于理者曷足以語聖人之真恆哉艮下乾上遁亨小利貞孔子曰幾者動之微吉之先見者也君子見幾而作不俟終日遁之時雖四陽處上而二隂在內為主此小人浸長之徴也君子覩其幾微察其徴兆則釋位而去乃可免禍故隱居求志志得而心亨萬鍾之祿有所不顧卿相之貴有所不屑身雖屈而道愈伸故遁然後乃亨也否之匪人不利君子貞遁未至于否有否之漸能以貞固自守者但小利耳不可大有為也彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉夫立人之朝一旦欲奉身而退豈可遽哉故剛當位而有應此可遁之時也昔人謂進身非難乞身之難者如此方小人浸長之時當委曲沉默使不見其欲去之迹但卒歸于正可也彖曰浸而長者蓋知幾之士知四陽雖衆而已往隂柔雖微而處內小人之道必浸而長浸猶水之潤物漸漬而日衆也遁之時謂可遁之時遁之義謂當遁之義觀其時察其義二者皆當遁則可以全身逺害以俟天道之復國之治亂民之休戚係焉故曰遁之時義大矣哉程氏以謂聖賢之于天下雖知道之將廢豈肯坐視其亂而不救必區區致力于未極之間不可大貞而尚利小貞也竊為不然聖賢所貴乎知幾者謂當辨之于早脫之于衆人未覺之時故可免也故曰知幾其神乎若如漢王允之徒遲回顧戀不免殺身徒速其禍耳何輔于治亂哉象曰天下有山遁君子以逺小人不惡而嚴天積氣而在上山積形而在下天陽也山隂也山雖峻極豈能侵逼于天小人雖長固不能害君子此天下有山所以為遁也君子處身于不可犯之地如天之不可階而升也逺小人之道使之有所畏憚而不能陵犯可也豈悻悻然懷憤含怒遽以惡聲加之哉有如顔真卿段秀實之徒一旦忠義奮發雖蹈大難而成仁者是固聖人之所取也言豈一端而已哉初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也小人將進亡徴已見非衆人所知也故聖人于此察其幾微髙舉逺引故能保身全家以免乎世患若幾事不先遁者已衆然後欲去是為遁尾尾者後衆人而遁讒間乘之此危道也遁既後時故勿用有攸往書稱微子去之去之速也箕子為遁尾故有囚奴之災雖然如漢孔光張禹之徒居昏暗之朝知不可脫而括囊全身者蓋妄有見于不往何災之義此又學者不可不辨六二執之用黃牛之革莫之勝説象曰執用黃牛固志也遁以二隂在內為隂長之漸知幾之士及其未盛皆為遁藏之計獨二以隂柔處內上有九五之應君臣志合膠固如黃牛之革説者雖多莫之能勝此小人挾君寵以害君子之術也自古小人欲害君子必先順適其君深得其所欲然後得以逞其私也人主利其順適之快故排衆議而用之天下之勢雖土崩瓦解而不悟也牛性至順黃為中色順之至也以至順而膠固其君脅持內外其勢必至於牢不可拔也故象曰執用黃牛固志也六三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也君子知天下將亂小人必得路人主不足與有為則悠然長往然後可以保身而全家若顧戀寵祿懷其惠以係纍其心未有能超然獨往者也如此未有不反受其危害者九三處下卦之極無應于上而密比于六二隂柔處中當權之小人冀以私意深交而固結之亦已疏矣小人在位方挾君寵以害君子特未得其處耳豈可恃哉若家臣婢妾以私恩畜之固可得其死力故畜臣妾則吉也象言係遁之厲有疾憊也畜臣妾吉不可大事夫有所偏係則心力俱疲矣當可遁之世與豪傑謀之未必盡濟况區區私惠豈足以當大事哉九四好遁君子吉小人否象曰君子好遁小人否也好與好惡之好同四有應于初為初所好亦好于初能不顧戀于寵祿遐舉逺引而去故獲吉也小人泥于私恩朋淫相比豈能見幾而作不俟終日哉雖未蹈凶禍聖人之所鄙也揚雄曰鴻飛冥冥弋者何慕焉蓋言違患之逺也孔子言棖也欲焉得剛非九四之剛決安能不牽于私欲哉九五嘉遁貞吉象曰嘉遁貞吉以正志也九五居尊為遁之主非自遁也旌賁巖穴招聘隱淪故曰嘉遁聖人嘉與隱遁之士共濟艱難故貞則獲吉也九五取中正之位其可不正乎不正則遁者亦逺矣象曰嘉遁貞吉以正志也夫有道之士知小人之浸長海內之必亂人主不足與有為也故寧憔悴江湖之上甘心寂寞之濱若將終身為此嘉遁之主側席幽人旌車蒲輪相望于巖穴中者豈徒為觀美哉將以正吾之心術有補于治道而已故曰嘉遁貞吉以正志也上九肥遁無不利象曰肥遁無不利無所疑也自昔隱遁之士皆樂枯稿處間曠飢寒切身而不悔者蓋明乎消長之幾濟以剛決之勇處身逺外而無上下之交混迹編氓而無聲名之纍則其進退豈不綽綽然有餘裕哉古人避世而遁未有不厄窮者上九獨能饒裕者蓋去不為尾故不蹈初六之厄義不反顧故無九三之係內不忌于小人上不咈于人主故象言肥遁無不利無所疑也言上下內外無纎芥之疑此最善遁而無形迹者也遁既以初為尾則上九豈非首遁者乎乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣象曰雷在天上大壯君子以非禮弗履初九壯于趾征凶有孚象曰壯于趾其孚窮也九二貞吉象曰九二貞吉以中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也六五喪羊于易無悔象曰喪羊于易位不當也上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也坤下離上晉康侯用錫馬蕃庶晝日三接康侯能康濟天下之侯也人臣孰無康濟天下之心亦孰無康濟天下之才然志或不得伸才或不得展者不遇其時也明出地上為晉故晉為明主之象明主在上故有康濟之侯也侯諸侯也諸侯雖有土地人民亦臣道也然侯皆兼人臣人臣未必皆侯也自昔帝王之興皆建侯樹屏以藩王室既有社有民常失之不順漢雖分王子弟終至七國之亂至唐假節藩鎮山東奧壤化為戎墟征伐禮樂不自朝廷出是諸侯之貴乎柔順也離上者大明之君也坤下者柔順之臣也上有大明之君則下有柔順之臣用錫馬蕃庶晝日三接以見明良相遇恩意浹洽無復疑間故錫賚之繁燕見之數如此也彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉進者日之始出乎地上而尚進也蓋晨明不及于朏明朏明不及于旦明其進必有漸也晉者日之始進而未遽昃也此曰之方進而盛也故有明出地上之象順而麗乎大明諸侯能恭順而麗乎大明之君也柔進而上行者六五之君以柔道而升乎中正尊極之位故柔能進而上行也人臣竭恭順以事上故亨其便蕃之錫而不辭人主屈已以接下故盡其勞謙而不倦也象曰明出地上晉君子以自昭明德明出地上如日之升晉者明之漸進也以明為主故于卦為晉君子觀此象以自明其明德昭者使吾之德明照天下萬物無不覩也明德在我非自外入故曰自昭明德也初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也古之君子未嘗不欲立人之朝然其進非冒寵也必將使是君為堯舜之君使是民為堯舜之民其任既重其責亦深安得不惕然思所以稱其職勝其任乎方其進也非敢自肆也故曰晉如摧如也摧者摧抑恐懼之貌也雖能摧抑恐懼而不知以堅正自守安能一正君而定天下乎初六坤體在下以順為正則妾婦之道耳故居貞然後獲吉也人臣得君之初體既柔順疑者必衆其心志之所存安能使內外交信而不疑乎方危疑之際若竊竊然懼人之莫我知而不能寬裕自處阿意者必喜議已者則怒其招咎悔必矣周公之相成王逺則四國流言近則王不知及居東三年然後罪人斯得則罔孚而能裕者周公一人而已子産不毁鄉校謗者自息則其次也象曰晉如摧如獨行正也裕無咎未受命也人臣方進用之初已有輕去就之義非獨行其正而不慊于心者能如是乎初六雖正應在四然最處卦下如人臣始進而未受命者其進退豈不有餘裕哉六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也君子之進也欲以行其道也晉如愁如憂道之雖行也蓋六二雖處中正之位而無應于上君臣之情未通故當進用之初憂思之深也貞吉者正則獲吉也人臣事君當以正為主能以貞正自處道合則從不合則去晉之為卦專主乎晉故不可以不正也人臣能守正則宜享其福祿故爵命之便蕃不期而自至矣故受兹介福于其王母也二在坤之中六五又處離之中皆重隂也以柔居尊故以王母為象象言受兹介福以中正者處中居正上有至明之主羣邪退聽讒間不行所以能受福也不然守正者必受禍矣六三衆允悔亡象曰衆允之志上行也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也離下坤上明夷利艱貞日月麗乎天則明今反入于地中有暗君之象暗君在上明者必傷君子當隱遁退藏之時也若露其光景耀其聰明則傷之者至矣故利在艱難而守正然後免乎禍患也彖曰明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之內文明而外柔順以蒙大難此文王用此道以處昏亂之時也故曰文王以之利艱貞晦其明也內難而能正其志此箕子用此道以立昏亂之朝也知時未可伐雖三分天下有其二猶服事殷故蒙大難而卒免于禍也知君不可諫而晦其聰明履險難而不易其所守故為之奴而卒歸于周也此古之聖賢當昏亂之時出處去就其精微如此非深達乎天下之事變明乎象數之幾深者孰能與于此哉箕子商之宗臣故言內難象曰明入地中明夷君子以蒞衆用晦而明大象因義以取象方明出地上晉則曰君子以自昭明德方明入地中明夷則曰君子以蒞衆用晦而明各以類求言豈一端而已夫明入地中明之傷也然君子方其蒞衆則惡于太察昭昭若揭日月而行則非容衆之道故貴乎用晦用晦不自用其聰明也我之觀天下也如處乎壼奧之內以觀門庭之外則無不見也夫以一人之聰明而欲察衆人之情偽儻非用晦則明有所不至矣初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也君子仕昏亂之朝欲為脫身之計不可不速緩則受禍矣明夷于飛者雖欲去之速非匿迹戢影則懼有矰􅗤之患故垂其翼也初九為明夷之始然身已在內九雖剛決有必去之志然不可亟也雖君子遭難厄窮脫身避禍蓋有行不及食者矣方其欲去也故當垂其翼以示遲回不去之意及其既去也則三日不食以見去之之亟馮道之脫虜庭用此道也有攸往主人有言何也當危難之時倉皇而去國若逋逃然故有往則人必疑之但有言而已未至于害也象曰君子于行義不食也既意在必去雖餓其體膚有不暇恤者亦去國之初知社稷之必亡有不忍獨全之意其憂憤不食亦義所當然也六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也六二居中得正而以柔順為德當明夷之時傷不至甚但夷于左股而已雖害于行而能極其壯馬從容求去逺其危邦暗主而獲吉也人之手足右強而左弱夷于左股弱者傷也象曰六二之吉順以則者六二所以獲吉以能柔順而不至失已也則者行有準繩也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也暗君在上而下有剛明之臣其相應也非相合也乃相敵也殷紂武王是也不以六五為君位而以上六為昏主之象何也紂之無道民怨神怒雖在上而已失中正之位矣以失位之暗君而當剛明之聖臣天人之心蓋可見矣故明夷于南狩得其大首此武王克商之時也大首者渠魁得者言取之之易也周之伐商應乎天而順乎人其興也勃焉然猶觀政于商師踰孟津遲回不亟進者蓋有待焉耳故正之不可疾也象言南狩之志乃大得者武王伐紂若田獵然去其害民者而已南狩者自北而南武王都鎬商自成湯皆都于亳詩云宅是鎬京武王成之書曰湯始居亳從先王伐紂之志決矣至此乃始克商故曰南狩之志乃大得也六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也當明夷之時昏佞相濟故六四以隂柔在髙位而獲見容也知幾之士處暗君之朝皆遐舉逺引惟恐前去之不速其次相招為祿仕可也姦佞之臣方且乘時昏亂隂揣其私使卒得所欲故能入其腹而獲其心意雖出入門庭而無所憚也夫正臣不可事邪主明良昏佞之相遇豈偶然哉有堯舜之君則有臯夔稷契之臣有桀紂之君則有飛亷惡來之臣資適相逢耳左非正也小人以非道事君故曰左腹既以非道深入其隱奧又得其心意精微之處君臣各遂所欲則威福之柄遂得而擅之于外矣故象曰入于左腹獲心意也不然何遽至于亡哉六五箕子之明夷利貞象曰箕子之貞明不可息也箕子商之宗臣也去商歸周為武王陳洪範存皇極之道故以六五中位處之箕子以父師為囚奴是晦其明內難而能正其志也書稱囚奴正士謂箕子也比干之死非沽名也微子之去非忘君也箕子之𦍕狂非偷生也各行其志云耳聖人于明夷獨稱箕子者其存大法尤有補于天下後世其功為最大故象言箕子之貞明不可息也道之在天下非人不傳當昏君之朝明雖入于地中而非滅也然則續而不絶隱而不終喪者其在于聖人乎堯之命舜舜之命禹皆曰天之歷數在爾躬紂之失道而箕子傳之其處以六五之位皇極之道存焉故也上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也紂之無道雖尚擁虛器已不為人心所歸是貴而無位髙而無民也故以上六處之上六體至隂之極當明夷之終其傷已甚故不明而晦昏君之象也人主居尊極之位如日之升于天一旦沉溺聲色嗜欲所昏如日之入于地象曰初登于天照四國也後入于地失則也失則者以欲敗度縱敗禮而失其典則也離下巽上家人利女貞婦人以幽間靜正為德離下巽上內明而外順也自天子達于庶人未有身不正而能正家者也故二南之化皆託言后妃以見文王之德女子之正本乎君子故卦止言利女貞也彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣人倫之道自夫婦始詩言先王以是經夫婦成孝敬厚人倫美教化移風俗女正位乎內謂六二也男正位乎外謂九五也六二九五得隂位陽位之正二爻正應在五男女各得其正如天地處上下之位而不可亂也家有嚴君則上下內外莫不肅治父母雖以恩為主然于辨內外别上下尤以威嚴為貴故通謂之嚴君焉父子兄弟夫婦此三者皆人倫之大端也上下內外之分嚴則家道正而天下定也文王之治刑于寡妻至于兄弟以御于家邦二南之化自后妃始然則定天下之道在乎修身齊家而已唐髙宗之不君百司奏事多決于武氏其後遂不能制以至毒流天下幾危社稷蓋由不能正其家也聖人立言垂訓為後世慮豈不深且逺哉象曰風自火出家人君子以言有物而行有恆風與火相因之物也身正則可以齊家家之齊由我而致也故有風自火出之象言有物則可法行有恆則可則孔子曰言出乎身加乎民行發乎邇見乎逺有物則言可法而不為利害所移有恆則行可則而不為時世所變修身齊家之道孰大乎此初九間有家悔亡象曰間有家志未變也婦人之性剛則必悍弱則易流故不可不慎其始也能慎其始而使之知禮義循法度則可免乎悔吝矣象言間有家志未變者夫驕奢淫逸所自邪也若訓之不以漸習之不以素其志已變已而矯革之則夫婦之間必將反目矣蓋治家之道自夫婦始夫婦正則一家無不正矣初九以剛明之才為家人之始是能防間于未然使上下內外習熟而安行之也六二無攸遂在中饋貞吉象曰六二之吉順以巽也六二以隂柔而居中正之位又上應九五得婦人之正也婦人以貞順為德主閫內之事而職在中饋志在承夫不敢専也詩美大夫妻能循法度則可以承先祖供祭祀矣然則祭祀賓客之奉婦人之職也能盡此道則貞而獲吉象言六二之吉順以巽也合離巽二卦謂之家人六二一爻専主婦道其獲吉則以能巽順故也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也九三處內卦之上以陽居陽近于髙亢威嚴傷父子之恩失夫婦之愛故悔且厲然威嚴之過則有所畏憚而上下內外必肅而無瀆亂之失故雖悔且厲而獲吉也嗃嗃雖為威嚴之過過乃獲吉婦子嘻嘻失嚴敬之貌戒在終吝也象曰家人嗃嗃未失也婦子嘻嘻失家節也夫以嚴毅治家雖非中道未至大失若婦子以嘻嘻為常無嚴憚恐懼之意則失其家節乃吝道也又嘻者歡聲也嚴而至有憚惜之聲亦非中道也六四富家大吉象曰富家大吉順在位也洪範五福一曰富而不及貴孔子曰崇髙莫大乎富貴富貴一也然貴不可常也富可保也能保其富則大吉也六四處中正而能巽居近君之位而能順故象曰富家大吉順在位也昔楚襄王問陽陵君曰君子之富何如對曰假人不德不責食人不使不役親戚愛之衆人善之蓋為富不仁為仁不富世之小人至乘時射利取倍稱之息者其違人心多矣今六四能順以在位故履大吉所謂君子之富也歟九五王假有家勿恤吉象曰王假有家交相愛也九五君位與二為正應五居乎外二處乎內皆有中正之德故為有家之象王者家天下如唐堯之親九族卒能協和萬邦文王之刑于寡妻至于兄弟以御于家邦孟子所謂言舉斯心加諸彼而已治天下之道蓋自正身齊家始茍得其道遑恤其他哉聖人之于天下戒慎恐懼其蒞事未嘗不惕然也至事無可疑而衆未喻其理則有時而勿恤也如升之不當位用見大人乃勿恤也夫九二以剛健而履中正雖惕號暮夜有戎度必有以制之故勿恤也九五履尊居正以化民成俗復何所疑故勿恤然後吉也象曰王假有家交相愛者蓋言有應也治家之道與治天下一也夫義婦順父慈子孝兄友弟恭未常不相因也視民如子則民之愛之甚于父母也厲民以自養則民之疾之甚于仇讐也孔子所謂先王有至德要道以順天下民用和睦上下無怨者其理如此上九有孚威如終吉象曰威如之吉反身之謂也治家之道威信而已有信則內外不欺有威則上下必肅上九在家人之終處柔順之極聖人蓋慮夫不能常久而不變有孚威如常久之道父子夫婦之間交孚而不欺有禮而不瀆則家道成矣故獲終吉也象曰威如之吉反身之謂也父子夫婦以恩為主加之威嚴則怨讟而傷恩必先正其身以身教者從故中心恱服雖威如而不失歡然之恩也兊下離上睽小事吉象曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉象曰上火下澤睽君子以同而異初九悔亡喪馬勿逐自復見惡人無咎象曰見惡人以辟咎也九二遇主于巷無咎象曰遇主于巷未失道也六三見輿曳其牛掣其人天且劓無初有終象曰見輿曳位不當也無初有終遇剛也九四睽孤遇元夫交孚厲無咎象曰交孚無咎志行也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪冦婚媾往遇雨則吉象曰遇雨之吉羣疑亡也艮下坎上蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉象曰山上有水蹇君子以反身修德初六往蹇來譽象曰往蹇來譽宜待也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終無尤也九三往蹇來反象曰往蹇來反內喜之也六四往蹇來連象曰往蹇來連當位實也九五大蹇朋來象曰大蹇朋來以中節也上六往蹇來碩吉利見大人象曰往蹇來碩志在內也利見大人以從貴也讀易詳説卷六
