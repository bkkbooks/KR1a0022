body:
  text: 讀易詳説卷七宋李光撰下經解至姤坎下震上解利西南无所往其來復吉有攸往夙吉解者散也散險阻而為平易而卦體不離乎險阻但解散之耳蓋東北為險阻而解坎下而震上在蹇為水解則散而為雨在蹇為艮解則變而為震故解體為東北其用則利于西南聖人當蹇解之世非能出乎險難以求解散也故坎不能䧟而艮不能止如冰解凍釋龍蛇之奮迅也西南為坤廣大平易之象也當解之時險阻既除憂虞既散則以平易治之秦不能然既平六國之後首用商君刑法苛急其亡也忽焉漢祖入闗但約法三章耳其興也勃焉故解之時利西南也外難既除故无所往但退而修其政刑耳宣王中興復文武之境土故天下喜于王化復行吉孰如之故曰无所往其来復吉也禍患雖已散解其間亦有負固不服者不亟除之則滋蔓而難圗故有攸往夙吉也解有解緩之義故戒以當夙則吉也彖曰解險以動動而免乎險解解利西南往得衆也其来復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉蹇之時險難在外故見險而能止解之時險難在内故乘險而動則出乎險中此聖人觀時而動静者也西南坤位卦言坤厚載物徳合无疆含𢎞光大品物咸亨解之利西南西南得朋故彖言往得衆也方險難解散之時如雷雨之作物无不被其膏潤者豈獨一身能脱乎險難哉險難解散外无憂虞故无所往其来復吉解雖赦過宥罪其間亦有怙惡不悛者如蔓草然勿使滋蔓難圗也故有攸往則不可緩也若出其不意掩其不偹則无能為矣非若蹇難之世往則愈蹇也故曰徃有功當解之時復與往皆吉蓋時適然耳方天地否閉而成冬則雷在地中于卦為復天地解而雷雨作雷雨作而百果草木皆甲坼則于時為春于卦為解聖人賛天地之化育故𤼵政施仁刑威慶賞未有不因乎天者然則解之時豈不大矣哉象曰雷雨作解君子以赦過宥罪當春之時蟄蟲始振雷乃𤼵聲天地之難解矣聖人體解之時順其𤼵生之徳過則赦之罪則宥之過者未罹于法容其自新故赦之罪者已入于刑量其罪之大小有所䧏殺非直縱而釋之也初六无咎象曰剛柔之際義无咎也六以隂柔憂慮居解散之始宜未能免咎然上承九二之剛陽正應在四以柔承剛以隂應陽剛柔之際于理為順故得无咎也難既解散尊卑各正其位上下各安其分不相凌犯尚何悔咎之有哉九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也狐隠伏多疑如小人之邪佞狙詐以害正道獲三狐則小人之情得正直之道伸矣故吉九二正應在五以剛應柔為五所任雖處乎險中而得中直之道故能解散險難而獲衆邪可謂能勝其任矣九二體坎本䧟于險中非能解散險難者也然六五之君為之正應因險用中以濟危難故邪佞狙詐者不能逃也故象言九二貞吉得中道也二雖性險用以解難適時得正吉其宜矣六三負且乗致冦至貞吝象曰負且乗亦可醜也自我致戎又誰咎也六三以隂柔而居二剛之間負上而乗下負者小人之事也乗者君子之器也小人而乗君子之器盜斯奪之矣孔子于此一爻著之繫辭特加詳焉言作易者其知盜乎蓋盜亦有道若无隙之可乗无間之可入雖善盜者莫能犯也上慢下暴所以致冦而招盜也如此者雖貞猶吝况以不正處之乎象言負且乗亦可醜也自我致戎又誰咎也言負擔之小人而乗軒車人固不以為榮故可醜也小人之盜猶女子之滛滛盜一也自我致㓂慢蔵誨盜猶冶容之誨滛皆自已取之何所歸咎乎故曰又誰咎也九四解而拇朋至斯孚象曰解而孚未當位也拇足大指也在一身之中最為微賤解之時赦過宥罪恩施所及雖㣲賤者皆獲解散則其黨類无不信服矣九四正應在初初為解始聖人施徳恵于天下當一視而同仁今所解者特其所應而已蓋四之隂柔非陽剛之所當寓也故象言解而拇未當位者當位謂三五也使九而寓三則車服必稱而无負乗之累矣使九而寓五則履尊居正而所及者必廣矣六五君子維有解吉有孚于小人象曰君子有解小人退也六五柔弱之君非能威制海内所以服强梗亂治之小人以解散禍亂者惟有解而已解非聖人之得已也蓋力不足以制小人行姑息之政以解一時之禍患可也故解然後獲吉而小人知其必貸咸有自親之志如雷雨之作而草木枯悴者无不甲坼矣龍蛇之閉蟄者无不奮迅矣聖人與天下更始赦宥之行有不得已者象曰君子有解小人退者小人一旦蕩滌瑕垢齒于平民孰有不退聴者乎古人以赦令為小人之幸者豈不然哉上六公用射隼于髙墉之上獲之无不利象曰公用射隼以解悖也鷙鳥之摶也必匿其影然後能獲物今在髙墉之上宜乎為人所獲也以象小人在當位而善害物者上六是已方解之時不能逺迹退聼猶竊據寵榮而在髙位聖人之所必不赦也獲者得之難如獲其大首也蓋赦宥蕩滌之後猶負固不服此小人之桀黠者故射之射者用干戈以取之也上六當解難之極而小人終不知變將復害君子于此能獲之則天下之難解矣故曰獲之无不利也象言公用射隼以解悖者夫為治而不能終去悖亂之小人天下何時而定乎公者人臣之極位也悖亂之人非假威望之大臣孰能制之成王之時三監及淮夷叛周公東征則罪人斯得矣孔子于繫辭復詳言之曰弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也以見取之難而動之不可妄也兑下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享損之道莫大乎有孚蓋損已以益物損上以益下損剛以益柔人之所甚難也世之人固有矯激而為之者其損也志在乎求益而已惟君子能以至誠格物勝其私心以就理義之正富貴者人之所欲也不以其道得之不處也貧賤者人之所惡也不以其道得之不去也患難不茍避也勞苦之事必爭先也以誠意行之故獲元吉然後乃无咎既獲元吉内外交孚固无咎之者故退而窮處則其道可貞逹而有為則所往皆利曷之用二簋可用享者損之益上豈貴乎備物哉澗溪沼沚之毛潢汙行潦之水可薦於神明者亦以誠為主耳曷之用者聖人欲盡損之理則曰何所用之乎二簋可用享言菲薄之物可交神明格天地也以上下二卦言之兊下艮上為損陽能益物者也兊本乾剛也坤以隂柔損之而成兌所謂損下也隂受益者也艮本坤柔也乾以陽剛益之而成艮所謂益上也世之人皆知損之為損而不知損之為益故損下益上則謂之損而損上益下則謂之益向子平讀損益二卦然後知貴之不如賤富之不如貧但未知死何如生耳然則損益盈虚之理非聖人孰能逹其精微哉堯之土階茅茨漢文之弋綈革舄人主之尊能深自貶損若武王克商之後散鹿臺之財𤼵鉅橋之粟大賚四海而萬姓悦服此當損之時益莫大焉唐明皇用宇文融韋堅之流行聚斂刻剥之政嵗進羡餘為天子私蔵百姓流亡海内耗竭致禄山之禍損莫大焉彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行損下益上其道上行以卦體言之也兊處艮下艮者坤之變也乾剛也損其三以益上而成艮故曰其道上行上行者上通乎君也曷之用二簋可用享者籩豆簠簋皆祭祀之器特言簋者物不必備也享祀之禮以誠敬為主當損之時非豐大之世特禮有不可闕者掃地而祭可也象車玉輅用于太平之世猶以為非若徒為觀美以誇耀閭閻之耳目非獨欺其君上則欺天下則欺民内必欺心神其吐之矣聖人觀㑹通以行典禮二簋之祭適時而已損剛益柔損下益上亦豈可常哉聖人亦有不得已而行之者損益盈虚與時偕行則民且信之損之貴乎有孚者如此若時有可為而不為或未可為而强為逆天違民叛道而悖理謂之矯誣可也欲以求福而禍必隨之三代損益皆因時而已象曰山下有澤損君子以懲忿窒欲孔子曰山澤通氣山之峻極必假澤之滋潤然後能生長萬物使之條逹而茂遂山下有澤所以為損者損下以益上也君子體此象以修徳則在我者必有所損乃能有益忿欲害徳之大者也人生不能无忿懲之則忿氣不作人生不能无慾窒之則慾心不萌顔子不遷怒不貳過皆損已之道也一日克已復禮而天下歸仁則損已者乃益已之大者也澤之潤雖上泝于山而山之氣亦下通于澤故嘘而為雲者必降而為雨也茍逹乎此則知一人之瘠而天下肥矣府庫充實者海内必減耗矣君子修身治國之道如損之為益庻乎其不厲民以自養也初九已事遄往无咎酌損之象曰已事遄往尚合志也初九正應在六四以下而應上以剛而應柔上所頼以益已者也人臣之道无成而代有終若已事而顧戀寵榮遲回不去未有能善終者故已事而速往則可免咎酌損之者量其時之所宜斟酌而貶損者也人臣竭智力謀猷以益上功名遂而身退天之道也象言已事遄往上合志者功成不居而知退避庶乎合上之心志也人主所願乎臣下者如此漢惟張子房一人既佐沛公以有天下則願與赤松子遊封留足矣是能亟退而酌損之也後世貪沓之士欲以諛説人主至竭百姓膏血為淫荒之用自謂益上而竊位冐寵不知紀極豈有不喪身覆族者哉九二利貞征凶弗損益之象曰九二利貞中以為志也人臣事主无非損已以益上者二五又君臣之位九雖陽剛而二位逺君无凌犯之嫌所患者不能静止而㦯枉道媚悦其上以干進耳故所利在貞貞者守道堅正之謂正不足以盡之不能守正必枉道干進故有攸往則凶也弗損益之者事固有益之而損損之而益者以六五隂柔之主二以剛中應之故在下者得以行其志固有弗損而益之者逆其所順强其所劣彌縫輔賛在我實无所損其増益人主之智慮多矣象言九二利貞中以為志者九二處人臣之中位其事上也曷可不由乎中道哉志者心之所之中以為志者志常存乎中道而无過不及之患也六三三人行則損一人一人行則得其友象曰一人行三則疑也一隂一陽之謂道惟至精故能合乎至神豈容有二哉兑之三爻惟六三為獨隂艮之三爻惟上九為獨陽上下隂陽二爻又為正應故雖逺而心相得也雖踈而道相應也豈餘爻所能間哉兊艮二卦三隂三陽各有所應獨于六三言三人者以見一隂一陽精誠之至故孔子于繋辭特舉天地男女交感之象以明致一之道損一人者損已以益上也隂爻雖多卒能損已以益上者一隂而已象曰一人行三則疑也天下之理多則惑少則得况乎天地隂陽與夫人道交感之際君臣朋友夫婦之間其可不致于一乎不致于一則其疑有不可勝言者矣蓋一介之士必有宻友君不宻則失臣臣不宻則失身古之事主者造膝而言詭辭而出所以防其疑也六四損其疾使遄有喜无咎象曰損其疾亦可喜也凡損之道皆損已以益物者也惟六四一爻乃損已以求益者已之有疾為已之害能使速愈則其喜可知初以陽剛為已正應四所求益以損已之疾者也所謂損剛益柔損有餘以補不足也當損之時四居近君之位以柔弱之才不能勝其任危而不能持顛而不能扶此四之所甚病也初以剛健在下為已之助扶顛持危而損其偏柔之疾使速有喜然後可以无咎也象曰損其疾亦可喜也人方疾痛能使之脱然去體豈非切身可喜之事哉六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也當損之時非六五柔弱之君能虚心克已則孰肯告以善道者㦯益之言智畧輻凑益我者非一人也十朋之龜周禮爾雅皆云神龜靈龜其類有十言助我者既衆神靈之物无不協從也此所以能享元吉也然六三以三人而疑今益我者既衆能无疑乎故以十朋之龜弗克違為大吉以見聖人居尊履正人謀鬼謀百姓與能也象曰六五元吉自上祐者人主能謙恭損已以来天下之善則海内必蒙其福民之所願天必從之故言自上祐也上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也上九處損之終勢力足以制服海内而恣其裒歛剥下以媚上者也如此雖才如劉晏不能以善終故弗損於下而能反益之庶其免乎咎戾全其剛貞而獲吉也上九人臣之極位上能増主之明下能裕民之財然後可以大有為於世以身狥國得為臣之正何以家為哉象言弗損益之大得志也人臣能歛不及民而用度足必有生財裕民之道如古稷契管蕭之徒乃可大得志於天下也震下㢲上益利有攸往利渉大川彖曰益損上益下民説无疆自上下下其道大光利有攸往中正有慶利渉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行損上益下興利以益民也自上下下謙虚以受益也能損已以益下則民獲其利而説我者衆也虚已以接物則已受其益而其道光顯也陽當在上今乃下居于初隂當處下今乃反居于四以見陽能抑損其綱以柔弱自處故名譽愈逺徳義愈尊其道大光顯于天下也利有攸往中正有慶二與五君臣之位六二九五為正應君臣道合各位乎中正故能流福天下无所往而不利也豈獨一人之慶哉利渉大川木道乃行者舟楫之利以濟不通聖人能渉險濟難所以行木道也髙宗命傅説曰若濟巨川用汝作舟楫故濟川莫利乎舟楫濟險莫髙乎聖人也益動而巽民説无疆者聖人欲大利于天下因以自益在乎順動而已時茍未可動而不順則與物多忤我之益物有時而窮物之益我有時而既豈能日進无疆乎天施地生其益无方者天以氣施地以形生萬物皆受氣于天成形于地故天地裕于萬物四時循環无有窮也其為益也豈有限量哉聖人成位乎兩間其益下之道亦若是而已凡益之道與時偕行者時變无窮聖人趨時之變亦與之為无窮如黄帝堯舜作法制器夏商周所損益之類是也凡為上之道必能憂勤損已以利天下故興大利除大患有所不動動則民皆悦而從之雖履危渉險无往而不濟也古之聖王興事造業㦯至手胼足胝播奏庶艱食鮮食无非益天下之道故繫辭言耒耜之利以教天下蓋取諸益又曰益以興利蓋損上益下民説无疆何往而不利哉象曰風雷益君子以見善則遷有過則改風雷善益萬物者也非相資以相益也風以散之則鬱結者必解雷以動之則蟄蔵者必奮君子見善則遷有過則改皆損已之道也損已者所以益物亦所以自益也顔子得一善則拳拳服膺而弗失之矣然則見善則遷顔子足以當之周公之過也如日月之食焉人皆見之及其更也人皆仰之然則有過則改周公足以當之是皆損已以自益之道也初九利用為大作元吉元咎象曰元吉无咎下不厚事也益下之道莫大乎興事造業大作者大有所為也九以剛健之才居于初為益之始上有六四大臣為之正應以有為之才當可為之時故利用為大作也能任其大事以有天下使海内蒙其益故能獲大吉而无咎也象言元吉无咎下不厚事者人臣之道无成而代有終况居益之初最處底下雖任上之事而能不有其功乃可獲吉而无咎耳故曰元吉无咎下不厚事也厚事重大之事也雖利用為大作而不敢以重大之事自居此人臣之正也六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外来也六二震體居中有所不動動則天下莫不助之矣故曰或益之十朋之龜弗克違也聖人有所興作必得天人之助人謀鬼謀百姓與能十朋之龜弗克違則人心可知矣損之六五君道也故獲元吉益之六二臣道也故永貞吉貞者静而正也六二雖中正有應而體本柔弱能永守貞固則无邪佞之失故吉也王用享于帝吉者益之六二即損之六五能損已益物得天下之助非獨人臣也王者能用此道亦可享上帝而獲福也蓋人心之所與則天意之所歸未有咈人心而可以合天意者堯之試舜納于大麓烈風雷雨弗迷故付以天下而不疑也彼欺君罔上徒欲誇耀以欺天下者雖盛其輿服豐其牢醴簠簋籩豆之飾有加于前恩典儀物之數踰其常度儻非其時曷足以荅天意乎故損之彖曰曷之用二簋可用享二簋應有時損剛益柔有時然則非當盛大之時得天下之助者安可矯誣以欺天哉象曰或益之自外来者能虚中損已以益下則助我者非獨四海之内也雖𬒳髪左袵逺在荒服之外者莫不愛戴之矣故曰自外来也六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也六三處上卦之下下卦之上逺君而近民也凶年饑嵗欲為損上益下之道則𤼵倉廪損逋負使老弱无轉徙溝壑之患雖矯制専輙何咎之有凡易稱无咎有无過咎者有人不以為咎者三之用凶事蓋君子遭變之時以身任之无所歸咎也聖人又戒以有孚中行者若未見信于上下而行之不以中道則有傷財難繼之事故上下信而行之以中道則上必旌賞之矣故告公用圭者錫之圭組以報其裕民之功也象曰益用凶事固有之者以見人臣于凶荒之嵗能以身任責而不恤禍患者非愛民之誠素定乎胷中能若是乎故曰固有之也漢之汲黯是已六四中行告公從利用為依遷國象曰告公從以益志也六四近君之大臣九五之君所信任者所行有得中道雖國之大事詎有不從乎周公卜洛邑澗水東瀍水西四方道里均焉必有所依故可遷不疑也左氏曰周之東遷晉鄭焉依是也大臣雖以身任責亦侍君命而後敢行故告公從必有文告之辭矣盤庚之遷不從者民也故敷心腹腎腸丁寧訓告僅能從之蓋當時无一中行之大臣若周公者以身任之也象言告公從以益志者九五之君實為益主志在益下大臣知遷國之事必有以利社稷安百姓故告公必從以成其益下之志也九五有孚恵心勿問元吉有孚恵我徳象曰有孚恵心勿問之矣恵我徳大得志也人主有恵利天下之心非出于矯偽則獲元吉不問可知矣故恵心貴乎有孚也人固有行姑息之政以儌福干譽者雖竭府庫倉廩不足以得民心使其中誠惻怛有愛民之誠心則四海之内莫不愛戴而允懐之得乎民者得乎天也故自天祐之吉无不利尚何疑乎有孚恵我徳者上以有孚恵下下以有孚應我故恵我以徳也心與徳皆无形也君與民相感于无形之間故恵者不費而應上者无窮其為益豈有既乎象言有孚恵心勿問之矣恵我徳大得志者人君志于益下其效如此故得志也後世之君以處富貴縱聲色為得志以唐太宗之賢尚以破西域為帝王之樂喜而見羣臣曰朕今樂矣遂徧觴之嗚呼是焉知帝王得志之真樂哉上九莫益之或繋之立心勿恒凶象曰莫益之偏辭也或擊之自外来也上九大臣釋位而去者既无以益人將豐殖自益有无厭之求衆所不與故羣起而攻之也故莫益之則或擊之矣夫大臣之處髙位衆所求益今乃反求益已故莫有益之者而或擊之反蹈于凶禍是其立心勿恒之所致也孔子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也莫之與則傷之者至矣君子于動静語黙之間可不慎哉大臣至于傷之者至則首領將不暇保矣象言莫益之偏辭也或擊之自外来也偏辭者一偏之辭也人心不與則一偏之辭足以激天下之怒心故或擊之則不可解矣自外来者千里之外莫不應之此聖人戒慎之深意也乾下兑上夬揚于王庭孚號有厲告自邑不利即戎利有攸往乾下兊上下健而上説五陽而一隂陽雖在下然衆方向進而據中正之位隂雖在上而權勢已去故无内外之助是君子道長而小人道消之時也故于義為夬夬者以剛果而决斷小人也小人衰微不能同心協力乗時而顯誅之方且依違牽制㦯為自然之計而隂為内應則將復出為惡而反為所擠矣故揚于王庭者使天下顯然知其為小人也孚號有厲者雖號令之必信然猶懼天下有不吾與者不得不惕然以危懼自處也告自邑者誅朝廷之大姦使海内曉然知其為天下之害也邑郡邑也告命之下自朝廷而逹之郡邑也凡此皆治内之道也治内之道自朝廷逹之郡邑足矣不利即戎者戎中國之外也聖人于戎狄猶四肢之于外物叛服不常覊縻之耳非如朝廷之小人剛决而力除之也利有攸往者二五各以剛健之才處中正之位可以大有為之時也雖不利即戎而治内之道无往而不利也彖曰夬決也剛決柔也健而説決而和揚于王庭柔乗五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也去小人固貴乎剛然不可獨任也故以乾兊成卦然後為夬剛固可以決柔健而能説則不動聲氣而海内安矣決而能和則不勞斧鉞而天下服矣揚于王庭柔乗五剛者小人雖日微弱然猶據髙位以凴陵君子不假大君之命戮之于朝其肯退聴乎孚號有厲者雖號已信衆審知其小人未甞敢以盛氣加之惴惴然常慮其圗已而反為所擠也如此然後其功可成其道愈光顯于天下矣是晦其明者乃所以為光也戒懼矜慎之至也告自邑不利即戎所尚乃窮者剛武非聖人之所尚也去朝廷之小人不得已而用其剛果可也恃其剛果至于誅伐不已勤兵于逺則取困窮之道也剛武之道雖不可尚至于在内之小人足以害治道者去之不可不盡也譬之農夫之務去草不除其根本使之滋蔓難圗則悔无及矣唐之五王特以留一武三思為天子藉手故反受其禍是五剛不能勝一隂而卒為所圖剛長而不能終之效也可不戒哉象曰澤上于天夬君子以施禄及下居徳則忌山澤之氣上升則下降蓋未有升而不降者其理可決也衆陽並進以決一隂則朝廷无害治之人其能施澤于天下无可疑者君子體此象則施禄及下使天下蒙其恵利如澤之上于天復降而為雨露也若屯其膏施獨擅富有而不與衆共之則衆皆忌嫉之矣武主伐紂誅一獨夫耳周公太公之徒為輔佐克商之後分土列爵散鹿臺之財𤼵鉅橋之粟大賚四海而萬姓悦服項羽使人有功當封爵刻印刓忍不能予豈足以成大功哉武王所以長有天下項氏卒為漢所滅成敗之效豈不昭然哉初九壮于前趾往不勝為咎象曰不勝而往咎也乾雖剛健然方伏而在下欲動而勝物不可易也故壮于前趾急于躁進理必不勝而反獲咎也以五君子而決一小人宜若易然然隂方在上據其髙位衆陽為其所乗欲決去之必以謀濟雖五之得尊位尚須中行然後无咎况初為𤼵足之始乎象言不勝而往咎也度其勢不能決勝乃冒昧而往其蹈凶咎必矣湯武之事應乎天而順乎人然成湯尚云慄慄危懼若將隕于深淵武王師渡孟津觀政于商二王所以卒勝有天下也自古勝敵之道如鷙鳥之擊猛獸之摶必戢翼匿形然後有獲豈可遽進而躁動哉九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也小人為冦戎必在暮夜幽闇之時君子于此時能惕然思懼常若冦賊之至必有以禦之夫何憂何懼哉故可勿恤也象言得中道者二在乾之中爻蓋去小人之道用其剛壮而直前固不可也依違不決而隂與之相應愈不可也初與三所以不免乎咎悔而二獨得中道故小人无所能為而卒勝之也九三壮于頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也九三居下卦之上處至顯之地有頄之象焉先儒以頄為面顴上六也九三居君子之中獨與上六小人為應衆所不與宜其凶也君子知與上合則為羣賢所疑故能不牽于昵比之私不暴其欲去之跡能決其所當決故曰君子夬夬也獨行遇雨若濡有愠无咎者衆方乗時並進欲決去一小人已獨隂為内應宜乎為衆所愠也然因其合已而隂與衆圗之則彼不疑而吾之謀䇿得行焉衆雖有愠見之色而卒去小人故无咎也陳平周勃之用酈寄是已象言君子夬夬終无咎者于此能行其剛决又何咎焉陸氏以比陳太丘之弔張讓庶㡬其是乎九四臀无膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也陽剛君子而寓于隂柔之地不足于剛决者也其行次且而不進如臀之无膚其可與有為乎羊雖喜觸而善羣衆陽方進能牽連以行則可免後時之悔矣四方樂于静退居不競之地雖聞斯言未必能信之而行之也聖人深著去小人非難能同心同徳之難也君子能同其心徳何事而不可成乎方小人在上衆欲去之蓋有懐疑畏而不敢進者亦有賣我而自售者使其居得志之位禀聪明之才其去小人不啻摧枯拉朽之易耳故象曰其行次且位不當也聞言不信聰不明也九五莧陸夬夬中行无咎象曰中行无咎中未光也甚哉小人之難去也以九五剛陽之君而下有羣賢之助一小人在上而反比之若有所畏然雖能用其剛斷而卒去之僅能免咎耳莧陸莧之生陵陸者莧柔脆之物而生于陵陸之上如小人而在髙位者中行謂典刑不及非若舜之去四凶也蓋小人必有以甞君之欲而得其心若徳宗之于盧杞是也故象言中行无咎中未光也聖明之主欲使其道光顯于天下非藁街之戮兩觀之誅豈足以快天下之論服海内之心乎上六无號終有凶象曰无號之凶終不可長也上六以隂柔之小人以非道媚悦于上蠱惑其心上所宻比其極至无所忌憚固寵保位乗五以抗衆陽无禮之甚衆所忿激故不假號令而誅鋤之象曰无號之凶終不可長也衆剛雖在下而方進此君子道長之時小人雖據髙位詎能乆乎㢲下乾上姤女壮勿用取女艮下坤上為復巽下乾上為姤冬至之日一陽生乎下故為復夏至之日一隂生乎下故為姤五陽而一隂則一隂為之主隂雖復而在下其勢必盛故有壮女之象勿用取女者小人勿用也善明治道者察乎㡬微而巳隂邪處内雖寡足以勝衆陽是一小人足以敵衆君子也然則君子小人相為消長特在内外之間耳否泰二卦是也人君能審知其小人勿用可也唐明皇用一李林甫去一張九齡治亂于此分矣君明臣良古人謂千載一遇當姤隂長之時聖人致其戒慎之意深矣彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉柔之遇剛隂之遇陽臣之遇君其理一也姤之所以為遇也君子小人雖異趣未有无所遇者君子之遇明君小人之遇暗主資適相逄耳勿用取女不可與長者當姤隂長之時君子道消故勿用取女必有敗國亡家之道故不可與長也天地相遇品物咸章者天地之氣不交感則不能生育萬物天氣下降地氣上升寒往則暑来暑往則寒来然後飛潜動植之物職職呈露故品物咸章也剛遇中正天下大行者姤雖隂長之時然二五各據中正之位雖非正應體實剛健足以大有為于天下此遇之至善者也姤之時義大矣哉者以天地隂陽之理觀之則聖賢相遇必能易亂為治去危為安社稷生靈皆蒙其福則姤之時與義豈不大哉姤之時言隂長之時也姤之義則隂陽相遇之義也象曰天下有風姤后以施命誥四方卦以巽下乾上為姤其象為天下有風夫風在天下則萬物无不遇者聖王體此以施令誥于四方孰敢不聼從者人君舉措未有无所法象者風雷皆號令之象也凡可以動物者皆風也風以動之則物无不遇者故朝廷之命令猶天之有風也風行草偃則物无不披靡者聖人𤼵號施今以播誥四方取象於姤義无餘藴矣初六擊于金柅貞吉有攸徃見凶羸豕孚蹢躅象曰繋于金柅柔道牽也姤之時隂方長而未盛如小人在内而黨與未應制之不于其漸則滋蔓難圗矣故繋于金柅金柅者在車之下以金為之所以止輪令不動也九二陽剛而位乎中正比近于初與初同體能止初者也故以為象如小人寖長之始其勢未盛有剛陽得位之君子以正道格之使其私欲不行則貞而獲吉矣有攸往見凶者小人之性猶女子也无所繋而任其所之恣其所覩則凶之道也羸豕孚蹢躅者豕方羸弱之時若无能為者及其羸而制之則易初六㣲隂豕之羸者也小人之初其勢未盛然其中誠有一跳踉之志矣不能有所繋而恣其所往何所不至乎象言繋于金柅柔道牽也小人之初必有牽制之使繋于一則无能為矣九二包有魚无咎不利賔象曰包有魚義不及賔也二逺君而近民五陽在上一隂在下故初有民之象初六㣲隂未有主而二先得之四雖正應然初已從二四不能主而反為賔如陳勝所遣将相得其地即王其地有其民武臣至邯鄲自立為趙王韓廣得燕自立為燕王如此豈賔之利哉稱賔則體敵而无君臣之分矣二擅有其民宜其有咎也方民思其主之時五剛莫適為主雖有正應不能禁二之自専故曰包有魚无咎包謂包裹之易之取象言豈一端象言包有魚義不及賔者既王其地有其民豈復顧其賔哉九三臀无膚其行次且厲无大咎象曰其行次且行未牽也三與初同體皆處下卦初切近于二為二所得故九三失據如臀之无膚也退而從初則礙于二捨之而進則三陽阨于上故其行次且次且難進之象處此勢者其凶可知然三以剛健而寓陽位非闇弱之人必能惕厲自強故无大咎也咎不至大者小或不免耳象言其行次且行未牽者不為上下所牽制也知初之不可據而義不反顧知上未易犯而不敢直前此所以獲免乎咎悔也九四包无魚起凶象曰无魚之凶逺民也九四與初六為正應位尊而近君然初已為二所據是不得乎民如包之无魚有所作為則凶矣起者興事造業之謂上欲興事造業而百姓不與孰與成功哉易之師曰剛中而應行險以順而民從之夫用兵行師驅民于萬死一生之地而民不敢不從者以吾能有其衆也故地中有水為師師衆也吾能包而有之然後可以大有為于天下湯伐桀武王伐紂順乎天而應乎人不有其民豈足以興師動衆乎象言包无魚逺民也以九四近君而逺民雖勢足以有行而民不與故凶也九五以杞包𤓰含章有隕自天象曰九五含章中正也有隕自天志不舍命也杞剛勁之木𤓰柔弱蔓延而善附物杞九二也𤓰初六也九五為姤之主與二同徳所謂剛遇中正也當隂長之時小人欲傾摇君子聖人思有以制之豈自用其聰明哉必有剛果之臣折其芽蘖而包容之不使滋蔓難圗也故九五之君但含章而已含章者含畜其至美之徳而不暴露也此制小人之道也故福慶自天而降小人无能為矣象言九五含章中正者位乎中正而用中正之道故可端拱无為晦跡蔵用小人自退聴矣有隕自天志不舍命者天之所令謂之命當隂陽代謝君子小人相為傾奪之時但任賢使能一聴天命而我无容私焉故天弗能違而降之福慶也上九姤其角吝无咎象曰姤其角上窮吝也角者剛而上窮之象姤以遇為主物之交感无非遇者而君臣為大九以陽剛乗五而處姤之終此大臣位極乎人臣有凌犯之志者小人乗權勢之乆貪得无已如坤之上六龍戰于野理必傾覆則吝道也禍自已取何咎于人乎象曰姤其角上窮吝者姤至于上窮而吝其始在乎患失而已終至覆族滅頂之禍悔可及乎讀易詳説卷七
