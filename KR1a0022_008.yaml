body:
  text: 讀易詳說卷八宋李光撰下經萃至鼎坤下兑上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往萃聚也物萃則聚也民猶水也性無不下澤所以能蓄者以善下之也畜衆之道無他不以威强劫制之耳好生而惡殺好利而惡害民之性也以逸道使之能生之而不傷興利而去其害則下無不順者二五以正應又居中正之位上下悅順故能容民畜衆而萃道成矣甚哉民之難萃而易散也太王居邠狄人侵之去之岐山之下居焉從之者如歸市豈以勢力驅之哉秦専任强威并吞席卷非不能聚民也而陳勝奮臂一呼天下響應聖人設卦觀象之意則上悅然後下順是知勢力之不可恃也剛中而應是知偏任威强則民不與也彖曰萃聚也順以說剛中而應故聚也王假有廟致孝亨也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣王者致治至萃則人道盡矣可以格祖考矣蓋建邦設都必先立宗廟所以致孝亨也夫以孝治天下者四海雖大萬民雖衆舉無不順者以合乎人心也合乎人心則民之從之也輕此要道也利見大人亨聚以正者大人謂九五也九得剛中之位而為萃主此人君能以正道聚天下者故天下皆利見之用大牲吉利有攸往順天命者享祀之禮皆報也非祈也周公行郊祀之禮于治定功成之後非豐萃之時而行盛大之禮則是矯誣上天也因萃時用其禮則天必親而享之如此然後可以大有為于天下此聖人先天而天弗違後天而奉天時故彖言用大牲吉利有攸往順天命也反此則逆天理矣觀其所萃而天地萬物之情可見者天地至大萬物至衆也欲以一人之私智而遍察之則吾之智有時而窮矣聖人坐觀萬化之變必自其近而易見者始民同是心也能同民心則天地萬物之情舉在此矣豈有它道哉象曰澤上于地萃君子以除戎器戒不虞師之象曰地中有水師師亦衆也萃者聚于治安之時師者用于險難之世方聚于治安禍患潛伏故君子體此象以除戎器戒不虞也除者除治其虧鈍也戒者戒慎其未形也此聖人于治安之時不忘乎危亂之道也後世君臣茍玩嵗時因循朝夕銷兵撤警以幸一旦之安及夫事至而應則已無及其亦昧于萃之道矣初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也初六以柔弱之才而處萃之始物之所萃非能萃物者也在下而為所萃非其中心誠實則物不與也故宜有孚然初之正應在四而二隂在上初以柔道為物所萃非能卓然獨立也是以知其决不能克終而乃亂乃萃也乃亂者其志紛亂不能定于一也乃萃者不能守其誠實而輕有所萃此小人女子之象也若號一握為笑勿恤往無咎者若能翻然悔悟號咷求附于四則正矣雖羣聚而譁笑之勿恤而往則可終免咎悔也象曰乃亂乃萃其志亂者初本應四四止而不能下應故初無所適從是其心志之亂也六二引吉無咎孚乃利用禴象曰引吉無咎中未變也萃之時羣隂在下二雖隂柔而與五為正應二五各處中正之位二在坤中上下皆隂莫知適從既正應在五則當從所應然非其招不往也必待五招聘然後往乃吉而無咎也孚乃利用禴者初以有孚不終故乃亂乃萃二獨得柔中以應剛陽君臣道合誠實無間雖菲薄之物可交于神明也禴春祭之名方春之時品物未備故其祭曰禴精潔之義也茍有誠實雖二簋可用亨損所以貴有孚也象曰引吉無咎中未變者守其孚誠而不變也君子小人各以類聚小人之與小人其志趣蓋有不約而同者非得位處中內含誠實未有不反為朋類所引而變者二能應五之招聘以從正應故吉且無咎以中心有所執守而不為羣邪所變易也豈非特立獨行之士哉六三萃如嗟如無攸利往無咎小吝象曰往無咎上㢲也六三體隂柔而據陽剛之位小人之桀黠者也卦四隂而二陽皆非已應莫適所從故萃如嗟如無攸利也上與三皆居本卦之上雖失隂陽正應之理而上說下順勢必相合故往則無咎小吝者往雖無咎而上處大位三乃順從之勢利之交古人所羞故小吝也象言往無咎上㢲者三與四五變而成㢲三之從上上能㢲說而無違拒之意故無咎也九四大吉無咎象曰大吉無咎位不當也四居近君之地下據三隂當萃聚之時為說之始而衆之所歸此爻之最善者故大吉也然以陽居隂是能柔㢲以奉上接下者故大吉而無咎悔也象言位不當者本以逼上有咎然既得上下之歡心上為君所萃下為衆所萃故雖免于咎悔而其位終不當也聖人不以大吉無咎而廢其不當之位亦不以位之不當為必蹈凶禍也九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也人主居域中之大臨海內之衆總其權綱設官分職以統治之耳有位者百官有司之位也分民分土大小尊卑各任其職垂拱以視天民之阜而已故黃帝堯舜垂衣裳而治天下也如此然後可以無咎匪孚元永貞悔亡者九五正應在六二人主患不廣大不能泛應曲當而心有偏係之私豈能使海隅之衆罔不是孚哉能元永貞則匪孚之悔可以亡矣元善之長也永久也貞正也是三者大君之道也有其大善如乾剛之獨運又久于其道而以正固守之則可以亡其匪孚之悔矣象言萃有位志未光者象辭獨舉爻中一句以包下文誠信之德未著則于萃為未光大故云志未光也上六齎咨涕洟無咎象曰齎咨涕洟未安上也上六以隂柔之才而處髙位當萃之時進不知止有顛覆之勢然能恐懼憂危尚可免咎况乎知進退存亡之道以功名為餘事視富貴如浮雲者乎象曰齎咨涕洟未安上者六處說之上居萃聚之終下無應援而又乘五其能一日安于上乎以見危懼之甚也後世貪沓愚暗之人一旦得路自以子孫常握重權繼世不離廊廟况復能惕然知禍患之在後而齎咨涕洟以自危懼乎㢲下坤上升元亨用見大人勿恤南征吉㢲下坤上而升下㢲者求升之道也上順者可升之時也以求升之道遇可升之時所以能大亨也用見大人勿恤南征吉者大人者道隆德駿可與大有為之人也乾之二五皆曰利見大人今二五相應自二之五自下而升上之象文王太公相遇當其時矣勿恤無所憂慮五雖隂柔而得尊位下有陽剛之臣為之輔翼何往而不濟乎以此求升故不足憂也南征吉者此文王伐紂之志也西伯戡黎祖伊恐詩頌武王能卒其伐功則文王南征之志未嘗一日而忘也渭濱之獵非熊非羆帝王之師則知南征之必吉也然卦以柔㢲為主者時或未可柔㢲所以避時之艱而有待也彖曰柔以時升㢲而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也坤以柔而升乎上㢲以剛中而應乎上所以為升君臣道合乃能升也為上之道不順則不能虛心屈已逮下下之求升一於卑㢲則近于佞媚而入于邪故應者貴乎剛中也體雖卑㢲而枉道以求升則不可也以九二之剛應六二之柔此所以能大亨也用見大人勿恤有慶者君臣相遇無復憂虞天下必賴其慶矣南征吉志行也南征者文王之志也當升之時聖賢相遇諸老咸歸以往則無不利矣故其志得行也象曰地中生木升君子以順德積小以髙大木生地中其本深固則其末必茂雖資地氣必有其本地能順而生之耳君子以順德積小以髙大者順德則坤之象也書稱為學遜志務時敏厥修乃來是知修身進學必本于順德能㢲順則人必樂告以善道乃能自微小以成其髙大也初六允升大吉象曰允升大吉上合志也初以柔㢲而復處卦下至卑㢲者也雖于上無應而承九二之剛與之俱升而應乎六五中正之位以柔承剛與二同心合意以進于上故獲大吉也象言允升大吉上合志者與二中心孚信不相疑忌能上合六五之志也君臣志合而升道得矣九二孚乃利用禴無咎象曰九二之孚有喜也九二得人臣中正之位而上應六五升道之最善者也君臣相與以孚信為主君未深信其臣雖周公未免成王之疑九二雖剛陽以處臣位之中君臣交孚故雖菲薄之禮無所疑也禴薄祭也祭祀之禮莫大于誠敬傳曰蘋蘩蕰藻之菜潢汙行潦之水可薦于鬼神可羞于王公茍不以誠敬為先雖品物之多樂舞之盛神其吐之矣惟中誠實乃能通乎神明而亨福祿之報何咎悔之有乎象言九二之孚有喜者上下交孚志得而道行天下皆喜樂之矣萃與升相反而相同萃之六二升之九二皆以有應而交孚故二爻皆云孚乃利用禴君之深信其臣與臣之深文其君其理一也九三升虛邑象曰升虛邑無所疑也九三以剛陽之才而處陽位體既卑㢲與物無競非衆隂所能遏也又有上六為之正應故如入空虛之地物無不順從者象曰升虛邑無所疑者紂有臣億萬離心離德故孟子有獨夫之號雖商邑之大猶空虛也以往則無所疑矣此文王必伐之志武王卒其伐功牧野之戰卜之人心無可疑者也六四王用亨于岐山吉無咎象曰王用亨于岐山順事也六四處近君之位上承于五處尊位而無陵犯之志者文王是也太王居豳狄人侵之去之岐山之下居焉從之者如歸市文王因之此周家王業之所基也居六四之地勢足以亨于天下然止于岐山者此文王之至德也在升之時當升而不進孔子所謂三分天下有其二猶服事殷也故能吉且無咎而象言王用亨于岐山順事也至武王則逆取而順守之詩人謂之卒伐功則亨于岐山者將時之未可乎然則聖賢出處進退之際易地皆然善學易者當察其變通之際則得之矣言豈一端而巳哉六五貞吉升階象曰貞吉升階大得志也貞者靜而正也能靜而正則獲吉而終陟元后之位矣六五下有剛正之賢為之正應如太公之流此文王所以卒登王位也然猶服事殷者六為柔順又體坤德雖位極人臣然猶守其貞固但升階而巳未及九五之飛龍也象言大得志者升道至此其志可謂得矣或以升階歸之九二夫九二在下之賢人階至而升可也便以升階歸之九二豈理也哉程氏以謂任剛中之賢輔之而升陸氏謂文王受命之象是也上六𡨕升利于不息之貞象曰冥升在上消不富也上六以隂柔處升之終而不知止者也冥然而行不知隂陽消息盈虛之理聖賢進退存亡之道至于敗國亡家而不知悔者大哉貞乎茍正矣雖知進而不知止富貴功名不足纍之也聖賢出處固非衆人之所測也若利社稷安生靈以宗臣自任終始以正道自持如周公者雖進不知止又何訾焉經于上六既戒以冥升而繼以利不息之貞豈慮萬世之下亦有如周公者衆或責以不釋位而去乎象曰冥升在上消不富者小人無正固之德貪冒寵祿冥然而升則其德日消而窮極繼之洪範五福一曰富今上六處升之極而不知止失富之道也程氏曰以小人貪求之心移之于進德則何利如之故其說曰君子于貞正之德終日乾乾自强不息以上六不己之心用之于此則利也以小人貪求無己之心移于進德則何善如之坎下兑上困亨貞大人吉無咎有言不信彖曰困剛掩也險以說困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也亨困之反也君子不以貧賤之道而得貧賤雖身困而道亨小人不以富貴之道而得富貴雖身亨而道則否也困亨者在困而能亨則不隕穫于困窮矣文王居羑里而衍易孔子厄陳蔡而弦歌顔淵居陋巷而不改其樂此聖賢處困之道也貞大人吉無咎者小人得路必厄居子當斯時也欲以貞固自處鮮有不蹈禍悔者故貞而獲吉非大人不能吉然後可以無咎有言不信者國之無道是非曲直顛倒錯謬君子可以忘言之時也象曰澤無水困君子以致命遂志澤水所積也水性趨下澤上而水下則澤必枯竭無以說潤萬物困之象也君子體此象以致命遂志雖處困厄之時未嘗不得其樂也致命者不以窮達禍福死生動其心也不以窮達禍福死生動其心則吾志何往而不遂哉伊尹耕于有莘之野樂堯舜之道伯夷叔齊餓于首陽之山不食周粟彼各行其志而已初六臀困于株木入于幽谷三歲不覿象曰入于幽谷幽不明也困者君子小人所不能免也得所援則不困矣初六以隂柔最處坎下為困之始有臀之象九四雖處近君之位為吾之應然以陽剛而掩于羣隂之中力不能有所援也如株枿之木自不能芘其身安能芘人哉初既無所芘覆又隂柔之才不能自遂顯明之地如入于幽谷愈以困窮耳故至于三嵗之久卒不能自見于世也初寓坎下隂險底滯趣下而善陷物其困也實有以自取之所謂小人以困窮之道而得困窮者也四雖勢足以應援非徒不能援亦莫之恤也詩言在彼空谷其人如玉蓋君子當窮獨之時困而不失其所亨象言入于幽谷幽不明者特以隂柔之才不善處困識慮昏蒙自趣于幽暗耳九二困于酒食朱􅌧方來利用亨祀征凶無咎象曰困于酒食中有慶也九二以陽剛處人臣中正之位又上有九五同德之君若可與有為然當困世君臣俱為羣隂所掩勢不能及物但有厭飽于酒食而巳豈其志哉朱􅌧天子飾下體之服九二以剛中之賢雖為羣隂所掩而位處中正不為貧賤所移此有道之主所以不忍遺也錫命之至其誰禦之故曰朱􅌧方來也方來者以言寵命之至方來而未巳亨祀者兼天神人鬼而言也九二以剛中之德雖在險難之中所守正固在困而心亨固可交于神明矣然在困守正僅能以貞固自守飲食燕樂可也非大有為之時若强聒妄動必有悔吝知未可動而動則凶禍之來將誰咎乎故曰征凶也征者有所往也象言困于酒食中有慶者君子能守其中正之德非能終困者也困而必亨積善于身必有餘慶矣六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也六三以隂柔而處尊顯之位二陽在上而欲進焉一陽處下而巳乘焉可謂不量力矣堅重難入而不可動搖者石也九四九五是也負芒刺而不可枕藉者蒺藜也九二是也小人之害君子方其處下巧為攻擊雖負凶惡之名不恤也方其在上則肆其憑陵雖嬰刀鋸之戮不避也蓋君子當困蹇之時以道義自處視軒冕猶桎梏于富貴如浮雲小人雖欲陵藉摧辱之卒不可得故孔子曰非所困而困焉名必辱非所據而據焉身必危以見小人卒不能勝君子而反受危辱也方是時也雖知退處燕閒為自全自安之計則已晚矣故曰既辱且危死期將至妻其可得見耶死期將至則凶可知矣象言據于蒺藜乘剛也不見其妻不祥也以見作不善之報仲尼于繫辭發明此爻使一卦之義渙然明白故豫妄欲發明仲尼之旨以袪諸儒紛紜異同之論而不敢自謂然也九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也解紛濟難固以速往為吉故解卦言有攸往夙吉困之初六最處卦下至困者也其望在外有力之援甚于倒懸之求解也九四為正應宜亟往赴之而其來反徐徐者以九處坎之中疑其深險而不敢進也况四居多懼之地以有强敵不敢輕犯其慮患深矣九二剛而處中運動適變有金車之象以九四大臣有濟國之志而不得伸誠可鄙也二剛當困世宜同心以濟困者况二為剛中之賢豈能終厄之哉故雖吝而有終也夫四與初為正應其援初之志未嘗忘也所以徐徐者將以有濟焉耳九四以陽剛而處隂位然卒無咎悔者有濟困之志為衆所與也孔子所謂困以寡怨者也九五劓刖困于赤􅌧乃徐有說利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也九五處中正之位有剛健之德若可以有為然當困世强臣在側為所脅制欲濟天下之大困必以去小人為先此劓刖之刑不得巳而用也上六六三初六皆小人而據其上善掩剛者故當刑而去之赤􅌧諸侯之服三隂未去威令不専勢必降殺僅同諸侯之位耳聖人處困有道能盡消息之理然後從容有濟不以困于侯位為慊而輕躁妄動也故徐乃有說也五居兑中小人既去志得而道行天下皆喜樂之矣如此然後可以祭祀宗廟以膺受多福也自古聖王郊天告廟未嘗不在小人既去憂虞既釋之後故萃渙二卦皆曰王假有廟而閔豫小子嗣王朝廟之詩亦在成王釋喪即政之始故此卦九五亨困之道莫利用于祭祀也象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也小人為害則志不獲伸志不獲伸則劓刖之刑所不得巳而用也九二雖非正應而處相應之地俱為隂柔所乘道同德合能以中道輔贊彌縫使不見去之之跡故九五之說以二能以中直相濟也祭祀非以祈福時適當然則為神天所祐故祭祀則受福也當困之時下能施刑于小人中得賢人之助上為神天之所福則不困而可以亨天下之困矣上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也上六以隂柔居困極之地三雖非正應小人之同道者也柔之為道雖假援而濟然六三自以隂柔處險非有剛健之才能挽巳于困厄者徒能纒繞之耳困于葛藟者反為三所困也六處上極下乘九五之剛不知進退存亡之道髙而必危故困于臲卼也曰動悔有悔吉行者當困極之時若曰動必有悔而不思變動則益入于困耳若能悔前之失窮而思通必濟矣君子未嘗無過過而能悔善莫大焉書稱慮善以動動惟厥時若時未可動則以安貞為貴時可動而不動則有後時之悔非困而求通之道也象言困于葛藟未當也言處困之道未當于理也動悔有悔吉行者若慮動必有悔而不復思動則終于困窮矣思變而行慮善以動理當獲吉不失其幾也㢲下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶井以象有常德之君子也改邑不改井邑人民所聚聚散無常而邑有時而遷井無變也夫有喪則有得若本無喪何所得乎汲者常滿而我無所損物賴以濟而我無所增或汲已而往或方汲而來出入往來其應無窮而井固自若也此井之功用也井之功用如此而汲者當致力以求之汔幾也繘綆也瓶所汲之器也若幾至而不及泉與不汲同以象君子之進德修業當力行而不怠也若半途而畫非徒不能成濟物之功而吾之器業亦隨喪矣羸者喪敗之象也人之器業至于喪敗豈有不蹈凶禍者哉故羸其瓶凶也彖曰㢲乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也㢲木也坎水也㢲下坎上木下而水上舉水而上之汲之象也此合二卦之體言井之用也井之為用泉源渾渾不舍晝夜取之無盡汲之愈新養物而無窮者也人物有代謝也墟落有時而變遷也而井不可易也二與五皆有剛中之德故能有常如此以象君子獨立而不變者爵祿可辭也名節不可移也身可殺也而道不可屈也非剛中者能之乎二五皆以剛陽為德而非應也有應則可以濟物而有功于天下矣故汔至亦未繘井者未有功也上下各以剛陽君臣各行其意豈能成功哉羸瓶之凶何所逃乎象曰木上有水井君子以勞民勸相木本在上欲汲水則反下水本趨下欲濟物則反上二者皆勞也君子欲兼善天下以成濟物之功者未有不始于勤勞者也故觀乎井之用以勞民勸相勞民者非驅之死地也東作西成不失其時春耕秋斂不遺其力以是而勸民使不怠于生養之業以是相民使不乏于衣食之原皆所以法井之功用也初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也井以潔清為貴汲多則日新無窮六處井下而上無其應不汲之井也汚泥所聚不可食也不食則井之用廢矣雖禽鳥亦將棄而逺之况于人乎如人不能致身髙逺之地而自處卑穢誰復汲引之者其極至于無禽則為時所舍棄可知矣九二井谷射鮒甕敝漏象曰井谷射鮒無與也水性本下其流為江河畜為沼沚卒歸于海者以善下故也而井之為用乃以上出為功非其性也九二雖以陽剛處中而無應于上乃下比于初不能及物故旁出為谷徒能射鮒而已井之功用廢矣如敝漏之甕何所用哉故象言井谷射鮒無與也無與者不為九五所與也君子有剛陽之才既不為上所汲引當以廉靜自守歸潔其身可也而朋比于下自投汚穢之地以抗其上其顛覆必矣故如甕之敝漏而無用于時也九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也泄治井去其汚穢其泉清潔可食也三居坎水之下㢲木之上汲之象也治井至于清潔可食如君子修德潔行于幽𨼆之中非在上者有以汲引之亦將廢而不用矣故為衆心之所憫惻也君子豈以不見用輕動其心哉為我心惻者衆人也水至于泄治清潔則可用汲汲不汲者上也君子有可用之才非明主孰能知而任用之知人惟帝其難之故稱王明王而明則浸潤之譖膚受之訴不行焉君臣上下俱獲其福利井之功既成而汲者以濟非獨在上者受其福而巳若泄而不食則行道之人皆為之傷惻也君子之不見用豈當有求哉求王明者量而後入也王而明吾之所求也不明之王可與有為哉六四井甃無咎象曰井甃無咎修井也井之畜泉泥或汨之甃所以潔其泉也君子進德修業必有致力之處雖未能及物然德業之盛必由此而致焉六四以柔弱之才居近君之位不能以剛健上輔人主從容禆贊期于無過而巳此大臣之任也故象曰井甃無咎修井也井非修治則汚穢所聚或為棄井朝廷之不治則綱紀廢弛豈非大臣之咎哉九五井冽寒泉食象曰寒泉之食中正也九五君位人君履中正之位其利澤可以及物矣冽清也井至清而寒泉之可食者也以象人君博施濟衆物所賴以生養者也人孰無濟物之心困于無位而利澤不加于百姓者則勢不足以有行也故象曰寒泉之食中正也上六井收勿幕有孚元吉象曰元吉在上大成也井收汲也收其綆以上水也縱而下之收而上之所以汲也幕者以幕障之使不得汲則井之用廢矣上六正應在九三井之為利當與衆共乃偏于所應而幕之使不得妄汲非居上博施之道故戒之如此有孚元吉者收而勿幕則逺近內外居者行者咸獲其利故有孚而獲大善之吉也象言元吉在上大成者井之功用至此而大成則在下者得其所濟而在上者獲其元吉矣離下兑丄革已日乃孚元亨利貞悔亡革變革也澤火二物本不相得非水滅火則火必涸水然亦相資而為用者能革剛為柔革生為熟水火之用不可闕一也離下兑上此水火相資而為用者故易曰窮則變變則通通則久欲久而無弊則革之道不可巳也其大者莫如革命湯武之事聖人所不得巳也其次則法度有不適于時不便于民者勢不可不革也三代之政有不得而盡循者莊周曰今期行周與魯是猶推舟于陸也此勢之不可不革者革之必駭人之耳目非常之原黎民懼焉聖人覩利害之未然而衆人見利害之巳然漢之賈生欲改正朔易服色知七國之必變而大臣絳灌尚不能用况無知之愚民乎故已日乃孚者見其利害之形而無可疑者也雖然革之道天下之至難非具元亨利貞之四德未有革之而不悔者有此四德則體與乾合可以大有為于天下有所不革革之無不當革之無不當則悔可亡矣彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉坎為水兑為澤兑非水也然離下坎上則為既濟而離下兑上則為革者何也澤最處汙下與火尤相戾也非若坎離之配合以致用也但能相息而巳息止也非生息之息也雖然水之息火理之必然者火安能息水哉蓋從其所勝言之火在下而澤處上則水必減耗耗而不巳則必涸竭理之不可不革也離為中女兑為少女中少二女雖同居而不相得者志各有所行也雖中女處內而少女反處乎外其勢不得不革離下兑上所以為革也少女處內中女處外其勢不得不睽故兑下離上所以為暌也聖人固重于改作愚民亦樂于因循自非燭見利害之原革之而當豈能使天下曉然心悅而信服之哉文明以說大亨以正革而當其悔乃亡者合離兑二卦之體以盡革之理也文明則不昧于事幾說則不違咈乎百姓又能大亨而盡正固之道以此變更天下之事所謂革而化之與時宜之尚何悔吝之有哉悔亡者凡革之道本有悔革之而當故悔可亡也湯以寬仁而革桀之威虐武王以聖德而革紂之淫酗漢王入關約法三章以革秦之苛暴昭帝以靜治而革漢武之窮兵豈有悔乎天地革而四時成湯武革命順乎天而應乎人革之時大矣哉者聖人深言天地萬物之理茍或當革有不可得而已者天地所以亘萬古而無弊壞者以造化密移新新而不停也觀夫隂陽之消長日月之往來而四時行焉此革之見乎天地者也桀之無道而湯放之紂之無道而武王伐之天道助順人心歸仁有不可已者然則革之而當則天下蒙其福百姓亨其利治亂存亡係焉此革之時所以為大也象曰澤中有火革君子以治厯明時水性潤下火性炎上物之至異者也澤中非有火之所澤中有火必相滅息其勢不可不革也君子體此象以治厯明時則隂陽消息之理不能逃矣記曰聖人慎守日月之數以察星辰之行以敘四時順逆謂之厯蓋日月之運星辰之行雖有常度然積久則不能無差差則厯法壞而四時或不得其正矣自黃帝迎日推策降而唐虞三代下而漢唐其詳見于天文厯書莫不以五行為本聖人取象水火之相息以明厯法之必當革也初九鞏用黃牛之革象曰鞏用黃牛不可以有為也初以陽剛為革之始疑于堅頑而難革者也然能以中順之道自固雖無應于上然順而得中為革之始雖非强狠難化之人然能守其貞不狥于物如黃牛之革而體不變也象言鞏用黃牛不可以有為者守其貞固不為時所變易從道而不從時者也此陽剛君子伏而在下自處則善矣未可以大有為于天下也必欲大有為于天下非幾足以通天下之志權足以通天下之變者未易任此故曰不可以有為也六二已日乃革之征吉無咎象曰巳日乃革之行有嘉也六二以隂柔處中正之位而上有九五陽剛之君為之正應非敢先時而動于悔亦不敢後時而失其幾又隂非倡始故巳日乃革之能應上之命以中正之道從其所革如此然後進而有為則吉無咎矣象言行有嘉者巳日革之革之而當故為上所嘉美也人臣進退度時而已可則行不可則止二五各據中正之位而君臣道合可與有為之時也九三征凶貞厲革言三就有孚象曰革言三就又何之矣革非聖人之得已也其弊極矣堯舜三代之法有不得盡循者然皆非聖人之得巳也九三以剛健之才而處陽剛之位過乎剛者也革之道中而巳茍過乎中則一動一靜無適而可蓋革之不當則天下將起而非我矣往固凶也將退而窮處其身益危若之何在察乎人情之向背而已聖人將欲革天下之大害以興天下之大利必有勞民動衆之事非灼見利害之原者豈能使衆人翕然從我而無疑乎故革言三就則從我者衆矣聖人欲有所革默觀天下之公論言可革者三然後中外孚信而無復橫議者矣如此舍我將安之乎故象言革言三就又何之矣九四悔亡有孚改命吉象曰改命之吉信志也九四無應于下宜其悔也然上承九五之君為革之主勢足以有行有所不革革之而天下莫敢不從故無復可悔之事也湯伐桀而伊尹相之武王伐紂而周公輔之上下內外有不信乎天下既已信服則順天應人以膺受天命而獲無疆之福矣此九四之任惟伊尹周公足以當之象曰改命之吉信志也革之而吉則湯武之志信于天下亦九四之功也九五大人虎變未占有孚象曰大人虎變其文炳也乾之九五曰飛龍在天利見大人革之九五曰大人虎變未占有孚龍虎皆大人之象在乾則為龍革則為虎何也龍能飛能潛升降自如故有乾之象虎以剛猛之威炳煥之文故有革之象易雲從龍風從虎聖人作而萬物覩龍興虎變皆取象于聖人也當革命之際非剛猛之威不足以服天下非炳煥之文不足以化天下舍湯武其誰哉未占有孚者九五之君威望素著革道巳成應天順人無可疑者不待占筮而天下固已信服矣象曰大人虎變其文炳也革道明著必有粉飾顯設之事以化成天下有目者無不覩也故曰其文炳也上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也革之六爻二隂而四陽隂柔也陽剛也陽能變隂剛能變柔大人虎變自變也君子豹變從所變也上六之時革道已成人無賢愚莫不咸化其上特淺深之異耳豹變者質性之皆變與五同德若箕子微子是也革面則其心未必然也商之頑民是也聖人之化小人革面足矣觀酒誥一篇其待商之諸臣惟工乃湎于酒勿庸殺之姑惟教之如此豈暇革其心哉非獨不暇亦不能也上六以隂柔而處革之終不可以有為也以靜正守之則無事矣吉凶禍福特在動靜之間耳可不慎哉君子與上同其心德革而化之故其文蔚然小人特畏吾之威刑所革者不過外䫉而巳其心未必然也㢲下離上鼎元吉亨易無非象也蓋制器所以尚象立象所以明義也鼎之為卦以全體言之則下㢲上離以木㢲火中虛而下實此制器所以尚象也以六爻言之則中實為腹所以受物下植為足所以承鼎對峙于丄以為耳橫亘于耳中以為鉉此立象以明義也有其義有其象則夫運動其器以致用者聖人也此鼎之所以謂象也鼎之為象如此故大吉而亨曰元吉亨者大吉然後能亨也聖人立成器以為天下式鼎之為器通上下用之而聖人用之非欲衆人之養口體而巳彖曰鼎象也以木㢲火亨飪也聖人亨以亨上帝而大亨以養聖賢㢲而耳目聰明柔進而上行得中而應乎剛是以元亨鼎之為卦専取其象則其義自見矣所謂立象以明義也如頤之下動上止有頤頷之象噬嗑震下離上頤中有物之象此自然之象若鼎之為象則假于人為然後成器以致用者也鼎所以正名曰象者如此鼎固重寶大器也非無用之器也有鼎之象必有鼎之用非若珙璧琬琰徒為寶器而已以木㢲火所以為亨飪之用亨飪所以為祭祀賓客之用祭祀莫重乎亨上帝賓客莫大乎養聖賢此二者聖人運動大器之道也㢲而耳目聰明上離下㢲屈體以尊賢則賢者必樂告以善道故能合天下耳目以為聰明而六五柔弱之君能進而上行以登尊極之位者以在下有剛健之臣應乎我者衆也此所以能大亨也繇辭言元吉亨彖言元亨而已能致大亨則吉不足道也象曰木上有火鼎君子以正位凝命鼎雖假于人為及其成功則有自然之象非若餘卦但取其象而巳故木上有火者鼎之所以成器亦所以成物而致亨飪之功焉君子體此以正位則位一定而不可踰體此凝命則命一成而不敢變夫鼎所以革故而取新也其為器也重其為寶也大國之存亡係焉宜為歷代受命之君所寶用歟聖人置此卦于革震之間者豈無意哉蓋革命則鼎取新而震為長子守器之主也武王克商遷九鼎于洛非以其器大故邪蘇氏曰五帝三代及秦漢以來受命之君靡不有此鼎鼎存而昌鼎亡而亡蓋鼎必先壞而國隨之豈有易姓而猶傳者乎此合大易取新之義觀乎彖辭以木㢲火亨飪也此蘇氏所謂用器也戰國之時鼎為周患秦與齊楚皆欲之三國之君未嘗一日而忘周者以鼎在焉故也是惡知聖人立器觀象之㫖哉初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也卦有専取乎象者鼎是也以上九為鉉六五為耳四三二為腹則初六者趾也鼎以安靜不動為體趾所以承鼎也鼎而顛其趾則所以為鼎者覆矣鼎不覆則不能去穢而納新故利在出否否者穢濁也鼎以取新為義不可不潔也穢濁者出則可以受實矣妻者嫡也尊且正也正家而天下定矣妾非正也得妾者匹嫡也如趾之顛而反處乎上也然有時而不得已者春秋之義母以子貴是出否惡也否惡既出所以為利如妾之至賤越嫡而上配乎主者悖也以子而貴則非悖也初六上應九四有從貴之象如鼎顛而出否固有以顛為貴者夏之鼎覆而商受之商之鼎覆而周受之然則出否者其在鼎初乎若大臣不勝其任不過折足所覆者美實而已未係于存亡也聖人寓不盡之意于卦初姑言其小者耳九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也隂虛而陽實以九居二二于鼎為腹受實者也自二之四為乾乾陽物是鼎有實也九二正應在五五之于二仇匹也五欲下應于二而四三以剛强塞其往來之路九五之所甚病而不獲于下者也九二居中正之位為臣而盡臣道不可加矣六五欲增益之適以纍之耳故不我能即然後乃吉也鼎有實非虛器也人臣負其實才之象即就也伊尹耕于萃野孔明處于草廬二主能輕身而往從之然後可以出而有為今二已處人臣中正之位非不召之臣也正其君臣之分可也故不我能即乃二之福也象曰鼎有實慎所之也我仇有疾終無尤也人臣有可用之才當擇其所從則不枉道矣故曰慎所之也能守其職任則免乎悔吝矣故終無尤也此人臣自處于中正之道也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也鼎以象言九三居㢲之上處離之下與二四皆腹也非耳也曰鼎耳革者言六五之道至此而變革也六五君道也君易其常道則賢臣在下者于是否隔而不通矣三陽也以九居三人臣過乎剛則强臣也宜乎在上者有不能堪也人臣孰不欲行其志若君疑其臣則退而窮處可也故曰其行塞也雉膏鼎中之美實也以象美德謂有美德而不獲進也不食者謂人主懸美祿以待天下之賢而三乃自守窮獨而不復貪冒者良由君臣始交之際其情未通雖明良相遇亦不能大有為于天下也方雨虧悔終吉者陽氣升而隂固之則為密雲耳雨者隂陽和也方雨者隂陽方欲和也以象君臣方情通道合則前之所悔者既虧而終吉矣上下疑阻而不交者悔也既交則悔虧矣象言鼎耳革失其義者人君不能體離明之照虛已聽納則失其為耳之義矣九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也鼎之恃足猶宫室之恃柱礎也未有柱礎傾折而宫室不摧者南山有臺之詩樂得賢也得賢則能為邦家之光立太平之基矣鼎之九四處大臣之位當腹心之寄國之廢興存亡繫焉可以非其人乎下有二陽不能引而進獨與初六為內應是忌其同列而締交乎小人也是折其足而覆其養賢之資也其形渥者言汚穢之甚也汚穢之狀見于面目形骸之外甚者或至刀鋸之戮原野之刑加焉其凶甚矣象言覆公餗信如何者大臣不能量力事主而固寵保位至不勝任而顛覆戮辱隨之尚何救哉孔子曰不曰如之何如之何者吾末如之何也已信如何者信乎無如之何也先儒以形為刑渥為剭言大臣不勝任則受其大刑王㳂曰古之大刑有剭誅之法然則刑者誅及其身而巳至其形渥凶豈獨戮辱其身而巳哉六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也五居鼎上中虛而無為雖不若足之任重腹之受實若無用而鼎用以之成也鉉以扛鼎耳以受鉉而鼎始成運動之功六五為鼎之得中而能虛己以受物有君之象故為耳黃者中也金鉉上九也耳處鼎上鉉又處耳上耳無為而鉉有為也雖在卦上居鼎之終而不得中正之位故為鉉而已鉉貴而無位利貞者為利也體本柔弱介乎强臣之間能虛巳無為以正道格之則衆陽皆為我用矣象曰黃耳金鉉中以為實非虛名也上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也上九之為鉉不可易也上處卦之極體柔而用剛鼎道既成不為燥濕之所變易有玉之德焉金從革者也玉不可革也鉉固鼎之所用非虛器也在五為金在上為玉則益貴矣以玉為鉉又所以飾鼎而鼎道大成故大吉而無不利也象曰玉鉉在上剛柔節者上九以剛乘柔居鼎之上而用之有時且六五之柔非鉉不行是相資而為用相待而成功者也又玉之為德其溫潤有似乎仁而非柔也縝栗有似乎義而非剛也故曰剛柔節也讀易詳說卷八
