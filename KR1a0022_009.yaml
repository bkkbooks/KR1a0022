body:
  text: 讀易詳説卷九宋李光撰下經震至巽震下震上震亨震來􅊒􅊒笑言啞啞震驚百里不喪七鬯彖曰震亨震來􅊒􅊒恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也震動也動萬物者莫疾乎雷蓋雷發聲則蟄者皆奮甲者皆坼屈者皆伸故震然後能亨也人之處乎燕安無以警畏之則怠惰驕慢惟湛樂之從卒而困窮者多矣故震然後能亨也􅊒􅊒懼也震來而知懼則可以不懼矣故笑言啞啞也􅊒字不見於經傳惟許慎説文云􅊒蠅虎也諸儒皆承此説蓋蠅虎之摶物必周旋而進退故震來而能􅊒􅊒者恐懼之象也啞啞和樂之聲也震驚百里不喪七鬯何也雷之震驚逺及百里而不失其七鬯以見倉卒之際精誠專一不為外物所移奪可以付重器矣七者載鼎實之器鬱鬯所以灌也彖言震來􅊒􅊒恐致福者恐懼則能致福此聖人所以畏無難而不畏多難也衆人當震擾之時鮮有不失其常度者惟君子雖恐懼畏慎若無所容而其中實從容燕笑不失其常度也故曰笑言啞啞後有則也震驚百里驚逺而懼邇者邇者懼逺者驚則威之所加者廣矣雷之震發猶人君威令必能驚逺而懼邇然後可以震動萬方而無不肅也震為長子長子主器者也古者天子之出太子監國當震動之際能不喪七鬯是其器業之𢎞大必能守宗廟社稷之重寄蓋自其微者而察之也孔子曰禘自既灌而往者吾不欲觀之矣祭祀之道誠敬為先灌其始也不誠不敬鮮有不喪所守者故不喪七鬯聖人知其可以守宗廟社稷而為祭主也自古居儲君之位任主器之重上既嫌疑下亦窺伺鮮有不蹈禍敗者以秦皇漢武之英果而扶蘇戾園卒以見殺况其下者乎聖人于卦彖爻象皆反覆致其恐懼戒慎之意其為後世慮豈不深逺哉象曰洊雷震君子以恐懼修省洊者如水之洊至雷聲相繼而至曰洊蓋威怒之象孔子當迅雷風烈必變所以敬天怒畏天威也恐懼則知所修省矣雷之洊至非變異之大者君子必惕然有敬畏之心焉聖人防患必于其微詩敬天之怒無敢戲豫敬天之渝無敢馳驅况于山冡崒崩日月薄蝕彗孛飛流而恬然不為之警懼乎成王惑管蔡疑周公天乃雷電以風雷之變豈無自而然哉君子所當恐懼而修省也初九震來􅊒􅊒後笑言啞啞吉象曰震來􅊒􅊒恐致福也笑言啞啞後有則也繇辭統論一卦之體而初爻為衆爻之主故其辭皆同蓋震為長子乾統三男而長子用事震所以代乾也然當震之時陽欲奮而二隂厄之則其勢必有危我者能自警懼然後可以獲吉故于初爻特加一後字以見非有􅊒􅊒之懼則不能致啞啞之吉也六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也彖辭以震驚百里不喪七鬯知可以守宗廟社稷以為祭主蓋以卦之全體言之震以陽剛為主陽雖在下隂以退聽故處震之時能安靜不動惟剛者能之六以隂而處二其時與位皆純乎隂者也故震來則危厲而失其所守喪其所資億言所喪之多也躋于九陵者有所避也九陽數之極言所避遐逺也古人于至崇至深之地皆以九為言如九天九地九淵以見崇深之極處也勿逐七日得者既能危懼遁避則在我者盡矣可以勿逐而自得也宣王遇災而懼側身修行以致中興之治復文武之業豈必外務而馳逐之乎復卦言反復其道七日來復天行也以卦氣言之爻各主一日卦位有六七日乃更始自二至上復反于初復自初之二則所歷七爻乃七日也隂陽得喪之理循環無窮豈有常哉未有常治而不亂常否而不泰者故知七日卦氣之終不俟追逐而自復也象曰震來厲乘剛者六二處中正之位在他卦為吉今震來而厲則以乘初九陽剛也陽上隂下陽尊隂卑今以隂乘陽則危道也六三震蘇蘇震行無眚象曰震蘇蘇位不當也六以隂柔而居陽剛不中之位非處震之道故震至而蘇蘇也王弼曰震者驚駭怠惰以肅懈慢者也震動而至于蘇蘇則驚懼甚矣以此而行可以無過又四為震主而三能承之當震之時知敬順之道故可無眚也象言震蘇蘇位不當者震為長子以不喪七鬯為善今蘇蘇然若無所容者由所處非其位也為長子而處非其位可不畏哉九四震遂泥象曰震遂泥未光也九四陷于重隂逼于尊極未能超然處于物上當震之時以剛健之才處嫌疑之地如陽欲出地而上下二隂壅遏之其勢不能致逺而大有所為也故象曰震遂泥未光也震本主動而有能行之象其道本當光亨以厄于二隂故未能也六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也古之聖王處尊極之位能栗栗危懼而無荒怠之失則可以永保其位矣當震之時下有九四之強臣五無應而來乘剛或往或來能自危懼則可以萬萬無失矣無喪有事者不喪其所有之事也無非事者所有之事未易概舉不喪七鬯則事之大者也震之時往來皆危行也能履于危則可安其位而無失矣六五為動主雖居中正之位其才柔弱非能濟乎險難者本有失也以位處中正故得大無喪也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也處震之極其勢必危故氣索索而幾盡視矍矍而無主也居嫌疑之地當危懼之時能以安靜退縮自處庶可免禍而上六隂柔之質性復動躁急于有行其凶必矣上既無應而下比于五五其鄰也上雖處震動之極而無其位方海內震擾之時而六五實任其責又禍非已致故震不于其躬而于其鄰則在我為無咎也婚媾有言者上六雖不任責既處上極望我者亦衆方天下震擾豈得盡歸于其鄰恝然忘情若秦越之人哉雖所親者且有怨懟之言况他人乎象言震索索中未得也雖凶無咎畏鄰戒也以所處上極未得中道故驚懼之甚至索索然也上六有往雖凶而能恐懼修省以鄰為戒則可以免咎矣艮下艮上艮其背不獲其身行其庭不見其人無咎彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也道之廢興係乎聖人出處之間艮之為卦一陽極乎上二隂處乎內羣隂為主而一陽在外此可止之時也時茍當止不可強行故艮其背者得所止也人之相面所以盡交際之道背者隂也非交物者也能止于所當止非獨忘物也而至于忘我故不獲其身不見其人雖户庭之內而人我俱忘矣當可止之時猶出而交物則咎悔隨之于可止之時而能止是真止矣行于有人之境如入無人之境物與我無相尤也故無咎彖言艮止者釋艮之義一言可盡者止而已聖人又惡夫一往而不返者故曰時行則行時止則止動靜不失其時其道光明也聖人動與陽同波靜與隂同德豈滯于一隅若聚塊積塵哉一動一靜適于義而巳故能大有為于天下而其道光明也艮震之反也九三為震艮東北之卦有震動之象焉卦之反合爻之升降豈有常哉艮其止止其所者止得其所謂艮其背也若止于前則有所見而聲音接于耳目者擾擾矣故惟止于背為得其所也上下敵應不相與者一隂一陽上下不敵所以相與故形躁好靜質柔愛剛二女同居雖近而不相得鳴鶴在隂雖逺而相求故近不必比而逺不必乖特在應與耳今六爻既相敵而非應如人之相背而行雖衆而各不相知是以不獲其身行其庭不見其人無咎也象曰兼山艮君子以思不出其位上能兼下大能兼小尊能兼卑艮以兩山相重勢均而力敵非相應也而相兼也兼非異體也各止于其所止而巳君子體此象以思不出其位謂安其分守無躁妄也夫止者施于其背則真止矣是猶山兼山豈復有動乎聖人以此象示人則物各安其性命之正矣初六艮其趾無咎利永貞象曰艮其趾未失正也足本主動曰趾者固以止為義况艮之時而以隂柔處下動則悔吝生矣于艮而能止是不失其幾故得無咎也利永貞者當艮之初動則入于邪矣故利在永貞貞者靜而正也當止而止卷懷其道若將終身焉故以永貞為利此聖人肥遁之時也故象曰艮其趾未失正也止于其初雖未可語權于正道為未失也六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也趾也腓也股也一體而相為用者其行其止皆非三者所得專也然腓在足上其形雖動躁未有足行而腓不應者故腓之從足猶股之隨腓觀乎咸卦則可見矣咸以動而感而艮則靜而止六二體既躁動而上下拘制不能自專以有為安能拯其隨乎隨為三也二既不應五而上承于三三雖以陽剛處上當艮之時志在隨人而已無能為也雖欲用其智謀以拯救之而其志卒不得伸故其心不快也象言不拯其隨未退聽者二處人臣中正之位志在有為非能終止也其肯恝然忘情于斯世哉九三艮其限列其夤厲熏心象曰艮其限危熏心也夫一人之身四肢百骸動靜相為用者也今艮其限上下內外隔絶而不相通猶裂其膂脊而為二物也其危厲甚于熏灼其心也限身之中夤脊膂肉也自其限而止之猶裂其脊膂言君臣上下各止其止而不相通也三居下卦之極而九以陽剛處之施止于限果于靜止而不知變以趨時者也昧乎時行時止之義故聖人以為戒焉古之人有行之者如漢二龔魏范粲雖全大節當時處之其危厲熏灼痛忿之狀豈人所能堪哉六四艮其身無咎象曰艮其身止諸躬也六四已進而達乎下卦之上能兼乎上下者也故以全體言之曰艮其身也處近君之位不能以道濟天下蓋六五柔弱之君非有剛健勇決之臣以輔翼之不足以大有為也四能量其君度其才止于所當止故得無咎而已象曰艮其身止諸躬者躬有致恭之義人臣之節行止進退不失恭順雖不能止天下之所當止而為全身之計則善矣故爻以為無咎而象言止諸躬而已夫身為大臣宜兼濟天下而為獨善之行聖人之所深鄙而可以忘言者也六五艮其輔言有序悔亡象曰艮其輔以中正也六五在六爻為君位君無為也出言則為號令輔者言之所出也王者之言其出如綸能艮其輔則言不妄發而悔可亡矣夫下卦為趾為腓為限得其一體而已進至六四則為身然猶局于形體非能超乎形體之外也惟六五處中正之位有輔頰之象一言之善則千里應之一言之失則千里違之能運乎形體而不為形體所拘故吾欲止天下之當止孰有不從者五為艮主故所止如此上九敦艮吉象曰敦艮之吉以厚終也上九重艮之終也二山相重敦厚之至人能靜止如山之相重出乎萬物之上其孰能動搖之故曰敦艮吉也象曰敦艮之吉以厚終者夫以靜止為德終之實難上以剛健為德至誠而不息者也與夫作輟者異矣故曰以厚終也艮下巽上漸女歸吉利貞女子之嫁也猶士之仕也皆惡不由其道也漸之辭專以女歸為吉女之適人必待求而後行納采問名匪媒不得漸之義莫大乎此利貞者所利在正也貞者靜而正也女能以正行未有不以漸者能以漸固獲吉矣然亦有漸而不正者蓋長女少男疑于不正異乎咸之相感恱故既吉又戒以利貞也彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也進固多門矣有挾術而進者有阿其好而進者有以邪塗進者有假隱遁為捷徑而進者莫若以漸而進為得其正如女之歸人則吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也皆進之善者也進而得位則可以行其志而可以大有為矣故往有功也未有枉尺而可以直尋者枉道而可以事人者亦未有身之不正而可正人者故士之進身其始不可不正也進以正然後可以正邦蓋一正君而國定矣進為于世固不可不剛健然剛健不可過也不可不及也漸之六爻皆得其正謂二四之隂而六居之三五之陽而九居之初上二爻雖無應而皆得隂陽之正也九五履至尊而得中正之位為漸之主故云其位剛得中也止而巽動不窮者艮止而巽動止者靜而動者順以此為進雖涉險蹈艱何往而不利哉象曰山上有木漸君子以居賢德善俗山之有木長養而成就之自青蔥以至合抱必有其漸君子以祿位處賢有德之士與夫化導天下之俗使入于禮義亦必皆有其漸而不可遽也堯之用舜猶歷試諸艱以見賢德之不可驟進也善人為邦百年可以勝殘去殺以見風俗之不可頓革也初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也漸之六爻皆以鴻為象鴻水鳥也能知進退者陵陸非其所安也江湖之上是其所棲息也干水涯也將離乎陵陸而近水涯雖其進有漸然猶未免矰繳之患故其勢不得不危懼也小子未有所識之稱非小人也六以柔弱而處卦下有小子之象若隨之六二係小子能隨人而巳豈能達乎進退之幾故危懼而不自安也居漸之初宜棲息以俟時可也衆雖有言在已無愆何足恤哉度之于義無可咎者故象曰小子之厲義無咎也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也磐石之盤旋于水中者比之于干則離乎陵陸逺矣故飲食衎衎和樂而無意外之患猶賢者進而得祿位也二處人臣中正之位上有剛健之主為已正應故身安而爵祿可保也象言飲食衎衎不素飽者人臣遭時遇主進而得正履而得中必將有以濟天下故食人之祿則懷人之憂衣人之衣則思人之患豈竊位素餐以飽其身肥其家而巳此又聖人致其戒慎之意也九三鴻漸于陸夫征不復婦孕不育凶利禦冦象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也鴻隨陽往來爾雅曰髙厚曰陸陸非鴻之所宜安也漸進于陸雖若可安然非其所樂也故以象夫之征而不復婦之孕而不育也九三陽剛不能漸進征者未有不思復孕者未有不思育然失于急躁不能待時而動則二者皆不獲其志不獲其志凶可知矣利用禦冦者四三相比同心不違故利用禦冦如蒙之上九不利為冦利禦冦蓋為冦則衆之所違禦冦則衆之所助與此象體異而義同也象曰夫征不復離羣醜也九三以剛陽獨進于上離乎羣衆故往而不能反也婦孕不育失其道也婦以貞順為德生育為功孕而不育不能保養其子皆欲速之咎也利用禦冦順相保者天下之理逆則相違順則相保三雖失于剛暴言能順于義理則可用以禦冦也黥彭之流逆則為敵順則為用卒滅項氏者能順以相保也六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也木比之陵陸益非鴻之所安此漸卦以鴻象君子之進退當以其漸而不可亟也江湖鴻之所樂處也陵也陸也木也雖愈進而愈非所安此知幾之士所以難進易退以避矰繳之患也鴻漸于木雖非所安或得其桷若可以棲而無患故無咎也桷木枝之大者象曰或得其桷順以巽者鴻未有棲于木者或得其桷非其常也四體在巽巽為木三附于四桷之象也君子立人之朝履富貴之危機能以巽順承上而接下可以少安然終非其處也仲尼于此爻寓戒深矣九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也九五君位其進益髙故以象鴻漸于陵大阜為陵同人九三曰升其髙陵言其所處最髙而不可陵也五與二得君臣中正之位三以陽剛而乘于二四以大臣而比于五二五雖應而未能遽合也故三嵗不孕君臣以中正相與茍志同道合其孰能間之故曰終莫之勝吉也夫君臣之交患在不正故近不必比而逺不必乖特在情志之間合與不合耳象言終莫之勝吉得所願者小人之害君子或能厄之于始君子之進固自有機會時茍當進小人雖廣設坑穽比力合謀莫能陷害之小人不能陷害則君子之道亨而平昔之志願獲矣上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也上九大臣之處乎髙位而不任事者特其形容可為朝廷羽儀耳鴻飛𡨕冥弋者何慕既出乎事外小人莫得而害之故吉也上與三皆稱陸人臣致身于極髙之位能自卑巽下與三同蓋盡乎屈伸之理所以吉也象曰其羽可用為儀吉不可亂者其形容既足以儀表天下則朝廷之上百執之衆尊卑有别上下有等雖羣而不黨故曰不可兑下震上歸妹征凶無攸利聖人于夫婦之際每存終始之義始之不慎而能克終者鮮矣女少而説男之所以動也説不以正動不以禮則華落色衰復相棄背故征凶無攸利也征凶者以媚説而往則凶也無攸利者無所往而利也漸之所以吉者艮止巽順以男能下女也歸妹征凶者兌説震動六爻皆不當其位也咸之相感必繼以恆蓋男下女則隂陽之義明女從男則尊卑之位定所以存鑒戒也彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也無攸利柔乘剛也乾健而坤順陽尊而隂卑此天地之大義也然乾下坤上而為泰乾上坤下而為否若嚴其分位則天地不交而萬物不興矣歸妹以少女在下而長男處上為正故其事可常而有終始也女説而男動隂陽感悅所以成歸妹若老婦士夫則可醜矣雖然女子處幽間之中非有求焉則不往也若説以動則有不待媒妁之言者故隂陽之位不可不當也不當則所往皆凶矣女處乎下男位乎上內外上下各當其位以往則無不吉也今二四隂爻而九居之三五陽爻而六居之無一當其位者故以往則凶也無攸利柔乘剛也剛者柔之所承也而反乘之乘者婦陵其夫之象也卦體兌本在下于理為順而爻六皆乘九是以隂而乘陽失尊卑之序內無柔順之道外失陽剛之德則害于而家凶于而國何所利哉夫成家之道必資于婦順故婦順備而後內和理內和理而後家可長久也恆之六五曰恆其德貞婦人吉夫子凶象曰婦人之吉從一而終也夫子制義從婦凶也恆者夫婦之正也故其戒如此然則隂之乘陽柔之乘剛豈非逆德也哉世之悍婦以制夫為能使不得措其手足是猶強臣擅命威福自專反制其君也漢成帝制于趙氏唐髙宗制于武氏中宗制于韋氏卒至滅身亡國何所利哉况以帝女之尊而下嫁諸侯車服不繫其夫勢固足以陵其夫矣故聖人于歸妹為戒象曰澤上有雷歸妹君子以永終知敝澤之氣能升而為雲雷震而澤隨此隂陽相感之義有歸妹之象焉男女以動悅相感或失于不正故昏禮將合二姓之好必納采問名敬慎重正而後親之如此然後家可長久也聖人見微知著見其動而説知其不能終也若恆以巽而動則知其能久漸以止而動則知其終吉也是道也雖君臣朋友之間莫不皆然豈特夫婦哉初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也古者諸侯一娶九女嫡夫人及左右媵皆以姪娣從歸妹以娣女歸于人而以娣從也九居于初女之賢者始進而能謙無妬忌之行猶跛之能履勉強而行步驟馳騁不敢自恣也歸妹而能以娣往為永終長久之道尊卑相承故無往而不吉也此歸妹之善者也九二眇能視利幽人之貞象曰利幽人之貞未變常也履之六三以隂柔而據陽位故如眇者之能視不足以有明也跛者之能履不足以與行也故如履虎尾嘻人凶歸妹初九九二以陽剛而寓于隂位此婦人之貞吉也二又居中履正有常貞之德退處乎不競之地雖若無所能為如眇之能視異乎摘埴索塗𡨕行而已故利幽人之貞九二得中正之位上有六五為之正應此又夫弱而婦強者能自謙遜乃不失婦人之常道也六三歸妹以須反歸以娣象曰歸妹以須未當也歸妹以説而動常失于不正而六三復以隂柔而居陽位故當有待而以娣行如此乃能合禮而無妄動之失也須待也女子之嫁固當待父母之命媒妁之言而三為説主以説而動動不以正則非女子之行也故曰未當也九四歸妹愆期遲歸有時象曰愆期之志有待而行也女之適人猶士之事君必有求焉而後往九以陽剛而寓隂柔之位上無正應此賢貞之女屏處幽間未遇良匹而不茍然以從人者雖過期而不悔也懷才抱義之士固有不遇明時而老死丘壑者白駒之詩所為作也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也史謂湯為天乙又有祖乙多士稱成湯至于帝乙罔不明德恤祀則帝乙蓋商之賢王非天乙祖乙明矣堯降二女于溈汭嬪于虞帝女之尊下嫁諸侯其來已久至帝乙然後制為婚姻之禮而周因之以詩考之天子之女下嫁諸侯車服不繫其夫下王后一等故帝乙歸妹所以為萬世之法也漢唐公主下嫁舅姑率北面于堂下至于本朝神宗始復三代之舊屈帝女之尊而人倫正矣詩美后妃服浣濯之衣無妒忌之行豈恃容色以爭妍取媚哉君嫡夫人也娣左右媵也娣以容色為主故君之袂不如娣之袂良也六五與九二為正應下嫁之象也女處尊位履順居中盡其隂陽交配之宜斯善之善者豈特容服之間哉月者日之配也婦者夫之配也月受日以為明至望則體敵矣體敵盈之極也未有盈極而不虧者今能降尊配卑不以滿盈自處如月至幾望而止婦之謙順既不抗其夫又能惠其下此帝女之尊而能履中道者故象曰其位在中以貴行也上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也上六歸妹之終以柔乘剛而下無其應女之無所歸者婦以奉祭祀為職詩言夫人可以奉祭祀則不失職矣女承筐無實何以達其誠士刲羊無血何以薦于幽如是而家道廢矣故以士女稱之見夫婦之道不成也卦體兑下震上少女以説而動動不以正又六爻位皆不當故不能永終而有離絶之象何以往而利哉聖人于終爻致其戒慎之意深矣離下震上豐亨王假之勿憂宜日中離震于時為春夏萬物豐亨之時也王者之治自天造草昧以至豐而亨則太平極盛周家之業至成王之時是也故曰豐亨王假之詩云假樂嘉成王也以言成王能持盈守成以致太平之功故嘉之也文王若日月之照臨顯于西土而巳如日之方中萬物皆照則在成王之時故可安亨佚樂而無憂勤之慮也故曰勿憂宜日中也雖然太平之業豈可恃乎泰之上六言城復于隍蓋泰之極無不否者聖人所憂不在乎未中而常在日之既中能知勿憂為有憂之大如日之升如月之常則可長保其治安矣彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况于人乎况于鬼神乎豐固不止于大聖人以一言斷之曰大蓋豐之時物得極其大也日以烜之雷以動之長養成就物之所以能大也王者之治能體乎離震之法明以動故能假乎至治然則豐亨之道豈非聖王之所尚乎故曰王假之尚大也勿憂宜日中宜照天下也聖人之道如日之中容光所及無不遍也蓋日之始出則其明未盛日之將昃則其光巳虧皆不能遍天下也然則聖人可以自暇自逸者其惟日中乎日中者治安極盛是聖人畏無難之時也日之中猶月之望也既中無不昃既望無不虧食虧也天地盈虛四時是也其盈其虛因時而消息之如復卦陽息而隂消至姤卦陽消而隂息天地不能違也而况于人與鬼神乎雖然人有盛衰鬼神亦有盛衰乎聖人通幽明之故知鬼神之情狀乾卦言天地人及鬼神皆合而論之其好惡一也怪神之事孔子不以語學者後世猶不免依託以亂天下况可明告之乎此非通乎性命之理象數之妙者曷足以究此哉象曰雷電皆至豐君子以折獄致刑雷之威怒電之照耀二者相因而至此物豐之時也當豐盛之時非有以警懼察治之則物繁事彩姦偽日滋有不可勝治者矣君子體此象以折獄致刑既明且威人之情偽有不能遁也豐與噬嗑皆有雷電之象而爻有升降故其用不同噬嗑震下離上此制法者故明罰敕法王者之事也豐離下震上此行法者故折獄致刑有司之職也初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬初正應在四以陽敵陽非其應也特所配之主耳剛陽相配明動相資力敵而勢均兩貴不足相使然得無咎者初能下之往而有所尚也尚者能尊尚之也象曰雖旬無咎過旬災也二剛相遇未有兩存而無傷者初能推四以為配主而往歸之則無患矣若恃其智力各務盛強過其分量不顧滿盈之戒則禍災之至何所逃乎此昧乎處豐亨之道也故曰雖旬無咎過旬災也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也豐之時如大明中天以遍照天下今但豐其蔀而已幽暗之甚至日中見斗隂侵陽之象也六二居中處正人臣之盛位又卦體為離而處震下為掩覆之象陽不足而隂道行斗運四時人所取正以六二中正之臣而遇六五柔暗之主可以自守而不可以有為往則為主所疑而衆且疾之矣能以忠信自處發其疑疾如成王之悔悟則國家安全而保其終吉矣發者發其蒙蔽非忠信誠實豈能感發之周公其人也九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也沛先儒皆以為斾王弼直云幡幔所以禦盛光程氏亦云古文作斾字今以廣韻玉篇考其意義作滂沛則其理不通蓋豐之時當顯設幡飾以稱其豐大而九三正應在上六以陽剛而敵隂柔不能發揮其光明反幛蔽之是猶日中盛明之時而處乎重幃之內所見者暗昧如人欲擊摶運動而折其右肱何所施乎然得無咎者九三以陽剛能為之才而不遇其時其不幸也乃所以為大幸歟古者明智之士遇時昏亂壞德穢行或自託于瘖盲跛蹇然後能免于禍此折右肱所以得無咎也人臣遇暗主若恃其剛健欲大有為功成之後鮮克自全者唐德宗之于陸贄是也折其右肱者示不可復用如司空圖是也九三剛健有可當大事之才折其右肱終不可用則其時可知矣九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也當豐亨盛大之時雖有明主鮮有不湛冥于宴安者故六二之正九四之剛皆不得行其志以不遇明主故其象皆曰豐其蔀日中見斗也日之中而見斗焉暗之甚也上有昏暗之主有志莫伸則下求于等夷之人同心協德自相賓主則吉無不利矣四與初為應故初以四為配主而四以初為夷主爻有上下位有尊卑故所稱輕重不同其實一也使上有剛明之君收攬英傑以為已用則皆立乎人之朝矣豈止自相求而已象曰豐其蔀位不當也以九居四位非中正而在近君之位故不當也日中見斗幽不明也日中當遍照天下而幽暗如暮夜此忠邪莫辨白黑不分之象賢人君子當遐舉逺引之時也故曰遇其夷主吉行也以吉而行從容而行行則吉也六五來章有慶譽吉象曰六五之吉有慶也人主當天下豐大之時能屈已招來賢德之士以文太平庶可保其治安則在我者必獲其福慶而民譽歸之吉無不利矣五與二俱隂非應然離下震上震動而離明明動相資又皆居君臣中正之位離為文章其性炎上茍能説而納之則將洋洋然動其心而來矣上有用賢之美野無遺棄之才邦家之慶孰大于此聖人從而贊之曰六五之吉有慶也以見所以得吉者以有此用賢之慶也上六豐其屋蔀其家窺其户閴其無人三嵗不覿凶象曰豐其屋天際翔也窺其户閴其無人自藏也士方居窮隱約消聲滅迹自樂于間曠可也若夫身處大位當豐亨之時不能躬吐握之勤以延見多士而深自閉匿豐其屋蔀其家而已則將鬼瞰其室矣故窺其户閴其無人三嵗不覿其凶可知上六大臣之不任事者雖不任事而位則穹矣國之存亡民之利害安得恝然忘情哉豐其屋謂壯大其所居也蔀其家謂屛蔽其所藏也此大臣之營私自奉者古之愚人莫不皆然觀周公作鴟梟之詩曰逮天之未隂雨徹彼桑土綢繆牖户豫手拮據豫所捋荼豫所蓄租豫口卒瘏曰豫未有室家勤勞如此豈自營也哉六居卦終震動之極失處豐之義其荒虛閴寂卒為狐兔之場若鳥失其巢去人逺矣本乎絶物乃以自絶本乎多藏反致空閴禍災之至咸其自取焉爾故象曰豐其屋天際翔也窺其户閴其無人自藏也閴其無人陸氏以為家空人亡如漢梁冀之徒是已艮下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅者聖賢當屯否之世道不行而為栖栖為旅人之時也雖處之有道但得小亨而已旅貞吉者能守正則吉也王弼以為不足全夫貞吉之道惟足以為旅之貞吉故重言旅貞吉也麗乎外而得中則亨止乎下而得正則吉故彖曰柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也六上居于五又處二剛之間此在旅之象卦體在外故言柔得中乎外下艮而止上明而麗止而有所附麗此處旅之善者以孔子之聖歷聘諸侯然時君不能鈞用而卒老于行以至伐樹削迹厄于宋衛陳蔡之間七日不火食者以時無剛明之君為之依歸也况其下者乎為旅之道有時有義得其時義則其道可行窮斯通困斯濟矣然則處旅之時豈易哉故其時義為大也象曰山上有火旅君子以明慎用刑而不留獄山上有火明之至也然炎炎不已或至燎原而玉石俱焚君子體此象以用刑則當明慎也明者辨析其理而不敢輕也慎者哀矜其情而不敢易也火在山上因風而行其勢必速非久居也君子體此象以斷獄則知囹圄之間重棘之內或有受其枉者斷決以時而無淹延此聖人著此象以為司獄之戒也初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也當旅之時以隂柔而處砥下此小人之寓旅困者也瑣瑣猶屑屑也古者豪傑之士處貧賤羇旅之間如劉毅馬周李白郭元振之徒豪氣蓋世夫豈若是屑屑然則在旅而瑣瑣斯其取災之道也象曰旅瑣瑣志窮災者在羇旅之始不能擴其志氣變而易通乃計較錐刀于僕御之間則孰與任其腹心者意外之患乃其自取焉耳六二旅即次懷其資得童僕貞象曰得童僕貞終無尤也旅寄也寓也為客之道也非可安居者也六二以柔得中正而上承二剛雖無正應可以就而安之故能懷其資而無誨盜之失得童僕之貞而獲內外之助在旅如此雖動而居外夫何尤怨之有九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也九三處艮之上有峻極之勢無柔順謙虛之德為旅若此宜衆人之所不與也故焚其次舍而喪其童僕之正危莫甚焉二以柔順中正而安三以髙亢自尊而厲在旅而遇焚如之厄非止失其所止而已其勢必至于傷夫初六之瑣瑣固足以取災而當羇旅之際輕財妄施以致空殫亦失為旅之道故剛柔皆欲適中今二者舉過之故象曰旅焚其次亦以傷矣以旅與下其義喪也九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也九四以陽剛而自託于隂柔蓋處旅之善者士欲行其志而已得其資斧豈足以行其志哉旅于處得其資斧徒能安其居得其資財器用而已懷與安實敗名旅非豪傑之所能安也劉備孔明不肯留吳關羽不肯留魏豈乏其資斧哉使韓信無蕭何之薦亦非漢祖所能羈縻之也况乎聖如仲尼賢如孟軻者儻不處以卿相之位使得盡行其所志豈區區利祿所能豢養之哉六五射雉一矢亡終以譽命象曰終以譽命上逮也旅之六五雖非君位而有文明之德方以直道遇物發無不中此聖賢之處乎羇旅者如射雉而以一矢殪之也雉為文明之物矢者器也君子藏器于身待時而動動而不括矣此處旅之最善者譽命之來何可禦也孔子之至是邦必聞其政以溫良恭儉讓而得之象言終以譽命上逮者言為上之所逮聖賢之寓旅困在上者能居已而訪逮之也易之上逮即詩之逮下也君能逮下以成其政臣能歸美以報其上故上下交譽之也旅之上九方以髙亢自居而此云上逮者蓋旅人之有譽命必有上之人能寵遇之非必上九也六爻取義各有所在言豈一端而已上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也鳥之巢木猶人託迹于傳舍也夫人之處乎里閭之間也有長幼之序有親戚之恩患難相救疾病相扶持也方在羇旅之時人情乖睽惟卑順謙恭乃可自保而上九以髙亢自居下乘五六之尊位不遜若此其能免乎巢者鳥所託以棲息者也離為火其于木也為科上稿今處離上是巢而遇焚失所棲息之象也上九以陽剛而處衆旅之上始固足以陵物而衆為之下若可喜也而為旅之道威權不足人終不與將無所容亦足悲也故先笑而後號咷牛之為物健而順且有功于稼穡而喪之不能敬畏故也莊子曰有而為之其易之者皥天不宜况于人乎九三以剛陽居旅而焚其次喪其童僕所喪在外故厲上九以剛陽居旅如鳥焚其巢喪牛于易所喪在我也故凶上九處卦之極言凶則不止于危而已象言以旅在上其義焚也為旅而處人之上其焚巢固宜非不幸也喪牛于易終莫之聞者人之有過能虛已聽納人或告以善道上九亢陽有絶物之象使有過咎人孰告之故終莫之聞也巽下巽上巽小亨利有攸往利見大人巽之為卦二陽在上一隂在下惟以巽順承物自處卑下然後能盡巽之道一于柔順則妾婦耳故得小亨而已欲其道大通于天下蓋有逆人之所順強人之所劣者然挾柔巽以遊世無往而不利聖人又惡夫以非道而合則近于邪佞雖利有所往而利見者惟大人為可大人謂在上之二剛也柔能順乎剛故小者亨小亨謂一隂也雖然巽之道豈止于小者而已彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人巽而重之所以申復其號令也上下皆巽故有重復之義亦在上者能巽以與下在下者能巽以承上也剛或失之髙亢柔或失之卑佞陽剛而得中正二五是也九二之剛而初六順之此在上者能巽以逮下故其志得行也隂柔而能承剛初四是也九五之剛而四順之此在下者得所附託故其道不終否也二與五賴初四而後得志初與四必待二五而後小亨此又剛柔相因上下相隨之義巽入之道無往而不利故利有攸往也雖利有攸往又惡不由其道故利見大人也能以卑巽上承乎中正之大人此巽之至善也巽之六爻四陽而二隂則君子固已勝矣隂又在下無能為也此畫卦之深意也自古君子衆而小人寡非徒君子之道勝小人亦因以為用矣宇文士及封德彝之在唐上有一太宗下有房杜王魏之徒故無能為也不然其佞何所不至哉象曰隨風巽君子以申命行事天之有風如國之有號令必相繼而至乃能振動萬物風至柔弱也而善入物君子體此象柔巽之道申復其命至再至三雖頑獷難化者無不説隨矣無非事者命令之出必有事也盤庚遷都之事武王伐商之事凡興大功役大衆非以巽言申復其命則播告之修豈能曉然不匿厥旨哉故申命然後可以行事也初六進退利武人之貞象曰進退志疑也利武人之貞志治也六以隂柔處于巽初為二剛所乘而上無應援欲進則不敢欲退則不能懷疑首鼠莫之為計若能以剛決自任而以正道行之則其疑可釋而其志定矣武人者剛決之象剛決或失之暴故所利在貞也治者蚤正素定而臨事不惑也故象曰進退志疑也利武人之貞志治也九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也巽在牀下宜衆人之所鄙賤也衆人所賤其可交于神明乎如此則人不可欺而鬼神可欺也蓋二為隂爻九以陽剛寓之此陽剛之君子自退託于卑賤能以卑遜自處出于誠意而非偽為故不祈于人知而幽間之中鬼神知之也世之隂柔小人自託于尊顯之上足以欺愚惑衆而幽間之中鬼神得而誅之矣然則九二巽在牀下雖過于卑巽人或惡之而其中心誠實或可以交神明也祝史巫覡皆所以通其誠意人能志誠恭巽心非邪諂通吾誠意者紛然而衆雖豚魚可及水火可蹈而况于人乎况于鬼神乎牀者人之所安也巽而大過入于牀下反失其所安然終獲吉且無咎者人可欺而鬼神不可欺也故象曰紛若之吉得中也巽在牀下疑于失中而象言得中者位在九二處巽之中陽剛得中是其中心誠實之象獲福之多理在不疑周公以上公之貴叔父之尊事幼沖之主則盡恭順之道禮天下之士則躬吐握之勤觀金縢册祝之辭欲以身代武王之死卒至得請于三王則中心誠實而獲史巫紛若之吉者周公其人也鬼神之事聖人固難言之惟于易多稱鬼神與天地人不少異何也蓋易之為書所以微顯闡幽決斷天下之疑惑其神明之用與蓍龜等然則非知命之君子曷足以語此哉九三頻巽吝象曰頻巽之吝志窮也九三以剛明之才體巽而處下卦之上又居得其位可以進而有為矣今巽窮而復遇巽頻巽也巽以行權可也豈可數乎而與四密比厄于隂柔不得展盡其才卒之志氣窮索鄙吝之甚也故象曰頻巽之吝志窮也六四悔亡田獲三品象曰田獲三品有功也易之稱悔亡皆本有悔以處得其道故其悔可亡六四下無應援以隂柔獨處而有乘剛之過宜有悔也而處上下重剛之間承上臨下一以柔順處巽之善莫如此爻故悔亡而反有獲也譬之田獵雖盡力乎驅馳而所獲則歸于君而非私已也三品謂乾豆賔客之奉充君之庖舉是三者則能及乎上下矣君子能以柔巽遍及上下而已不私其利如田者之獲三品也蓋柔巽之人無入而不自得以此奉上則獲乎君以此與下則獲乎民巽之功于斯為盛九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也五為巽主當謙虛逮下而以陽居陽又下無應援疑失之亢然當上下巽順之時若昏佞相濟禍亂有不可勝言者今九五獨能毅然守其剛正不徇羣邪故能獲吉而其悔可亡也履至尊而居中正之位以柔巽為體不失正固之德故無入而不自得也下非正應而與二睽此過乎剛者故無初也上有剛正之德下卒聽從發號出令如風行草偃孰敢違之固有終也蠱卦曰先甲三日後甲三日當天下蠱壞欲一新其法令故曰甲甲者日之始也庚者申命也重巽以申命故先庚三日後庚三日者聖人欲更易法令使便于民豈易而為之哉先三日以告教之使通其意故天下曉然莫敢違吾令者後三日以申審之使察其情故天下莫敢犯吾令者如此則吉孰如之以人主之權欲改易更革天下之政令若無甚難者如秦用商鞅法雖行而民不以為便卒至天下大亂而劉項乘之秦遂以亡以不得乎大中至正之道故也故象曰九五之吉位正中也上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也巽在牀下其失一也九二用史巫紛若吉且無咎上九喪其資斧貞凶何邪九二處下體之中為下之道也上九以陽剛處巽之上而下無應援資財殫竭威權去手雖索為匹夫不可得守此而不知變凶之道也讀易詳説卷九
