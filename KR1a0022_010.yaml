body:
  text: 讀易詳說卷十宋李光撰下經兌至未濟兌下兌上兌亨利貞兌之能亨以澤說物也以澤說物非特物亨已亦亨焉說物者不以情感則正矣以情感物未有出于正者卦體一隂在外二剛在內內剛而外柔以此說物則不入于佞邪而其道亨矣彖曰兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉兌之為義孔子以一言釋之曰說也蓋兌為澤說萬物者莫說乎澤故為萬物之所說也兌之為卦一隂處乎上二陽處乎下外柔而內剛也聖人涉世外曲而內直外柔而內剛內不失已外不絶物無往而不通以正說人故曰說以利貞是以順乎天而應乎人也湯武革命南巢牧野之戰勞民犯難而民忘勞忘死者豈以力驅之哉能盡說之道得其心而已古之興大役動大衆未有下不說從而能成功者秦之長城隋之遼東二役興而天下亡矣說道之大民皆相勉勵以從上之命何事而不可成乎聖人所以大之也𧰼曰麗澤兌君子以朋友講習澤陂澤也人所資以為灌溉之利禹貢曰九澤既陂雲夢之類是也澤不相麗或有時而竭涸以澤麗澤相繼不絶故其為利無窮君子體此象相與講習見所未見聞所未聞故其心恱也孟子曰理義之恱我心猶芻豢之恱我口朋友講習互相滋益之樂以發明其理義故無窮也然則聖人所以恱民者能使知其理義之所在然後可用也不然安能使之犯難而忘其死乎初九和兌吉𧰼曰和兌之吉行未疑也初九居兌之初為說之始在下而能以剛正自處有孚信之德而無邪諂之行和而不同無所阿比所以得吉士方未遇而專以和柔為行或疑其邪諂初能履剛守正衆所孚信故曰行未疑也未疑者未有可疑之行也九二孚兌吉悔亡𧰼曰孚兌之吉信志也兌主子說說物者常失于不正九二上比于六三隂柔小人而已比之宜有悔也然履忠信和而不同非為邪也是以吉而其悔可亡也士非見信于人之難自信為難能自信其志則雖舉世非之不能阻也權利誘之不可移也白刃臨之不可屈也此信道篤而自知明者也六三來兌凶𧰼曰來兌之凶位不當也三陽位而六以隂柔居之不正也以𧰼邪佞不正之人欲以非道媚恱正直之君子必為所斥逺其凶宜矣君子小人猶水火燥濕之不同以帝堯之聖猶畏壬人孔子之聖亦曰逺佞是知邪佞之人急于求進是亦在上者有以來之非剛明之君子未有不為所眩者唐明皇之恱李林甫德宗之恱盧杞亦其資適相逢爾六三為兌主自處非正故小人得以乘之此有間而可入也如好色好貨好田獵好用兵以致陂池苑囿之觀各因其所好而投之故象曰來兌之凶位不當也以急于求說而自處非中正之位說不以道至亡國敗家其凶可知矣九四商兌未寧介疾有喜𧰼曰九四之喜有慶也六三來兌此最佞邪之人如蠅之營營驅之復來者九四以剛直處近君之位欲有以排却之而未知計之所出故擬議商度不遑寧處然終獲有喜者遇九五剛明之君也不然其身之不暇保憂未艾也故𧰼言九四之喜有慶也喜在我慶在一人與天下也邪佞之人聖人之所甚疾也知之非難去之實難以周公之聖猶不免見疑于成王觀鴟梟之詩其心之靡寧可知矣心之靡寧以王室之靡寧也然則九四一爻非周公其孰當之九五孚于剝有厲𧰼曰孚于剝位正當也剝隂消陽之卦小人道長君子道消之時故指剝為小人九五為兌說之主小人以邪道說其君或以聲色或以貨利阿諛順旨惟意所適非剛明之君未有不為所惑者九五剛明之主也聖人特于此致其戒慎之意言信于小人則危道也以唐太宗之明且不能去宇文士及之佞然其所尊信者房杜王魏之流故小人不得行其志耳象曰孚于剝位正當也以九居五此乾剛之主也乾剛之主宜信任君子乃孚于小人然不至于亡者以居正當之位雖密比小人無能為也世之小人當明主在上威權不移于羣下度未有以勝君子亦能𨼆其姦慝而勉於從善故𧰼曰孚于剝位正當也上六引兌𧰼曰上六引兌未光也兌以說為主以說道進者多隂邪之人而剛正之士動多忤物使之事主則面折廷爭如周昌汲黯之徒豈以諛悅為心哉兌之六三小人之在下者故曰來兌下卦為內柔自外來也上六小人之在髙位者故曰引兑自上引其類也上與三雖非正應而以邪道合者處兑之終居卦之上宜旁招俊乂汲引衆賢以盡說道之正則利澤施于天下矣上六隂柔小人其所汲引者不過其黨類耳安能光亨天下乎故𧰼曰上六引兌未光也坎下㢲上渙亨王假有廟利涉大川利貞渙者散也險難既除渙然氷釋肅宗平安史之難德宗釋奉天之圍此渙之時也渙則亨矣內可以假有廟以示孝治之本外可以涉大川而成濟險之功是二者非出于正固則離叛之心未易合故曰天下之動貞夫一者也此所以貴乎利貞也彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也坎下㢲上為渙渙所以亨以剛來而不窮柔得位乎外而上同也凡卦三陽三隂者有九陽上隂下皆自否而來三復三變而成九卦渙其一也以九四之剛來居坤之中而成坎柔既得剛則其心亨而不困窮矣以六二之柔上居于四而成㢲剛既得柔則能㢲順而上同矣當渙之時上下相濟君臣比合何患而不除何難而不解乎其道大亨于天下故假有廟而祖考來假涉大川而險難以濟也閔豫小子嗣王朝廟之詩蓋在成王釋喪即政之始清廟祀文王亦在周公既成洛之後然則王假有廟王乃在中者蓋言九五得中正之位故能居渙之中以拯天下之渙而泮離者得所歸焉利涉大川乘木有功者㢲為木涉川者非假舟楫其能濟乎上㢲下坎有乘木濟川之𧰼㢲為木濟險之道非可以力勝惟㢲以入之則無往而不利矣故曰乘木有功也𧰼曰風行水上渙先王以享于帝立廟水之性本靜且止泛濫流衍或鼓為濤瀾者風撓之也先王體此𧰼以合天下之散離亦靜以止之耳享帝立廟天下之心有所宗矣享于帝則天神可以感格立廟社則神鬼有所依慿而况于人乎古之立國者必先立廟社所以係人心之道莫重乎此初六用拯馬壯吉𧰼曰初六之吉順也初六以柔弱之資居坎險之下欲以拯難出險非藉剛健之才不能也九二雖在險中而其才實剛健二又互震震為作足有壯馬之𧰼故初能承之所以能拯天下之渙離致逺涉險而不困也𧰼曰初六之吉順也二有剛德初能承之故曰順也夫弱能御强柔能制剛非至順者能之乎九二渙奔其機悔亡𧰼曰渙奔其機得願也九二雖剛陽而陷于坎險之中非濟以柔順未易脫也故下慿于初然後悔可亡也機者人所慿以安者也以九二之剛乃下慿于初宜有悔也而在險難之中不有所助何能自拔乎奔者行之速也在危險之中欲就安全其去之可不速乎孔子去魯遲遲其行者去父母國之道也孟子三宿而後出晝於豫心猶以為速欲以行道未知所稅駕也田文之脫秦馮道之去虜足以當此爻矣象曰渙奔其機得願也奔就所安出險逃難憂虞散釋願斯得矣六三渙其躬無悔𧰼曰渙其躬志在外也渙其躬者渙止于躬未能及物僅得無悔而已六三居坎之上上將出乎險難而未離乎險難也自三至五成艮艮其身止諸躬也六三以隂柔不中正之才而上九處髙亢無位之地雖為正應非能相濟以大有為也使能免其一身之憂虞而已𧰼曰渙其躬志在外也㢲為外卦上又處乎卦外三居于內而志乃在外是懷二心以事上者豈真有意為國者哉不過為全身之計耳六四渙其羣元吉渙有丘匪夷所思𧰼曰渙其羣元吉光大也天下渙離之時必有强梗僣叛之徒虐害生靈圖危社稷者聖人于此欲收合人心拯天下之泮渙豈剛柔威武所能獨勝之哉梁襄王曰天下烏乎定孟子曰定于一孰能一之曰不嗜殺人者能一之六四體㢲居下至柔弱也處近君之位而以柔㢲為體上輔剛健之君是能渙其羣合天下于一而獲至善之吉也渙有丘匪夷所思者丘不平之處也夷常也天下泮渙險難方殷一旦欲鉏纇夷荒使之適平必有超然之見消患于冥冥者豈庸常思慮所能及哉故渙其羣元吉然後繼之以渙有丘匪夷所思也象曰渙其羣元吉光大也消釋險難至于元吉則光矣坤以六二一爻上行承五君臣相合以成散險之功故其德光大也唐陸宣公足以當之方德宗之狩奉天謀聽計從所下制書雖武人悍卒無不感動流涕李抱真之賊不足平也九五渙汗其大號渙王居無咎𧰼曰王居無咎正位也大號者非常之號也散天下險難以收合人心不有非常之號豈足以感動之渙汗者渙然而汗流以諭浹洽于民心如病之得汗一出而不可反也陸贄有言履非常之危者不可以常道安解非常之紛者不可以常令諭今假王者四凶僣帝者二竪而欲紓多難收羣心惟在赦令而巳奉天詔下山東士卒聞者皆感泣思奮然則濟渙之道豈不在號令乎𧰼言王居無咎正位也叛離之際雖假號令以震動天下然非真主正位以凝命中天下而立其誰肯信之王郎之詔非不足以欺天下也漢之社稷卒歸光武者豈非位號之正乎上九渙其血去逖出無咎𧰼曰渙其血逺害也上九處㢲之上正應在六三之坎巽為風坎為血卦血之在人渙而散之則為榮衛結而聚之則為癰疽上九以剛陽處于渙外離憂患逺矣雖正應在三三亦處險陷之上無所係纍孰能害之故如血之渙散也去者去其位也既去其位而又逺出此大臣不任事而能全身逺引者也何咎之有渙之為卦當天下渙離下欲求援于上之時也上九有剛陽之才𫝑足以振物而無兼濟之智固不足與大有為也但能無咎而已象曰渙其血逺害也志在逺害保身之不暇豈能拯天下之渙離哉兑下坎上節亨苦節不可貞節者中而已裁其過與不及使得其中者節之道也事得其節則可以通行于天下故節然後能亨也立節太苦非人情所堪故不可以為貞也苦節如焦光范粲之流是也得其貞者管寧是也貞者正也苦節則失其正矣節分假支節之義亨象天下之事有節則心通苦節不可貞占苦過也如味之苦人情所不堪故不可固守彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民節所以能亨者剛柔分而剛得中也兌下坎上陽上而隂下男上而女下卦之三剛三柔各不相過剛柔于是而分矣二五之剛各得其中以處君臣之正位上下各得其節此所以能通行于天下而無過不及之患也此節所以能亨也苦節不可貞孔子釋之曰其道窮也節至于苦則其勢必不可行顔子之簞食瓢飲在陋巷人不堪其憂回也不改其樂此不失其正也非苦也伯夷叔齊餓死首陽立節雖苦其道窮于一時而伸于百世之下則苦節豈不愈于喪節乎聖人立卦之意貴其可行而不貴其難繼也使聖人而貴其難行則人有赴水蹈火而死者矣故曰節者中而巳說以行險者險在外也說以行之則不蹈于險矣此言九五居險之中困而能亨也當位以節中正以通者此論二五中正各當其位故隂陽得其節而其道不窮也天地節而四時成者隂陽二氣寒暑相循如環之無端春夏之發生必節以秋冬之肅殺然後嵗功成焉聖人體此𧰼節以制度不傷財不害民此節之能亨其道不窮而可貞者也聖人制經國之術必量入為出上之用度有節故不傷財取于民有制故不害民夏后氏五十而貢商人七十而助周人百畝而徹其實皆什一也此三代取民之道也秦隋之君至窮奢極欲府庫空竭而百姓離叛卒以亡天下者由不知立制度以為節故海內蕩然也𧰼曰澤上有水節君子以制數度議德行澤之儲水民資以為灌溉之利者過與不及則有泛溢竭涸之虞君子體此象以制數度而議德行則無不中節多寡之數長短之度非有以制之則權衡度量皆失其平矣德有剛柔行有邪正君子立德制行務適于中而巳臯陶曰亦行有九德亦言其人有德則德與行未嘗不相因而相濟也議者審其剛柔緩急與夫行藏進退不使有過與不及也初九不出户庭無咎𧰼曰不出户庭知通塞也户庭者户外之庭户在內者此門內之庭也不出户庭以言慎密之至也初以陽剛在下方節之初有陽剛之才而上雖有應險難在外不可往也自守以正慎密而不出此盡節之道故可以無咎也孔子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出孔子釋此一爻推明不出户庭之意蓋處節之初當制數度議德行之始故慎密如此聖人出處語默適于時而巳非知乎治亂存亡之幾微者曷足以語此哉故𧰼曰不出户庭知通塞也九二不出門庭凶𧰼曰不出門庭凶失時極也九二居中正之位當可以行之時又有能為之才而不出門庭則失其幾㑹矣二于變卦為震震為足有可行之𧰼而不行失時之極皆凶之道此節之不得其中者也豐之上六曰豐其屋蔀其家窺其户閴其無人三嵗不覿凶當豐大之時處于明動而不履其位其凶宜矣與此九二時異而象同也六三不節若則嗟若無咎𧰼曰不節之嗟又誰咎也以六居三隂柔而處於陽位又下乘九二之剛而上承坎險所謂險在前也此可節之時而不節禍災之至將誰咎乎此爻與九二相反夫時可以有為而失其幾㑹與時之不可而强行皆足致凶咎九二以陽而居隂六三以柔而寓剛其不中正一也嗟若者歎惜之聲悔無及之𧰼也小人極其奢靡以快意于一時卒至財殫力竭窮無所歸皆其自取雖知憤歎將誰咎乎六四安節亨象曰安節之亨承上道也人臣以自處隂柔為正六四居近君之位當多懼之地能卑遜以承上安于臣節者也人固有徼名取譽刻僞矯揉為難能之行若公孫𢎞之流然非其性之所安則近于詐妄此聖賢之所深嫉也安節之亨以承上為道漢萬石君足以當之文景恭儉之主而奮以恭謹稱可謂能承其上矣九五甘節吉往有尚𧰼曰甘節之吉居位中也五以陽剛而履尊位為節之主發號施令莫不中節在巳無矯激之行故心逸而日休在人無愁苦之事故安居而樂業吉孰如之孔子所謂說以行險當位以節中正以通者也以斯而往孰不尊尚之𧰼曰甘節之吉居位中也人之立節不可過也過則為苦節不可不及也不及則為失節九五能守及中之節故上下內外無不說從以得中正之位故也上六苦節貞凶悔亡𧰼曰苦節貞凶其道窮也上六以隂柔處坎陷之極已出乎險中宜有以自適而守節過中為難行之行不知變通以趨時之宜其凶宜矣若能幡然悔悟則其凶可亡比之他卦悔亡之說辭同而意異也𧰼曰苦節貞凶其道窮也上六處節之終固守而不知變取窮之道也兑下巽上中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也𧰼曰澤上有風中孚君子以議獄緩死初九虞吉有他不燕象曰初九虞吉志未變也九二鳴鶴在隂其子和之我有好爵吾與爾靡之𧰼曰其子和之中心願也六三得敵或鼓或罷或泣或歌𧰼曰或鼓或罷位不當也六四月幾望馬匹亡無咎𧰼曰馬匹亡絶類上也九五有孚孿如無咎𧰼曰有孚孿如位正當也上九翰音登于天貞凶𧰼曰翰音登于天何可長也艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉小過過之小者聖人涉世豈有過乎欲矯世勵俗則不可無過過無大小過而得其正則君子也過雖小而不正則小人也小過所以利貞也小過自中孚而來六爻相變上下反合中孚則柔在內而剛得中小過則剛在內而柔得中皆指二五也小過柔在外而得中故可小事剛在內而不中故不可大事也小過之世隂柔得位而為主上下皆小人也君子于此時有飛鳥之象焉鳥飛而遺其音猶君子當遐舉逺引而棄其聲名之時也二剛在內君子也四雖上承于五而進則犯上故不宜上二能承三三退則得所承故宜下也因時乘理知難而退吉孰如之故大吉也彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之𧰼焉飛鳥遺之音不宜上宜下大吉上逆而下順也過而後亨不過則否矣周公誅管蔡以安王室蓋不誅則王室危矣周公之過不亦宜乎故過而後能亨也過以利貞與時行者時可以過而不過則失其幾趨時之宜其不正乃所以為正也二與五皆得中正之位陽為大隂為小故小往大來為泰而大往小來為否柔得中是小者得中故小事吉也三四處非其位剛失位故不可大事也若大過之世則二五得位故獨立不懼遁世無悶剛過而中大者過也故可大事也卦體有飛鳥之象四隂據有為之地如鳥之翼二陽居內其腹背也冲舉者翼也鳥之頡頏上下翼實制之小過之時君子處無用之地小人得時當斯時也知不可有為則消聲匿跡安于卑位則吉矣𧰼曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉豫卦言雷出地奮豫雷之出地物皆恱豫山上有雷則其聲必震驚逺而懼邇所以為小過雷本以震物非過之大過恭過哀過儉無傷于德特未中乎禮之宜耳行過乎恭萬石君是也喪過乎哀曾參是也用過乎儉晏平仲是也此過之小者君子有時而為之所以矯正一時誕謾流蕩之俗是皆有𥙷于世教聖賢君子不可免之過也初六飛鳥以凶𧰼曰飛鳥以凶不可如何也初以隂柔處于艮下可止者也而正應在四四為動初性復剛躁既牽于所應不能靜止如鳥之飛未知所棲宿則有矰繳之禍凶之道也飛鳥迅疾其離網罟畢弋之患間不容髮其可救乎故𧰼曰不可如何也不可如何者吾末如之何也已六二過其祖遇其妣不及其君遇其臣無咎𧰼曰不及其君臣不可過也六二以隂居隂臣子之道也當小過之世宜有過者小過之世以中為所遇也配祖者妣也承君者臣也皆謂二也二下配乎祖而上應于君二與初相比與五相應隂柔在下而不敢越故曰遇也為臣而能盡臣道不敢過而當臣之分何咎之有哉九三弗過防之從或戕之凶𧰼曰從或戕之凶如何也九三以陽剛而處下卦之上上六以隂柔而為之正應此君子小人異趨而苟合者九三恃其剛正徑情直行而不為過防之謀必為所害矣戕賊害之也小人常有害君子之心能深思慮患而過防之或可免咎不然其凶必矣故曰從或戕之凶也既為小人所害雖有明智之士不能為之計矣故𧰼曰從或戕之凶如何也如何者言末如之何也已九四無咎弗過遇之往厲必戒勿用永貞𧰼曰弗過遇之位不當也往厲必戒終不可長也小過之世上下四隂二陽處無用之地是剛不勝柔又履非其位惟晦跡同塵危行言遜避禍可也以陽剛而過于隂柔弗敢過也乃合其宜故曰無咎弗過遇之方羣隂用事小人得路之時求動而進則危矣故當戒慎恐懼亦勿固守其靜貞而昧於幾權也處小人之間求進則為所擠陷守節則為所忌嫉蓋處位不當姑靜以俟天道之復而已故𧰼曰弗過遇之位不當也往厲必戒終不可長也言小人之過其敗不旋踵也六五密雲不雨自我西郊公弋取彼在穴𧰼曰密雲不雨已上也小過四隂而二陽隂柔而處五為小過之時隂盛而不能有所施有密雲之𧰼西隂方也以隂柔而處小過之時雖得尊位豈能流寬大之澤于天下故如密雲不雨失來蘇之望也小畜之彖曰密雲不雨尚往也自我西郊施未行也小過之時五為之主公謂五也王公皆尊稱也公弋而取彼在穴失三驅之義夫三驅之禮禽逆未從已則捨之取其有向順之心孔子弋不射宿今乃取彼在穴則物不得遁矣故去王而稱公斯小過之義也𧰼言密雲不雨已上者隂氣巳上至于盛極而陽不應所以不能雨成施物之功上而能下則及物矣雨自上下者也今上而不下不能成雨故曰已上也上六弗遇過之飛鳥離之凶是謂災眚𧰼曰弗遇過之巳亢也上六以隂柔而居震動之極弗當于位弗遇于理過之極也如鳥之飛必離矰繳之患凶其宜矣君子制行適于中而已太卑與亢皆致凶之道故初與上皆飛鳥之𧰼初太卑而上亢極也災由外來眚自巳取皆凶之實也𧰼曰弗遇過之已亢者動而過之上下皆隂處于卦極于時為已亢也四以陽承隂知所尊事故弗過遇之上六以隂過中過其君也故弗遇過之四所以得無咎而上為已亢也離下坎上既濟亨小利貞初吉終亂聖人身履險難以撥亂興衰既定之後如乘舟已濟此離下坎上卦之所以為既濟也險難在上非明者孰與濟之亨小言小者亨也既濟之後大者已亨又能亨其小則物無不亨矣物無不亨則天下安定以正固守之則可以永保其安矣初吉終亂言治安之難保也此唐魏徵對太宗以守成之難于創業也明皇用姚崇宋璟則治用李林甫楊國忠則亂德宗用陸贄則安用盧把則危以此知危亡之禍當在既濟之後古人所以不畏多難而畏無難也歟彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也既濟亨小非所亨者小蓋無小而不亨也故曰小者亨也陽大而隂小故泰言小往大來既濟三陽皆處三隂之下以陽下隂是大者既濟而能亨其小者也當既濟之時三隂三陽各當其位二與四以隂居隂三與五以陽居陽此君子小人各得其所之象故孔子釋利貞曰剛柔正而位當也夫以明濟險以柔濟剛以隂濟陽何往而不濟乎故初吉也既濟自泰卦而來乾以二升而之五坤以五降而之二隂陽相易而成既濟然水火之性燥濕不同非水滅火則火亦能耗水况水在火上炎上潤下之性豈能終止乎惟道家龍虎顛倒之術腎水之真火心液之真水交之有時用之有數然亦危道也不然長生不死之術夫人而能為之矣蓋既濟之後復為未濟循環無窮乃能成道未有止而不亂者非達乎進退存亡之幾明乎消息盈虛之理者曷足以知此𧰼曰水在火上既濟君子以思患而豫防之水在火上所以相濟以成造物之功然水火之性本不同也若已濟而不知治亂安危之幾則水火相息有時而傾覆矣君子體此象以思患而豫防之故居安則慮危而不敢安其位當治而思亂則不敢有其治豫防者沉幾先物必有超乎衆人思慮之外者故危難既濟之後又能消患于未萌之前鴟梟之詩曰逮天之未隂雨徹彼桑土綢繆牖户周公可謂知此矣初九曳其輪濡其尾無咎𧰼曰曳其輪義無咎也初以剛動之才履險涉深以應上者也當既濟之初物皆求濟故不避險難而曳其輪濡其尾故得無咎也輪運車中者履險故曳輪尾處獸後涉河故濡尾卦有自內適外者則以初為尾遁與既濟未濟是也𧰼曰曳其輪義無咎者聖人救時之志雖轍環天下人莫得而議之何咎悔之有乎六二婦喪其茀勿逐七日得𧰼曰七日得以中道也上水下火卦之為既濟火之于水妻道也六二正應九五故有婦之𧰼焉茀者所以屏蔽而為容飾者也婦人欲有所行必有屏蔽之飾喪其茀無以屏蔽勿可行也既濟之時雖君臣相應然君當求臣以自濟禮貌不至幣聘不先雖退而窮處可也六二處中正之位人君欲共濟天下捨我其誰哉故勿逐七日必得也𧰼言七日得以中道者所履中正志應在五君臣之義終無失也隂陽消長之理不過七日復卦言七日來復是也九三髙宗伐鬼方三年克之小人勿用𧰼曰三年克之憊也九三雖非君位以陽寓陽剛健之至故以當髙宗威武之君也水火燥濕異性有戰伐之象鬼方幽隂之方逺役也三年克之疲憊之甚傅說嘗誨以干戈省厥躬則髙宗之失蓋在于此使當時已有一傅說必能諫止之以此知髙宗嘗用小人矣故易舉以為萬世之戒唐太宗伐遼之役其勞人費財後亦悔誤乃歎曰使魏徵在必無此行然則興衰撥亂之主既濟之後乃欲貪土地求貨財用兵不已以疲憊中國未有不亂亡者秦隋之末是已陸希聲曰三年然後克之言其功之晚也君子居之其力猶憊小人用之則必喪邦水火之性極則相反猶君子小人也豈不然哉六四繻有衣袽終日戒𧰼曰終日戒有所疑也六四處近君之位人君恃以濟難猶舟楫也善濟莫如舟非有以預備之則有沉溺之變先儒以繻為濡衣袽所以塞舟漏也以𧰼危懼可畏之狀聖人于既濟之時思患而豫防之無所不至既有防患之具又終日戒慎惴惴然常若處漏舟之上則禍亂何由而至乎此處既濟之時也四在髙位當既濟之後功業已盛主所疑也非深自戒慎其能免乎自古人臣有濟難之才功髙位重而主不疑者漢有張良唐惟郭子儀蓋其自處有道也故象曰終日戒有所疑也九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也九五為既濟之主時方已濟未有不湛溺者聖人于此致其防微杜漸之意故雖祭祀之間未嘗不示以儉約故殺牛之豐不如禴祭之薄也古之祭者必有其時天地鬼神其可以非道于之乎九五以一陽而處坎之中中實而有孚信者也聖人求福之道孚信而已祭祀以時雖蘋蘩之薦二簋之薄亦足以交神明若徒繁文而誠不至物豐而時未可神其吐之矣東西者隂陽之位東鄰謂紂西鄰謂文王也爻辭但言不如西鄰之禴祭而孔子乃云不如西鄰之時則知殺牛為非時矣使當其時豈必皆用禴祭乎時之既濟守常足矣而求福于非常如祭之非時而徒事繁文者未必獲福茍有誠信吉大來也六五履尊居正其獲福必矣故𧰼曰實受其福吉大來也上六濡其首厲𧰼曰濡其首厲何可久也上以隂柔而處無難之極湛于宴安而不知變又無剛果能濟之才以乘剛履險其危可知居既濟之終水火二姓各欲返其位如泰之上六是已故有濡首之𧰼焉聖王兼濟天下之道必為長久之計既濟之終而濡其首若沉溺于宴安而不知返者其危亡可立而待也坎下離上未濟亨小狐汔濟濡其尾無攸利未濟雖隂陽各不當位而上下內外有應故有亨之理方時多難君臣同心上下協力事無不濟者此未濟所以亨也狐雖多疑而小者勇决衆皆疑而未濟三隂得位而有應此幾之可以自濟也故曰小狐汔濟也汔幾也濡其尾無攸利者欲濟而濡其尾是終不能濟故無所往而利也彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也未濟以柔得中故亨六五以隂柔而居尊位為未濟之主將以求濟者也而下有九二為之正應當未濟之時而得能濟之臣如文王當紂之世得閎夭散宜生之流卒以濟大難也小狐汔濟未出中者此言九二雖有剛健之才而未能出乎險中故濡其尾無攸利也時之未可而意在必濟故終之實難聖人所以貴乎有始有卒也然未濟終于必濟以有上下之助也水火之性本相違而實相濟未濟者既濟之始而既濟則未濟之終坎離南北之正相為終始者也故曰未濟男之窮也韓康伯曰剛柔失位其道未濟故曰窮也而程氏謂三陽皆失位聞之成都𨼆者此說本因于康伯𨼆者之言適相契耳至王輔嗣釋履卦曰履不處也亦謂陽爻皆以不處其位為吉其說豈不甚妙奚必它求哉𧰼曰火在水上未濟君子以慎辨物居方火在水上為未濟如乾在坤上之為否水火相交所以致用今炎上者處乎上潤下者處乎下水火各行坎離不為用何以成造化之功火在水上所以為未濟也君子體此象以慎獨而不敢交物各居其方而不相紊也天地絪緼萬物化醇雲雷屯乃君子經綸之時聖人退藏于無用之地何以慰生民之望乎然則未濟者非聖人之得已也初六濡其尾吝𧰼曰濡其尾亦不知極也險難之世民方塗炭非有絶人之才未易濟也初以隂柔居未濟之始志欲有為而才不足雖履危涉難奮不顧身而為之必有濡尾之憂為可吝也夫舉事必有首尾終始之𧰼也善慮事者非始之難終之實難故曰有始有卒者其惟聖人乎不能度才量力徒勇于有為而卒于不見成功故可鄙吝也極終也既濡其尾則是不能克終故象曰亦不知極也九二曳其輪貞吉象曰九二貞吉中以行正也人君當險難未濟之時必資剛健中正之臣然後能克濟大業輪者車所恃以行逺者也非剛健中正者能之乎九二之臣是也九二上應六五之君君之所恃猶之車有輪也險難未平能驅馳經營雖轍環天下必正而後吉也曳其輪者盡力于經營如周公之于成王是也觀周公勤勞王家處危疑之地責深任重而成王卒無所疑非中以行正者能之乎六三未濟征凶利涉大川𧰼曰未濟征凶位不當也處險之極以隂柔而居陽剛之位以此求濟必不勝動則危矣然所應在上水火之性雖相克而相濟應于未濟之極乃有可濟之道坎離處南北隂陽之正終必交際故以涉大川為利也九四貞吉悔亡震用伐鬼方三年有賞于大國𧰼曰貞吉悔亡志行也九四當未濟之時居近君之位當以柔順為先而九剛健宜于有悔也然能以剛行正拯君之難以盡臣道故得吉而悔可亡也鬼方夷狄之險逺者也震用伐鬼方先聲所至如雷之震動此人臣假君之威權以震懾遐方或不戰而屈人兵者故雖三年之久而有賞于大國如李牧之守雁門以備丐奴是也異乎既濟之時蓋既濟之時守成而已𧰼曰貞吉悔亡志行也人臣未嘗無欲行之志非信任之專安能遂其素志哉六五貞吉無悔君子之光有孚吉𧰼曰君子之光其暉吉也興衰撥亂之主非剛健之才未易濟也而六五當未濟之時雖隂無斷而賴九二剛健中正之臣為之正應四上二陽相為夾輔五處尊位有文明之德能虛已而任用之故貞吉而無悔也無悔者直無可悔之事非止悔亡而已孟子以有諸巳之謂信積而至于充實而有光輝之大五體離之中有文明之𧰼故稱其光而象曰其暉吉者光之發散為暉有君子之光其散而見于外者不可掩也吉孰大焉上九有孚于飲酒無咎濡其首有孚失是𧰼曰飲酒濡首亦不知節也上九處未濟之終當坎離之極理在必濟蓋無平不陂無往不復否終則當復泰矣當斯時也非可矯妄而處中心誠實盡夫樂天知命之道以飲食燕樂而已如此乃可無咎也雖然君子當未濟之時安時處順可也沉湎荒淫而不知止則失其有孚之道矣故𧰼曰飲酒濡首亦不知節也如阮嗣宗劉伯倫之徒豈足以濟物哉讀易詳說卷十
