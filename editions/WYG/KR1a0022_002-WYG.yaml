body:
  text: 讀易詳説卷二宋李光撰上經需至履乾下坎上需有孚光亨貞吉利涉大川需須也待也上下相需非特待而巳君非臣不能自免于險難臣非君不敢冐進而排難君臣相需之急如此今人君負剛明之徳能以誠實相與上下皆有孚信其徳乃光顯而亨通也既能光顯亨通又以正濟所以吉也九五之君雖在坎窞之中已正乎天位三陽雖伏而在下皆剛健之君子險雖在前无所憚也但觀時度宜不敢妄進耳夫君臣同心内外恊濟有所不徃徃必有功矣世之言險難者莫如涉大川需之利涉盖有所恃矣三陽是也彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也需須也者需之為義有所須有所待也所以須所以待者以險在前乾下坎上險在前之象險既在前若冐昧遽進則為小人之所傾陷矣乾之三陽本鋭于進趨以能觀時而動才又剛健雖小人善陷者莫得而害之道雖否而心未嘗不亨身雖窮而志未嘗不遂也故曰其義不困窮矣位乎天位以正中者此夫子釋需有孚光亨貞吉之義也九五處乎尊極居中正之位故其道交信于人而光亨貞吉也聖人雖其道已孚于人而發揮光亨乃在履尊居正之後聖人易上六九二一爻而成離離有光明之象所謂坤以陰交乾而生離也其徳如是故涉險濟難无往而不利也以剛健之徳待時而動動則有功矣何難而不濟乎象曰雲上于天需君子以飲食宴樂陽上薄陰陰能固之然後蒸而為雨釋疑解難之象也今雲既上于天而未為雨則疑未釋而難未解故為需須也待也物有所須則有所待君子處此時則當飲食宴樂以俟㡬㑹不可亟也飲食者宴樂之具宴樂必資于飲食此君子從容避禍以禮自娛樂之時也初九需于郊利用恒无咎象曰需于郊不犯難行也利用恒无咎未失常也乾下坎上險難在上雖有衆君子伏而在下未能遽進九五之君位乎天位處二隂之間而剛健不陷與下三陽實相需雖小人在側終必退聽但守正不動以待其應耳初九最處逺外寛閒之鄉故利用恒无咎恒常也利用于常則動靜起居未嘗少改其度迫窮禍患未嘗少易其節故可以无咎也初九之陽在下以待六四之應彼小人方挾主以擅朝權若不慮患待時而輕躁妄動則禍不旋踵矣九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也需卦利涉大川沙與泥皆近乎水際所謂險在前將進而涉難也涉比泥為饒衍之地彼不我疑但小有言而已二為中位剛而得中雖无應于五小人不能害也進而涉難何徃不濟故終必獲吉也九三需于泥致㓂至象曰需于泥災在外也自我致㓂敬慎不敗也坎為水有川之象九三在坎窞之下逼近險難小人覺悟有凌犯之意自我致之也然三陽以剛健之才心徳俱同以此涉難徃必濟也然㓂自我致所以禦之者必有豫備加敬與慎乃不致反為所乘耳六四需于血出自穴象曰需于血順以聽也六四以陰柔而居君側三陽既進必有所傷能釋位而去順以聽命可以免咎矣君子之去小人不為巳甚彼能退聽斯巳耳况四與上雖處險而皆有内應故不至甚傷也穴者陰物之所處四出自穴上入于穴狐鼠依憑城社之象小人能自竄伏不窮治之也李膺破柱以取張朔激成黨錮之禍身既不全卒以亡漢可不戒哉九五需于酒食貞吉象曰酒食貞吉以中正也九五陷于坎險上下二陰之間然三陽在下將同心以排難上下相須之時又材皆剛健險難必濟但當從容以應物之求耳四與上方挾我以握其威權若不能以道消息則㓂害必至故需于酒食示以閒暇靜正以待之剛明之賢自下競進為吾羽翼舟楫之用則剛中居正位乎天位為需之主吉莫尚焉上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也上六以陰柔乘剛而居人臣之極位處險難之終否極將泰之象乾之剛陽豈久為人下哉需之既久險難將平故衆賢不俟號召而皆進小人自知力不能拒能以誠敬而待君子君子豈復窮治之哉君子之待小人其恕如此然三陽在下而一陰反處乎上今羣陽已升而陰能退聽不忌其進雖不當位未大失也古人以飲食致訟者多矣宋華元殺羊享士而不及羊斟鄭靈公解黿而不及子公皆足以致禍今三陽健進雖非己所召敬以待之乃獲終吉聖人為小人計亦深矣豈必誅絶之哉坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川訟者人所不得已也非其中心誠寔不敢訟也二之與五皆以陽剛居中有孚之象也凡訟必抑塞而不獲伸然猶惕然而懼慮有司之未能明辨也中吉中止則吉也終凶終竟其事則凶也利見大人求辨明也不利涉大川涉險則危也入于淵者沒溺之象囹圄之謂也聖人既不能使人无訟凡為好訟之戒盡于此矣所以塞其源窒其流欲使之无訟也彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也訟乾上坎下乾剛健而坎陰險健則果于訟而不可制險則巧于訟而不可測合此二象此小人之善訟者也大抵訟非君子之所樂為也有孚窒惕中吉不得已而言之于上也九二以剛自外來居人臣之正位雖在坎窞而陽剛君子小人不能加害乃反為訟主陽來而得中此有司之善决獄訟者也九五為訟主履尊位而有中正明辨之徳有罪者刑无罪者釋是非曲直所取决也訟有二主而爻辭特以自下訟上為言易固有遺爻以舉二體者卦體不由乎爻盖彖統論一卦之體爻者適時之變互見之也聖人既不能使人无訟若有理者獲免无理者退聽則已耳健訟者必欲終竟其事則凶之道也大人者有位之大人也吕刑稱皇帝清問下民鰥寡无盖又曰兩造具備師聽五辭明清于單辭察辭于差非從惟從古人于獄訟其欽慎審克如此宜乎􅁈枉者所利見也訟者必審量事機理直而主明乃可訟也若恃理直冐昧而進如涉險難則有不測之禍矣象曰天與水違行訟君子以作事謀始天體極乎上水性極乎下天右行而水東注此形性之相違也夫相親相友患難相救疾病相扶持此人情之常至于乖爭而致訟必由二體之相違也君子知訟之所由興凡所作事皆當謀始如議婚禮者或大小之非耦恃契劵者或經界之不正皆始之不慎而終訟者也水性固下而坎復在下天體極上而乾復在上此其相違之甚者若止以乾坎二體為相違則需亦以乾坎成卦乃以雲上于天為需之象有相須相成之義猶天地交為泰不交為否上火下水為末濟上水下火為既濟也初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也初六以險柔居訟之始然險而不健故所訟之事雖誣㒺而不敢終執抑塞而不敢必伸有惕然畏懼之心知訟之終凶而不敢竟也然外有九四為之正應而辨明之雖有小言故終獲吉也九二不克訟歸而逋其邑人三百户无𤯝象曰不克訟歸逋竄也自下訟上患至掇也九二以陽剛居險陷之中初與三恃以為主也然上无應援二剛皆居中履正相違而不相下五既君位非二可敵故不克訟而歸逋其邑人三百户盖三百户之小邑儉陋之邦非人所競故可免咎而无罪悔也自下訟上于理為逆若非逋竄以寡約自處則禍患之至猶掇取之也先儒曰大都偶國固非逋竄之道胡翼之曰若反據强盛之國是復有敵上之意故退避至小之邑而人三百户則可以无災𤯝也六三食舊徳貞厲終吉或從王事无成象曰食舊徳從上吉也六三以陰柔處兩剛之間失位而居險之終能以靜正自處慄慄危懼則獲終吉而永保其禄位矣食舊徳世禄也古者分田制禄公卿以下咸有圭田兩漢子孫猶有世侯爵者能食其舊徳之禄則能承家矣六三處四陽之間而柔順不競雖有失位之危而正應在上故能食其舊徳而獲終吉也既能從上順以聽命使從王事竭力赴功必歸美以報其上而不敢成也與夫尸禄素餐者異矣處險難之中能不競如此豈復蹈禍悔者哉聖人貴乎明哲保身居危疑之時遇剛强之敵不量已力動輙相違其取禍必矣尚何舊徳之可保乎九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也初與四本為正應然九四居上卦之下而剛健初六在下卦之下而陰險體性相違爭訟之所由興也初雖陰險而柔弱非能與剛健為敵勢必退聽故九四不克訟而反前欲訟之命而變其初心乃能安其分義而貞且吉也此則于己无所失矣九五訟元吉象曰訟元吉以中正也聽訟者有司之事爾訟之九五非必履尊位也盖聽訟之主訟者所取决也體既剛明又居中而得正強梗必有所憚而柔弱者獲伸矣其獲元吉不亦冝乎堯之臯陶周之召伯漢之于公唐之徐有功足以當此爻矣上九或錫之鞶帶終朝三禠之象曰以訟受服亦不足敬也書稱天命有徳五服五章哉服者所以彰有徳也人能藴徳行道藝修身于隠約之中一旦錫命于朝衆人必以為榮今以剛強善訟而受命服如小人乘君子之器盜斯奪之故有終胡三禠之辱雖復垂紳正笏儼然有士大夫之容見者孰不鄙賤之又何足敬乎坎下坤上師貞丈人吉无咎古者不得已而用兵常以曲直為勝負若辭直而理正非徒衆必為用而敵人固巳䘮氣矣行師之道以貞為主不曰正者靜而正也靜而无譁以聽主帥之命提三軍之衆坐作進退惟命是聽非人望素為衆心所畏服者􅂚足以當其任哉李光弼郭子儀顔真卿連衡河北裴度之討淮西足以當此爻矣丈人者宿將老臣之謂也宿將老臣方畧必素定乎胷中雖驅市人而戰可也吉无咎者吉而又无咎悔也如樂毅之伐齊王濬王渾之平吳鄧艾鍾㑹之滅蜀雖吉而有咎悔故知成功名非難守功名者難也彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣周官六鄉之兵出則為六師兵法亦以二千五百人為一師則師之為言衆也古者興師動衆必本于正此卦以九二為主帥以寡制衆羣陰所從居險之中上應六五盖禀命以征伐者正也用衆之道非出于正孰肯歸之九二以剛中之才應天順人履險以用衆雖驅之以萬死一生之地民皆悦而從之者正且順也若違命犯上師出无名雖復誘以重賞孰肯從之夫履至險者莫甚于行師毒天下者莫􅆭于矢石今師以正行兵以順動其害之也乃所以利之其勞之也乃所以逸之其毒之也乃所以生之則民之從之也輕故能吉且无咎也象曰地中有水師君子以容民畜衆坎下坤上地中有水之象天一生水五行之本在天地之間至多者莫若水故有民衆之象卦有五陰民衆也水由地中行江河淮濟何所不受則水不失其性君子能體此以容民畜衆各樂其業容者包容之包容則不擾畜者聚畜之聚畜則不散此聖人御人羣之道豈獨用兵行師哉初六師出以律否臧凶象曰師出以律失律凶也用兵行師必先繩以紀律然後可以萬全縱不大勝亦不至大敗也律謂正部曲行伍營陣進退坐作皆有常法司馬掌九伐之法是也韓信多多益辦者用紀律也若不知嚴紀律肅號令雖復邀倖一勝軍政必自此壊後必有受其禍者故曰否臧凶否不然也出師而不以紀律雖善猶凶也初六出師之始聖人致其戒懼之意深矣九二在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懐萬邦也六二九五君臣之正位今九二以陽居陰六五以陰居陽雖不可謂正而得中也况二與五為正應有主于中可以専制于外以必其成功也故在師中吉且无咎也吉者委任之専故戰可必勝也无咎者君臣意合䜛間不能移也人主操威福之柄有功必賞有罪必討况戰陳之事賞不踰時故三錫命也按曲禮一命受爵三命受車馬錫命至于三所謂功多有厚賞豈特爵服車馬之間哉古之為將者不以成功名為難能保功名者難也居功名之際主不疑而朝不忌者唐惟郭子儀一人師之九二以陽剛處中履險而順雖外握重權而不失人臣之分故能吉且无咎也古者討有罪命有徳皆稱天示不敢􅀻也賞一人而千萬人悦故象言在師中吉承天寵也王三錫命懐萬邦也六三師或輿尸凶象曰師或輿尸大无功也九二以剛而居柔故為上所信􅀝託不御之權専閫外之寄戰可必勝功可必成也六三體柔而居剛體柔則其才不足仗也居剛則其任不可専也九二為衆隂所歸三當退聽而受其節制今乃欲共主其事以分權其无功必矣自古將相委任不専則號令不一號令不一則衆莫知所從如此鮮有不敗北者漢祖登壇拜韓信使盡䕶諸將故能下齊破趙卒成大功唐肅宗大舉節度之師以當安史而无主帥進退相顧望雖郭汾陽李臨淮不免奔潰將之成敗在委任之專與不專之間耳六四師左次无咎象曰左次无咎未失常也老氏云君子居則貴左用兵則貴右又曰吉事尚左凶事尚右天地之道左陽而右陰陽生隂殺兵者聖人不得已而用之殺人固非所樂若知難而不能退則有覆軍辱國之禍六四以柔弱而處陰位内險既終外體柔順故堅壁以守敵不能犯雖為无功亦无咎悔故左次无咎象曰左次无咎未失常也用兵行師固以克敵制勝為常若知難而退全師以歸愈于敗亡未為失常也晉師救鄭及河聞鄭既及楚平桓子欲還彘子不可師遂濟晉師大敗是安知用兵之常道哉六五田有禽利執言无咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也兵法曰師直為壯曲為老古者興師必有辭雖湯武之師應天順人而鳴條牧野之誓尚聲桀紂之過惡况餘人乎執言者非无辭也執我之辭聲彼之罪羲和􅊺滛廢時亂日􅏷侯承王命徂征葛伯不祀湯徃征之皆有辭也田者播種百榖生民之本也田非鳥獸之所犯有禽則將害我穡事以此出狩非馳騁畋獵荒于禽者如夷狄侵擾邊陲諸侯一遵軌度聖王興師動衆有不得已者六五之君以柔弱而居尊位物來犯我則以兵應徃无不克矣動既有辭何咎之有長子帥師弟子輿尸貞凶何也九二以一陽而為衆陰所歸長子之象即繇辭所謂師貞丈人吉也丈人尊嚴之稱任帥師者非得尊嚴之人人望素著衆心所歸者以統御之安能責其成功哉秦用三帥而為晉襄公所敗唐用九節度而為史思明所乘盖委任不專軍無統帥雖用天子之命以伐叛逆猶凶也九二在師中故象言以中行也人主之職在任將相不能擇帥而專任之則是人主之過故曰使不當也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也上六師之終以柔弱而居无位之地盖功成而退非久專兵柄者也故大君有命量其功之大小以為諸侯大夫有功者不可不賞小人不可使有功故終戒之以小人弗用也象曰大君有命以正功也小人勿用必亂邦也人主操賞罰利害之權命自我出開國承家所以正功也茍用小人或恃功而䟦扈或開邉而生事其亂邦必矣聖人戒之于終欲後世之君命將謀帥之際不可不慎始也始之不慎至于有功而不賞則過在我矣坤下坎上比吉原筮元永貞无咎不寧方來後夫凶凡有所比或為人所比无不吉者君子必擇其所比原筮者推原所比之人可從可違而決斷之也元永貞无咎者惟得剛中之賢君為比之主而親附之則可无咎悔也元者衆善之長羣陰皆附于我非其善出乎衆人之上安能翕受而无間言乎永謂常久而不變易貞謂正固而无傾邪所親如此何咎之有不寧方來後夫凶者諸侯之國上无道揆下无法守則各相并吞小大強弱必有受其害者上有剛中之君以為比主則不寧之國皆有所恃且有所畏莫敢不來享矣大君在上朝覲㑹同之禮其敢後乎其或懐疑偃蹇獨後于衆人此取禍之道也小則削地黜爵大則如禹之戮防風氏凶其宜矣彖曰比吉也比輔也下順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也比以一陽統五陰陽又處尊位而四陰在下而順從之所以能吉而衆為之輔也故曰比吉也比輔也下順從也此以九五言比道之大也原筮者卜其所當比當從之人以人主之尊比者雖衆而有正有邪所比者君子則衆君子皆進所比者小人則羣小人皆進同心同徳羣而不黨者比也阿諛順㫖朋滛狎比者亦比也始之不慎而能克終者鮮矣故慎之于始誠善矣攷之于終能永且貞矣故无咎悔也非剛健中正之君鮮有不昵于􅀻者故曰以剛中也不寧方來上下應者一陽居中為比之主而羣陰皆應如人主秉其威權禮樂征伐自我而出孰有不聽命者乎書稱文王曰大邦畏其力小邦懐其徳有力以制之有徳以懐之強不敢陵弱衆不敢暴寡不寧者我能寧之孰有不來享來王者乎若其偃蹇䟦扈後衆人而來失比輔之義則有問罪之師如啓之征有扈文王之伐崇乃自取困辱之道也故曰其道窮也象曰地上有水比先王以建萬國親諸侯先王觀地上有水而得比之象非特地水之相比也盖地上有水非有溝洫畎澮以防範儲蓄之則泛濫奔衝反為害矣聖人觀此象故建萬國親諸侯小大强弱不相陵犯或以徳懐或以力制咸親比于我矣自堯舜三代不敢廢也至秦并吞諸侯而郡縣之一夫呌號天下響應孰有親比于我者王氏論本朝罷侯置守則曰萬一有秦之變豈可諱哉靖康之禍金人長驅如入无人之境諸路守臣奔竄迎降之不暇其間能仗節死難者不過數人何𥙷于治亂哉然則衆建諸侯或大封同姓以復唐虞三代之制豈非今日之先務哉初六有孚比之无咎有孚盈缶終來有它吉象曰比之初六有它吉也初六以陰柔之質為比之始若不擇所從而􅇥于求比則有阿附之嫌惟初无應于上義之與比而已故曰有孚比之无咎人之相與不以誠實視利之所在則詭隨而茍合利窮則散矣惟中懐誠寔无矯餙之偽如質素之缶則衆心所向始雖難合終必從之而有它來之吉也它來者非獨五服之内而已雖蠻貊之邦皆不約而自至也夫比之道如交神明其始不以誠而徒事繁文末節曷足以感之故觀卦言觀盥而不薦有孚顒若孔子曰禘自既灌而徃者吾不欲觀之矣故象曰比之初六有它吉也盖言慎其始也六二比之自内貞吉象曰比之自内不自失也六二與九五為正應在它卦則吉孰甚焉盡比之道則狹矣二處于内專比于五于人臣之道為正雖所比不廣必免凶咎自内者不汲汲馳騖于外以求比者也故必貞而後吉象曰比之自内不自失也夫比之道當惟正之從若專應于一則有朋比之嫌今二能應五不失正道故曰不自失也六三比之匪人象曰比之匪人不亦傷乎六三以陰柔而居陽位上六雖非正應而逺比之上六陰柔不中而居髙顯之位比之无首而无所終者又處坎之終此陰險之小人而在髙位者也而三乃比之比不以正而終不為所傷陷者㡬希矣六四外比之貞吉象曰外比于賢以從上也四无應于􅀄而切近君位雖非正應而外比于賢君五又為比主以臣比君以下比上以陰柔而比陽剛相比以正其獲吉宜矣夫人之相比有敵體而比者有尊卑相臨而比者有因勢利而比者有下比于羣邪者今四之比五特以君臣之分義所當從捨􅀄而比五故象曰外比于賢以從上也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也九五以一陽而比衆隂處中正之位无所偏係比之主也當明示天下以大公至正之道无􅀻親也无􅀻應也譬之畋獵三驅之禮取其向順之心捨其逆犯之意前去者皆免故常失前禽也聖王用此道以親比天下茍有向順之心則取而用之曷常陰用智謀以籠絡之哉聖人于天下一視同仁固未嘗分逺近親踈之間此道既明則邦邑之人不待教誡咸協于我如此則吉可知矣然非上用中正之道以无心感格之則邦域之内豈能无偏係之􅀻乎故象曰邑人不誡上使中也盖歸美以復其上也上六比之无首凶象曰比之无首无所終也人相親比貴乎有始有終上六以隂柔之資處上卦之極九五以陽剛中正為羣隂之主已獨乘之失比輔之道比之无首者也􅀄之无咎以有孚信故終來有它吉上六不能見㡬而作其來獨後于衆陰此後夫凶也始之不慎而能克終者鮮矣故象曰比之无首无所終也乾下巽上小畜亨宻雲不雨自我西郊小畜内健外㢲以一隂而畜五陽是以大而反為小者所畜故其卦曰小畜夫能畜之而已不得行其志猶善畜財而不能用也小畜之能亨以隂處得其正能用五陽而衆陽從之也宻雲不雨自我西郊何也雲至于宻未有不雨者雲隂氣也西隂位也六四居人臣之極位上承九五之君乃欲專其施不復禀命而行故雲雖宻而不雨膏澤不下于民之象也彖曰小畜柔得位而上下應之曰小畜健而㢲剛中而志行乃亨宻雲不雨尚徃也自我西郊施未行也陽大而陰小柔進而居四五陽所從所謂一陰五陽則陰為之主故四為畜主卦之所以為小畜也健而巽者以成卦言之也二五皆剛而處中位故志得行焉内健而外㢲雖剛而不過是以能亨此以卦爻釋致亨之義也雲宻而不成雨盖陰徒尚徃而陽未應也人臣之道和而不倡无成而代有終陽當先而陰從之可也自我倡之而上不應欲膏澤下于民難矣善畜其君者必與上同其心徳定其計謀如蕭張之於漢祖諸葛孔明之於蜀先主是也不然豈足以大有為哉象曰風行天上小畜君子以懿文徳風至柔之物也指者勝鰌者亦勝及其蜚大屋折大木力莫強焉今風行天上非暴厲以擾萬物之時也君子體之以懿文徳夫以一陰而畜羣陽此豈力足以制之哉但以至誠柔順之道以馴擾之耳此大象之義也初九復自道何其咎吉象曰復自道其義吉也乾陽剛之物體本在上今反處乎下失其所矣今有應于四是能復由其道非犯難而行也尚何咎乎非徒无咎也乾陽復位有應于上其義吉矣夫物未有徃而不復者况剛健如乾豈一陰能終畜之乎九二牽復吉象曰牽復在中亦不自失也二居下體人臣之位而乾以陽剛居之失其所矣然與五同志下乘乎初同志相求皆從于四可牽連而復則免乎凶咎矣乾以至剛居至柔能隨時曲折健而能巽剛而得中外不失人内不失已所以獲吉也九三輿説輻夫妻反目象曰夫妻反目不能正室也九三以陽居陽乾剛強而難制非㢲所能羈縻之者也然宻比于四雖剛陽而反為陰柔之所制如車輿欲進而説其輻勢不得不與四而共處也然三與上同志四自應初豈能終无悔夫妻反目之象也夫剛上而柔下所以為恒故曰婦人貞吉從一而終也夫子制義從婦凶也夫夫婦婦而家道正矣小畜陰既居上九三之陽為其所畜以陰制陽安能正其室家乎仲尼于小象因推原其意男女失位不以責婦人堯將禪舜必先觀其刑于二女文王召南之化亦始于刑寡妻末世之君不能制婦人以致亂亡如唐之髙宗者多矣况其下者乎故曰夫妻反目不能正室也為戒深矣六四有孚血去惕出无咎象曰有孚惕出上合志也四以一陰處近君多懼之地下之三陽方務于速進未易畜也而四卒能畜之者以誠而已茍不以誠則在上者必疑在下者必忌疑忌交攻力不能勝如此豈能免于憂傷而脱于危懼乎惟能以至誠孚信而感動之則才之剛强者必聽命而勢之威重者必親信于我矣如此乃可為畜主為羣陽之所宗而无咎也夫乾雖處下剛健而鋭于上進至難畜也茍能加至誠由直道與上合志而假其威權則羣陽安得不從况敢加害乎故象曰有孚惕出上合志也九五有孚攣如富以其鄰象曰有孚攣如不獨富也五居尊位勢豈不足以畜衆然委成于四以四為畜主四能盡人臣之道以承其上與五合志五雖不能自畜而中懐誠寔居中得正親于畜主綢繆膠固而不相去君臣合徳雖剛暴者亦心悦誠服靡然而徃從之矣六爻惟四五有孚盖非有孚則君疑于臣而臣疑其君衆不聽命也五居崇髙之位假大臣以威權富而能用其鄰者也書曰臣哉鄰哉人主以大臣為鄰四最近君鄰之象也自古帝王未有獨擅其富有而能成功者武王伐紂之後列爵惟五分土惟三漢祖既滅項氏亦徧封功臣韓信王齊之􅀄有三分之勢特眷戀不忍叛去者懐其解衣推食之恵也故象曰有孚攣如不獨富也上九既雨既處尚徳載婦貞厲月㡬望君子征凶象曰既雨既處徳積載也君子征凶有所疑也上九處畜之終五陽皆為我畜其道上行无復危疑矣如雲氣上升而陰能固之然後雨自上下物无不􅀍其澤者物既盡􅀍其澤則无不得其所者故曰既雨既處夫以一陰柔而畜羣剛非力能制之也所尚者徳也莊子曰福輕于羽莫之知載君子之載徳猶舟車之載物也積而載之則徳愈盛矣乾至上九猶曰亢龍有悔况以臣畜君至位尊徳盛能无疑乎猶婦之反畜其夫雖貞猶危也月之㡬望與日為敵其勢必虧故坤之六四貴乎括囊至上六則龍戰于野小畜至上九其勢已逼動必蹈禍尚何徃乎孔子曰君子征凶有所疑也聖人為固位吝權者之戒其意豈不深矣乎兑下乾上履虎尾不咥人亨彖曰履柔履剛也説而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也履人所踐履也出而應物則有履踐之迹君子雖履畏塗而不犯難者能以天下之至柔馳騁乎天下之至剛也卦有五剛一柔則以柔為主六三是也三以一柔而乘二剛故曰柔履剛也下兑上乾三既為一卦之主而能以説而應乎乾之上剛柔相濟履道之至善者也剛中正履帝位而不疚光明者謂九五也履帝位履道之極也履以五剛而挾一柔若不能虚巳用衆而獨任其剛决鮮有不蹈咎悔者故夬履貞厲以剛决自任雖正猶危故雖中正而又无剛果之失則其徳日新而有光輝矣虎者至剛猛之物今能履其尾而不咥人者以説而應之也古語有云人无害虎之心虎无傷人之意撫我則后虎猶民也虐我則讐民猶虎也有道之士其知此者乎象曰上天下澤履君子以辨上下定民志天體在上澤最處下聖人觀此二象故以禮義治天下使各安其性分之情然後天下可得而治也詩稱抱衾與裯寔命不猶雖妾媵之賤知尊卑之不可踰貴賤之不可易能安于義命如此天下豈有夸跂之心哉秦之失道禮義消亡陳勝項籍之徒或輟耕隴上或歎息道傍自此豪傑並起天下紛紛民志何由而定乎由辨之不早辨也初九素履徃无咎象曰素履之徃獨行願也君子居窮隠約雖陋巷簞瓢而不悔者守其素節也以此而徃不易其素所守者乃可无咎君子待聘而徃豈為利哉上必欲致君如堯舜之君下則欲使民如堯舜之民此其志願也天下攘攘皆為利徃吾獨守其志節而務行其道固非衆人之所測也象曰素履之往獨行願也此仲尼之深㫖也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也九二无應乎上不可妄進而躁動也今能退處陰位不與陽亢以此而行進无逼上之嫌退有安貞之吉履道之至善者也坦坦平易之象人之操履或假隠自名而志在要禄或陽為亷潔而行實汚穢是謂作偽心勞惴惴然掩覆之不暇豈能履其坦途守夫安靜者哉惟君子造道之深所守之固能定能應不為時世所易若中无所主臨利害之際鮮有不失所守者故象曰幽人貞吉中不自亂也六三眇能視跛能履履虎尾咥人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也履卦以全體言之則兑處乾下以説而應乎乾故履虎尾不咥人亨以六爻言之則六以隂處陽履非其位又上下五剛以一隂處乎其間如眇者寔不能視而自謂能視跛者寔不能履而自謂能履以此涉世其速危害必矣故如履虎尾咥人凶也離卦曰履不處也盖履卦陽爻皆以不處其位為吉韓康伯得之王輔嗣其説妙矣六以隂干陽位如武人而欲為大君徒肆其剛暴人孰與之故象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也夫以陽居陽處中得正如九五猶不免危懼况以隂柔而自處于陽剛之地其能免乎志剛者其志雖剛而才智不足豈足以勝其任哉使威武之人而挾剛强之才懐剛武之志何徃而不利哉九四履虎尾愬愬終吉象曰愬愬終吉志行也九四以剛强有為之才而能以卑遜柔順自處位既逼上行非坦途而終獲吉者能恭慎畏懼而不以陽剛自處也象曰愬愬終吉志行也四居近君之地大臣也大臣當近君之地常能愬愬而不自安則必有難進易退之節豈肯戀寵禄貪得而患失哉盖遇可行之時伸欲行之志耳異乎六三才知不足而徒志乎剛者矣九五夬履貞厲象曰夬履貞厲位正當也九五既以陽爻而處尊位若以剛决自任於左右大臣无所詢訪雖尊履帝位豈能獨勝其任哉夬履貞厲者雖正猶危也此夬決也象言夫履貞厲位正當者五之專決當犯凶咎以位正當止于危厲而已厲雖近危而未至于凶也優柔不斷者固昏庸之所為至于恃其剛明之才居得致之位自謂臣下舉莫已若不復詢謀咨訪則又上下隔絶堂下千里門庭萬里而其禍有不可勝言者矣上九視履考祥其旋元吉象曰元吉在上大有慶也祥者吉之先見而未定也作善降之百祥作不善降之百殃視其所履則吉凶可知矣人可欺天不可欺也人固有行僻而堅言偽而辨者聖賢于此不能无疑若視其所以觀其所由察其所安則有不可欺者吉凶可考矣旋還也彼所履誠善考其歸必獲大吉象言元吉在上大有慶也上九處履之終茍獲元吉則有餘慶必矣履道至此非獨身尊榮子孫其逢吉矣讀易詳説卷二
